<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summer Plans 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, 'Times New Roman', serif; background: #FFF8F0; min-height: 100vh; transition: background 0.3s; }
    body.nokids { background: #FAF5FF; }
    #root { min-height: 100vh; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: Georgia, serif; color: #FF7043; font-size: 18px;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, #FF7043 0%, #FFA726 100%);
      padding: 20px 24px 18px;
      box-shadow: 0 4px 24px rgba(255,112,67,0.35);
      transition: background 0.3s, box-shadow 0.3s;
    }
    body.nokids .app-header {
      background: linear-gradient(135deg, #5B21B6 0%, #BE185D 100%);
      box-shadow: 0 4px 24px rgba(91,33,182,0.35);
    }
    .header-inner { max-width: 820px; margin: 0 auto; }
    .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .header-sun { font-size: 38px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
    .header-title { margin: 0; font-size: 26px; font-weight: bold; color: white; letter-spacing: -0.5px; text-shadow: 0 1px 3px rgba(0,0,0,0.12); }
    .header-sub { margin: 3px 0 0; font-size: 13px; color: rgba(255,255,255,0.85); font-family: sans-serif; }

    /* ── Calendar toggle pill ── */
    .cal-toggle {
      display: inline-flex; background: rgba(0,0,0,0.2); border-radius: 30px;
      padding: 3px; gap: 2px; margin-bottom: 14px;
    }
    .cal-btn {
      padding: 7px 20px; border-radius: 24px; border: none;
      font-family: sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      color: rgba(255,255,255,0.7); background: transparent;
    }
    .cal-btn.cal-active { background: white; color: #FF7043; }
    body.nokids .cal-btn.cal-active { color: #5B21B6; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 8px; }
    .tab-btn {
      padding: 7px 18px; border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.55);
      font-weight: bold; font-size: 13px; font-family: sans-serif;
      cursor: pointer; transition: all 0.15s;
    }
    .tab-btn.active { background: white; color: #FF7043; }
    .tab-btn:not(.active) { background: transparent; color: white; }
    body.nokids .tab-btn.active { color: #5B21B6; }

    /* ── Main ── */
    .main { max-width: 820px; margin: 0 auto; padding: 24px 16px 60px; }

    .panel {
      background: white; border-radius: 18px; padding: 22px 22px 20px;
      box-shadow: 0 2px 18px rgba(0,0,0,0.07); margin-bottom: 24px;
    }

    /* ── People ── */
    .people-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .people-label { font-size: 12px; font-family: sans-serif; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 0.1em; }
    .editing-badge { font-size: 12px; font-family: sans-serif; color: #FF7043; font-weight: 700; }
    body.nokids .editing-badge { color: #5B21B6; }
    .people-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; min-height: 38px; }
    .people-empty { font-family: sans-serif; font-size: 13px; color: #ccc; align-self: center; }
    .person-chip { display: flex; align-items: stretch; border-radius: 20px; overflow: hidden; border: 2.5px solid #eee; transition: all 0.15s; }
    .person-btn { display: flex; align-items: center; gap: 7px; padding: 6px 10px; background: #fafafa; border: none; cursor: pointer; font-family: sans-serif; font-size: 13px; font-weight: 400; color: #555; }
    .person-chip.active .person-btn { font-weight: 800; }
    .person-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .person-days { font-size: 10px; opacity: 0.6; }
    .person-remove { padding: 6px 10px 6px 2px; background: #fafafa; border: none; cursor: pointer; font-size: 15px; color: #ccc; line-height: 1; }
    .add-row { display: flex; gap: 8px; }
    .add-input { flex: 1; padding: 9px 14px; border-radius: 10px; border: 1.5px solid #e8e8e8; font-size: 14px; font-family: sans-serif; outline: none; background: #fafafa; }
    .add-input:focus { border-color: #FFA726; }
    body.nokids .add-input:focus { border-color: #BE185D; }
    .add-btn { padding: 9px 22px; border-radius: 10px; border: none; background: linear-gradient(135deg, #FF7043, #FFA726); color: white; font-weight: bold; font-size: 14px; font-family: sans-serif; cursor: pointer; box-shadow: 0 2px 10px rgba(255,112,67,0.3); transition: background 0.3s; }
    body.nokids .add-btn { background: linear-gradient(135deg, #5B21B6, #BE185D); box-shadow: 0 2px 10px rgba(91,33,182,0.3); }

    /* ── Banners ── */
    .banner { border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; font-family: sans-serif; font-size: 13px; }
    .banner-orange { background: #FFF3E0; border: 1.5px solid #FFCC80; color: #E65100; }
    .banner-blue   { background: #F3F8FF; border: 1.5px solid #BBDEFB; color: #1565C0; }
    .banner-purple { background: #F5F3FF; border: 1.5px solid #DDD6FE; color: #5B21B6; }
    .banner-rose   { background: #FFF1F5; border: 1.5px solid #FBCFE8; color: #9D174D; }

    /* ── Month grid ── */
    .month-panel { background: white; border-radius: 18px; padding: 22px 20px 26px; box-shadow: 0 2px 18px rgba(0,0,0,0.07); user-select: none; }
    .month-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 18px; }
    .month-name { font-size: 24px; font-weight: bold; color: #FF7043; letter-spacing: -0.5px; transition: color 0.3s; }
    body.nokids .month-name { color: #5B21B6; }
    .month-year { font-size: 12px; font-family: sans-serif; color: #ccc; font-weight: 700; letter-spacing: 0.1em; }
    .weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
    .weekday-lbl { text-align: center; font-size: 9px; font-family: sans-serif; font-weight: 800; color: #d0d0d0; letter-spacing: 0.07em; padding-bottom: 6px; }
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-cell { aspect-ratio: 1; border-radius: 8px; background: #F7F7F7; border: 2.5px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.07s; }
    .day-cell.clickable { cursor: pointer; }
    .day-num { font-size: 13px; font-family: sans-serif; font-weight: 400; color: #aaa; }
    .day-cell.my-on .day-num { font-weight: 800; }
    .day-cell.has-count .day-num { color: #555; }
    .day-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 75%; margin-top: 2px; }
    .day-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .dot-overflow { font-size: 7px; color: #bbb; line-height: 5px; }
    .month-legend { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 4px 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: sans-serif; color: #999; }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Best days ── */
    .best-empty { background: white; border-radius: 18px; padding: 48px 24px; text-align: center; box-shadow: 0 2px 18px rgba(0,0,0,0.07); font-family: sans-serif; color: #ccc; font-size: 15px; }
    .best-panel { background: white; border-radius: 18px; padding: 24px 22px 30px; box-shadow: 0 2px 18px rgba(0,0,0,0.07); }
    .best-title { margin: 0 0 22px; font-size: 22px; font-weight: bold; color: #FF7043; letter-spacing: -0.4px; transition: color 0.3s; }
    body.nokids .best-title { color: #5B21B6; }
    .best-list { display: flex; flex-direction: column; gap: 10px; }
    .best-row { display: flex; align-items: center; gap: 14px; padding: 13px 16px; border-radius: 12px; border: 1.5px solid #f0f0f0; background: #FAFAFA; }
    .best-row.top { border-color: rgba(255,112,67,0.18); }
    body.nokids .best-row.top { border-color: rgba(91,33,182,0.18); }
    .best-medal { font-size: 20px; min-width: 30px; }
    .best-info { flex: 1; }
    .best-date { font-family: sans-serif; font-weight: 700; font-size: 15px; color: #333; margin-bottom: 5px; }
    .best-bar-wrap { height: 5px; border-radius: 3px; background: #eee; overflow: hidden; margin-bottom: 6px; }
    .best-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #FF7043, #FFA726); transition: background 0.3s; }
    body.nokids .best-bar { background: linear-gradient(90deg, #5B21B6, #BE185D); }
    .best-who { display: flex; flex-wrap: wrap; gap: 5px; }
    .best-who-chip { display: flex; align-items: center; gap: 4px; font-size: 11px; font-family: sans-serif; padding: 2px 9px; border-radius: 10px; font-weight: 700; }
    .best-who-dot { width: 5px; height: 5px; border-radius: 50%; }
    .best-count { text-align: right; flex-shrink: 0; }
    .best-count-num { font-size: 22px; font-weight: bold; color: #FF7043; font-family: sans-serif; line-height: 1; transition: color 0.3s; }
    body.nokids .best-count-num { color: #5B21B6; }
    .best-count-denom { font-size: 11px; font-family: sans-serif; color: #bbb; }

    /* ── Mode badge under header ── */
    .mode-badge {
      text-align: center; font-family: sans-serif; font-size: 12px;
      letter-spacing: 0.06em; font-weight: 700; padding: 6px 0 2px;
      opacity: 0.55;
    }

    .save-dot { position: fixed; bottom: 18px; right: 18px; font-size: 11px; font-family: sans-serif; color: #bbb; background: white; padding: 4px 10px; border-radius: 20px; box-shadow: 0 1px 8px rgba(0,0,0,0.1); opacity: 0; transition: opacity 0.3s; }
    .save-dot.visible { opacity: 1; }

    @media (max-width: 480px) {
      .app-header { padding: 16px 16px 14px; }
      .header-title { font-size: 21px; }
      .main { padding: 16px 12px 48px; }
      .month-panel { padding: 16px 12px 20px; }
    }
  </style>
</head>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  apiKey:            "AIzaSyCp2PBbqdj_g6NPR9iYQb7Z6tgXbqLtHIA",
  authDomain:        "lunch-f7021.firebaseapp.com",
  databaseURL:       "https://lunch-f7021-default-rtdb.firebaseio.com",
  projectId:         "lunch-f7021",
  storageBucket:     "lunch-f7021.firebasestorage.app",
  messagingSenderId: "1053755216064",
  appId:             "1:1053755216064:web:14b749200f825a4e9bdd25",
};

const fbApp  = initializeApp(firebaseConfig);
const db     = getDatabase(fbApp);
const kidsRef   = ref(db, "summer-planner-2026");
const nokidsRef = ref(db, "summer-planner-2026-nokids");

window._fbSetKids    = d => set(kidsRef, d);
window._fbSetNokids  = d => set(nokidsRef, d);
window._fbOnKids     = cb => onValue(kidsRef,   snap => cb(snap.val()));
window._fbOnNokids   = cb => onValue(nokidsRef, snap => cb(snap.val()));

<script>
const MONTHS   = [
  { name:"June",   days:30, offset:1 },
  { name:"July",   days:31, offset:3 },
  { name:"August", days:31, offset:6 },
];
const WEEKDAYS = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const PALETTE  = [
  "#E63946","#F4A261","#2A9D8F","#457B9D","#E76F51",
  "#8338EC","#06D6A0","#FB5607","#3A86FF","#FF006E",
];

// ── State ────────────────────────────────────────────────────────────────────

// avail values: "a" = available (green), "u" = unavailable (red), null = no answer
const states = {
  kids:   { people: [], avail: {} },
  nokids: { people: [], avail: {} },
};
let activeCalendar = 'kids';
let state = states.kids;   // always points to active calendar

let activeId  = null;
let tab       = "calendar";
let nameInput = "";
let saveTimer = null;
let readyCount = 0;        // increments when each Firebase sub fires first time

// ── Helpers ───────────────────────────────────────────────────────────────────

function dayKey(mIdx, d) { return `${mIdx}:${d}`; }

function getOverlapCounts() {
  const counts = {};
  state.people.forEach(p => {
    Object.entries(state.avail[p.id] || {}).forEach(([k, v]) => {
      if (!v) return;
      if (!counts[k]) counts[k] = { avail: 0, unavail: 0 };
      if (v === 'a') counts[k].avail++;
      if (v === 'u') counts[k].unavail++;
    });
  });
  return counts;
}

function nextState(cur) {
  if (!cur) return 'a';
  if (cur === 'a') return 'u';
  return null;
}

function maxCount() { return state.people.length || 1; }

// ── Firebase ──────────────────────────────────────────────────────────────────

function persist() {
  if (readyCount < 2) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const fn = activeCalendar === 'kids' ? window._fbSetKids : window._fbSetNokids;
    fn({ people: state.people, avail: state.avail })
      .then(flashSave)
      .catch(console.error);
  }, 600);
}

function flashSave() {
  const el = document.getElementById('save-dot');
  if (!el) return;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1800);
}

// ── Calendar switch ───────────────────────────────────────────────────────────

function switchCalendar(cal) {
  if (activeCalendar === cal) return;
  activeCalendar = cal;
  state    = states[cal];
  activeId = null;
  document.body.classList.toggle('nokids', cal === 'nokids');
  render();
}

// ── Actions ───────────────────────────────────────────────────────────────────

function addPerson() {
  const name = nameInput.trim();
  if (!name || state.people.length >= 10) return;
  const id    = `p_${Date.now()}`;
  const color = PALETTE[state.people.length % PALETTE.length];
  state.people = [...state.people, { id, name, color }];
  state.avail  = { ...state.avail, [id]: {} };
  activeId  = id;
  nameInput = "";
  persist();
  render();
}

function removePerson(id) {
  const person = state.people.find(p => p.id === id);
  if (!person) return;
  if (!confirm(`Remove ${person.name} and all their dates? This cannot be undone.`)) return;
  state.people = state.people.filter(p => p.id !== id);
  const newAvail = { ...state.avail };
  delete newAvail[id];
  state.avail = newAvail;
  if (activeId === id) activeId = null;
  persist();
  render();
}

function setDay(mIdx, d, val) {
  if (!activeId) return;
  const k = dayKey(mIdx, d);
  const pa = { ...(state.avail[activeId] || {}), [k]: val };
  if (val === null) delete pa[k];
  state.avail = { ...state.avail, [activeId]: pa };
  persist();
}

function cycleDay(mIdx, d) {
  if (!activeId) return;
  const k   = dayKey(mIdx, d);
  const cur = (state.avail[activeId] || {})[k] || null;
  setDay(mIdx, d, nextState(cur));
}

function setTab(t)       { tab = t; render(); }
function setActiveId(id) { activeId = activeId === id ? null : id; render(); }

function onDayClick(mIdx, d) {
  if (!activeId || !d) return;
  cycleDay(mIdx, d);
  render();
}

// ── Render helpers ────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function personChipHTML(p) {
  const isMe     = activeId === p.id;
  const myDays   = Object.values(state.avail[p.id] || {}).filter(v => v === 'a').length;
  const border   = isMe ? `border-color:${p.color}` : '';
  const shadow   = isMe ? `box-shadow:0 2px 12px ${p.color}44` : '';
  const btnBg    = isMe ? `${p.color}18` : '#fafafa';
  const btnFW    = isMe ? '800' : '400';
  const btnClr   = isMe ? p.color : '#555';
  return `
    <div class="person-chip${isMe?' active':''}" style="${border};${shadow}">
      <button class="person-btn" style="background:${btnBg};font-weight:${btnFW};color:${btnClr}" onclick="setActiveId('${p.id}')">
        <span class="person-dot" style="background:${p.color}"></span>
        ${esc(p.name)}
        ${myDays > 0 ? `<span class="person-days">(${myDays})</span>` : ''}
      </button>
      <button class="person-remove" style="background:${btnBg}" onclick="removePerson('${p.id}')">×</button>
    </div>`;
}

function monthGridHTML(m, mIdx) {
  const cells = [];
  for (let i = 0; i < m.offset; i++) cells.push(null);
  for (let d = 1; d <= m.days; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const overlapCounts = getOverlapCounts();
  const mc = maxCount();
  const isNokids = activeCalendar === 'nokids';

  const dayHTML = cells.map((d) => {
    if (!d) return `<div></div>`;
    const k        = dayKey(mIdx, d);
    const myState  = activeId ? ((state.avail[activeId] || {})[k] || null) : null;
    const counts   = overlapCounts[k] || { avail: 0, unavail: 0 };
    const ratio    = counts.avail / Math.max(mc, 1);

    const availPpl   = state.people.filter(p => (state.avail[p.id]||{})[k] === 'a');
    const unavailPpl = state.people.filter(p => (state.avail[p.id]||{})[k] === 'u');

    let bg, border;
    if (myState === 'a') {
      bg     = `rgba(34,197,94,${0.25 + 0.5 * ratio})`;
      border = '2.5px solid #16a34a';
    } else if (myState === 'u') {
      bg     = 'rgba(239,68,68,0.25)';
      border = '2.5px solid #dc2626';
    } else {
      // tint with theme color when others are available
      const tint = isNokids ? `rgba(147,51,234,${0.07 + 0.22 * ratio})` : `rgba(255,167,38,${0.08 + 0.25 * ratio})`;
      bg     = counts.avail > 0 ? tint : '#F7F7F7';
      border = '2.5px solid transparent';
    }

    const allDots = [
      ...availPpl.map(p => ({ p, type:'a' })),
      ...unavailPpl.map(p => ({ p, type:'u' })),
    ];
    const dotsHTML = allDots.length > 0 ? `
      <div class="day-dots">
        ${allDots.slice(0,5).map(({ type }) =>
          `<span class="day-dot" style="background:${type==='a'?'#22c55e':'#ef4444'};outline:1.5px solid ${type==='a'?'#16a34a':'#dc2626'}"></span>`
        ).join('')}
        ${allDots.length > 5 ? `<span class="dot-overflow">…</span>` : ''}
      </div>` : '';

    const titleParts = [];
    if (availPpl.length)   titleParts.push(`✅ ${availPpl.map(p=>p.name).join(', ')}`);
    if (unavailPpl.length) titleParts.push(`❌ ${unavailPpl.map(p=>p.name).join(', ')}`);

    return `
      <div class="day-cell${myState?' my-on':''}${counts.avail>0?' has-count':''}${activeId?' clickable':''}"
        style="background:${bg};border:${border}"
        title="${esc(titleParts.join(' | '))}"
        onclick="onDayClick(${mIdx},${d})">
        <span class="day-num">${d}</span>
        ${dotsHTML}
      </div>`;
  }).join('');

  const legendHTML = state.people.length > 0 ? `
    <div class="month-legend">
      ${state.people.map(p => {
        const cnt = Object.entries(state.avail[p.id]||{})
          .filter(([k,v]) => v==='a' && Number(k.split(':')[0])===mIdx).length;
        return `<span class="legend-item">
          <span class="legend-dot" style="background:${p.color}"></span>
          ${esc(p.name)}${cnt > 0 ? ` · ${cnt}d` : ''}
        </span>`;
      }).join('')}
    </div>` : '';

  return `
    <div class="month-panel">
      <div class="month-header">
        <span class="month-name">${m.name}</span>
        <span class="month-year">2026</span>
      </div>
      <div class="weekday-row">${WEEKDAYS.map(d=>`<div class="weekday-lbl">${d}</div>`).join('')}</div>
      <div class="day-grid">${dayHTML}</div>
      ${legendHTML}
    </div>`;
}

function bestDaysHTML() {
  const overlapCounts = getOverlapCounts();
  const mc = maxCount();
  const MONTH_NAMES = ["June","July","August"];
  const isNokids = activeCalendar === 'nokids';

  const bestDays = Object.entries(overlapCounts)
    .filter(([,c]) => c.avail > 0)
    .map(([k,c]) => { const [mIdx,d] = k.split(':').map(Number); return { mIdx, d, avail:c.avail, unavail:c.unavail, k }; })
    .sort((a,b) => b.avail - a.avail || a.unavail - b.unavail)
    .slice(0, 20);

  if (!bestDays.length) return `
    <div class="best-empty">${isNokids
      ? 'No availability yet — switch to Calendar and mark your nights out! 🍷'
      : 'No availability yet — head to Calendar and start marking days! 🌞'
    }</div>`;

  const rowsHTML = bestDays.map(({ mIdx, d, avail, unavail, k }, idx) => {
    const availPpl   = state.people.filter(p => (state.avail[p.id]||{})[k] === 'a');
    const unavailPpl = state.people.filter(p => (state.avail[p.id]||{})[k] === 'u');
    const pct   = avail / Math.max(mc, 1);
    const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':`${idx+1}.`;
    const topBg = idx < 3 ? `background:rgba(${isNokids?'91,33,182':'34,197,94'},${0.04+0.04*(3-idx)})` : '';

    const availHTML = availPpl.map(p => `
      <span class="best-who-chip" style="background:#22c55e22;color:#16a34a">
        <span class="best-who-dot" style="background:#22c55e"></span>${esc(p.name)}
      </span>`).join('');
    const unavailHTML = unavailPpl.map(p => `
      <span class="best-who-chip" style="background:#ef444422;color:#dc2626">
        <span class="best-who-dot" style="background:#ef4444"></span>${esc(p.name)}
      </span>`).join('');

    return `
      <div class="best-row${idx<3?' top':''}" style="${topBg}">
        <span class="best-medal">${medal}</span>
        <div class="best-info">
          <div class="best-date">${MONTH_NAMES[mIdx]} ${d}, 2026</div>
          <div class="best-bar-wrap"><div class="best-bar" style="width:${pct*100}%"></div></div>
          <div class="best-who">${availHTML}${unavailHTML}</div>
        </div>
        <div class="best-count">
          <div class="best-count-num">${avail}</div>
          <div class="best-count-denom">/${mc} ppl</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="best-panel">
      <h3 class="best-title">${activeCalendar === 'nokids' ? '🍷 Best Nights Out' : '🏆 Top Overlap Days'}</h3>
      <div class="best-list">${rowsHTML}</div>
    </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────

function render() {
  const isNokids     = activeCalendar === 'nokids';
  const activePerson = state.people.find(p => p.id === activeId);

  const peopleHTML = state.people.length === 0
    ? `<span class="people-empty">${isNokids ? 'Add yourself to get started! 🍷' : 'Add yourself to get started!'}</span>`
    : state.people.map(personChipHTML).join('');

  const bannerHTML = (() => {
    if (tab !== 'calendar') return '';
    if (!activeId && state.people.length > 0)
      return `<div class="banner ${isNokids?'banner-purple':'banner-orange'}">👆 Tap your name above to select yourself, then click days you're ${isNokids?'free for a night out':'available'}!</div>`;
    if (state.people.length === 0)
      return `<div class="banner ${isNokids?'banner-rose':'banner-blue'}">👋 This planner is <strong>shared</strong> — ${isNokids?'share the link with the girls and mark your nights out!':'anyone you share this link with can add their availability.'} Start by entering your name above!</div>`;
    return '';
  })();

  const calendarHTML = tab === 'calendar'
    ? `<div style="display:flex;flex-direction:column;gap:20px">${MONTHS.map((m,mi)=>monthGridHTML(m,mi)).join('')}</div>`
    : '';

  const addInputSection = state.people.length < 10 ? `
    <div class="add-row">
      <input class="add-input" id="name-input" value="${esc(nameInput)}"
        placeholder="${isNokids ? 'Enter your name… 🍷' : 'Enter your name…'}"
        oninput="nameInput=this.value"
        onkeydown="if(event.key==='Enter')addPerson()">
      <button class="add-btn" onclick="addPerson()">+ Join</button>
    </div>` : '';

  // Header config per calendar
  const headerEmoji   = isNokids ? '🍷' : '☀️';
  const headerTitle   = isNokids ? "Girls' Night Out 2026" : "Summer Plans 2026";
  const headerSub     = isNokids
    ? "Just the girls · June – August · Up to 10 people ✨"
    : "Shared availability planner · June – August · Up to 10 people";

  document.getElementById('root').innerHTML = `
    <header class="app-header">
      <div class="header-inner">
        <div class="header-top">
          <span class="header-sun">${headerEmoji}</span>
          <div>
            <h1 class="header-title">${headerTitle}</h1>
            <p class="header-sub">${headerSub}</p>
          </div>
        </div>

        <div class="cal-toggle">
          <button class="cal-btn${activeCalendar==='kids'?' cal-active':''}" onclick="switchCalendar('kids')">🧒 With Kids</button>
          <button class="cal-btn${activeCalendar==='nokids'?' cal-active':''}" onclick="switchCalendar('nokids')">🍷 Girls' Night</button>
        </div>

        <div class="tab-bar">
          <button class="tab-btn${tab==='calendar'?' active':''}" onclick="setTab('calendar')">📅 Calendar</button>
          <button class="tab-btn${tab==='best'?' active':''}" onclick="setTab('best')">🏆 Best Days</button>
        </div>
      </div>
    </header>

    <div class="main">
      <div class="panel">
        <div class="people-header">
          <span class="people-label">Who's joining? (${state.people.length}/10)</span>
          ${activePerson ? `<span class="editing-badge">✏️ Editing: ${esc(activePerson.name)}</span>` : ''}
        </div>
        <div class="people-list">${peopleHTML}</div>
        ${addInputSection}
      </div>

      ${bannerHTML}
      ${calendarHTML}
      ${tab === 'best' ? bestDaysHTML() : ''}
    </div>

    <div class="save-dot" id="save-dot">Saved ✓</div>
  `;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

function onFbData(cal, data) {
  if (data) {
    states[cal].people = data.people || [];
    states[cal].avail  = data.avail  || {};
  }
  readyCount++;
  if (readyCount === 2) render(); // render once both calendars have loaded
  else if (readyCount > 2 && cal === activeCalendar) render(); // live updates
}

function waitForFb() {
  if (window._fbOnKids && window._fbOnNokids) {
    window._fbOnKids(data   => onFbData('kids',   data));
    window._fbOnNokids(data => onFbData('nokids', data));
  } else {
    setTimeout(waitForFb, 50);
  }
}

waitForFb();
</script>
</body>
</html>
