<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Country</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 6px;
            color: #93c5fd;
            letter-spacing: 1px;
        }

        #subtitle {
            color: #64748b;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        #score-bar {
            display: flex;
            gap: 32px;
            margin-bottom: 20px;
            background: #1e293b;
            padding: 12px 28px;
            border-radius: 12px;
        }

        .score-item {
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-item .value {
            display: block;
            font-size: 1.6rem;
            font-weight: bold;
            color: #93c5fd;
        }

        #map-container {
            background: #1e293b;
            border-radius: 16px;
            width: 520px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            border: 1px solid #334155;
            position: relative;
        }

        svg#map {
            width: 500px;
            height: 340px;
        }

        .country-path {
            fill: #3b82f6;
            stroke: #93c5fd;
            stroke-width: 1.5;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));
        }

        #loading {
            color: #64748b;
            font-size: 1rem;
        }

        #input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        #guess {
            padding: 12px 18px;
            font-size: 1rem;
            border: 2px solid #334155;
            border-radius: 10px;
            background: #1e293b;
            color: #e2e8f0;
            width: 260px;
            outline: none;
            transition: border-color 0.2s;
        }

        #guess:focus { border-color: #3b82f6; }
        #guess:disabled { opacity: 0.5; }

        button {
            padding: 12px 22px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.4; cursor: default; }

        #submit { background: #3b82f6; color: white; }
        #submit:hover:not(:disabled) { background: #2563eb; }

        #skip { background: #334155; color: #94a3b8; }
        #skip:hover:not(:disabled) { background: #475569; }

        #hint-btn { background: #1e293b; color: #f59e0b; border: 1px solid #f59e0b; }
        #hint-btn:hover:not(:disabled) { background: #2d1f00; }

        #feedback {
            font-size: 1.15rem;
            font-weight: bold;
            min-height: 28px;
            margin-bottom: 6px;
        }

        .correct  { color: #4ade80; }
        .wrong    { color: #f87171; }
        .skipped  { color: #fbbf24; }

        #hint-text {
            font-size: 0.9rem;
            color: #f59e0b;
            min-height: 20px;
            letter-spacing: 3px;
            font-family: monospace;
            font-size: 1rem;
        }

        #question-number {
            color: #475569;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        @media (max-width: 560px) {
            #map-container { width: 100%; height: 280px; }
            svg#map { width: 100%; height: 260px; }
            #input-area { flex-wrap: wrap; justify-content: center; }
            #guess { width: 100%; }
        }
    </style>
</head>
<body>

    <h1>Guess the Country</h1>
    <p id="subtitle">Identify the country from its outline</p>

    <div id="score-bar">
        <div class="score-item"><span class="value" id="score">0</span>Score</div>
        <div class="score-item"><span class="value" id="streak">0</span>Streak</div>
        <div class="score-item"><span class="value" id="total">0</span>Total</div>
    </div>

    <div id="map-container">
        <div id="loading">Loading map data...</div>
        <svg id="map" style="display:none"></svg>
    </div>

    <p id="question-number"></p>

    <div id="input-area">
        <input type="text" id="guess" placeholder="Type country name..." autocomplete="off">
        <button id="submit">Guess</button>
        <button id="skip">Skip</button>
        <button id="hint-btn">Hint</button>
    </div>

    <div id="feedback"></div>
    <div id="hint-text"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
    <script>
    const countryNames = {
        "4":"Afghanistan","8":"Albania","12":"Algeria","24":"Angola","32":"Argentina",
        "36":"Australia","40":"Austria","50":"Bangladesh","56":"Belgium","64":"Bhutan",
        "68":"Bolivia","76":"Brazil","100":"Bulgaria","104":"Myanmar","116":"Cambodia",
        "120":"Cameroon","124":"Canada","140":"Central African Republic","152":"Chile",
        "156":"China","170":"Colombia","178":"Republic of the Congo",
        "180":"Democratic Republic of the Congo","188":"Costa Rica","191":"Croatia",
        "192":"Cuba","203":"Czech Republic","208":"Denmark","214":"Dominican Republic",
        "218":"Ecuador","818":"Egypt","222":"El Salvador","231":"Ethiopia",
        "232":"Eritrea","246":"Finland","250":"France","266":"Gabon","276":"Germany",
        "288":"Ghana","300":"Greece","320":"Guatemala","324":"Guinea","332":"Haiti",
        "340":"Honduras","348":"Hungary","356":"India","360":"Indonesia","364":"Iran",
        "368":"Iraq","372":"Ireland","380":"Italy","388":"Jamaica","392":"Japan",
        "400":"Jordan","398":"Kazakhstan","404":"Kenya","408":"North Korea",
        "410":"South Korea","414":"Kuwait","418":"Laos","422":"Lebanon","430":"Liberia",
        "434":"Libya","440":"Lithuania","450":"Madagascar","454":"Malawi","466":"Mali",
        "484":"Mexico","478":"Mauritania","496":"Mongolia","504":"Morocco",
        "508":"Mozambique","516":"Namibia","524":"Nepal","528":"Netherlands",
        "554":"New Zealand","558":"Nicaragua","562":"Niger","566":"Nigeria","578":"Norway",
        "586":"Pakistan","591":"Panama","598":"Papua New Guinea","604":"Peru",
        "608":"Philippines","616":"Poland","620":"Portugal","642":"Romania","643":"Russia",
        "646":"Rwanda","682":"Saudi Arabia","686":"Senegal","694":"Sierra Leone",
        "703":"Slovakia","705":"Slovenia","706":"Somalia","710":"South Africa",
        "724":"Spain","144":"Sri Lanka","729":"Sudan","752":"Sweden","756":"Switzerland",
        "760":"Syria","762":"Tajikistan","834":"Tanzania","764":"Thailand","788":"Tunisia",
        "792":"Turkey","800":"Uganda","804":"Ukraine","784":"United Arab Emirates",
        "826":"United Kingdom","840":"United States","858":"Uruguay","860":"Uzbekistan",
        "862":"Venezuela","704":"Vietnam","887":"Yemen","894":"Zambia","716":"Zimbabwe",
        "51":"Armenia","31":"Azerbaijan","112":"Belarus","70":"Bosnia and Herzegovina",
        "233":"Estonia","268":"Georgia","417":"Kyrgyzstan","428":"Latvia",
        "807":"North Macedonia","498":"Moldova","688":"Serbia","426":"Lesotho",
        "748":"Eswatini","304":"Greenland"
    };

    // Alternative accepted names
    const aliases = {
        "usa": "United States", "us": "United States", "america": "United States",
        "united states of america": "United States",
        "uk": "United Kingdom", "britain": "United Kingdom", "great britain": "United Kingdom",
        "england": "United Kingdom",
        "drc": "Democratic Republic of the Congo", "dr congo": "Democratic Republic of the Congo",
        "congo kinshasa": "Democratic Republic of the Congo",
        "congo brazzaville": "Republic of the Congo",
        "czechia": "Czech Republic",
        "holland": "Netherlands",
        "burma": "Myanmar",
        "uae": "United Arab Emirates",
        "south korea": "South Korea", "republic of korea": "South Korea",
        "north korea": "North Korea",
        "russia": "Russia", "russian federation": "Russia",
        "iran": "Iran", "persia": "Iran",
        "turkey": "Turkey", "turkiye": "Turkey",
        "bolivia": "Bolivia",
        "tanzania": "Tanzania",
        "eswatini": "Eswatini", "swaziland": "Eswatini",
        "ivory coast": "Côte d'Ivoire", "cote d'ivoire": "Côte d'Ivoire",
        "cape verde": "Cabo Verde",
        "east timor": "Timor-Leste",
        "sao tome": "São Tomé and Príncipe",
    };

    let countries = [];
    let currentCountry = null;
    let answered = false;
    let score = 0, streak = 0, total = 0;
    let hintRevealed = 0;

    const svg = d3.select('#map');
    const W = 500, H = 340;

    async function init() {
        try {
            const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
            const world = await res.json();
            const all = topojson.feature(world, world.objects.countries).features;

            countries = all.filter(f => {
                const id = String(parseInt(f.id));
                return countryNames[id] !== undefined;
            });

            document.getElementById('loading').style.display = 'none';
            svg.style('display', 'block');
            nextCountry();
        } catch(e) {
            document.getElementById('loading').textContent =
                'Could not load map data. Please check your internet connection and refresh.';
        }
    }

    function getName(feature) {
        return countryNames[String(parseInt(feature.id))];
    }

    function nextCountry() {
        answered = false;
        hintRevealed = 0;
        document.getElementById('feedback').textContent = '';
        document.getElementById('hint-text').textContent = '';
        document.getElementById('guess').value = '';
        document.getElementById('guess').disabled = false;
        document.getElementById('submit').disabled = false;
        document.getElementById('skip').disabled = false;
        document.getElementById('hint-btn').disabled = false;

        currentCountry = countries[Math.floor(Math.random() * countries.length)];
        document.getElementById('question-number').textContent =
            `Question ${total + 1}`;
        drawCountry(currentCountry);
        document.getElementById('guess').focus();
    }

    function drawCountry(feature) {
        svg.selectAll('*').remove();

        const projection = d3.geoAzimuthalEqualArea()
            .fitExtent([[20, 20], [W - 20, H - 20]], feature);

        const path = d3.geoPath().projection(projection);

        svg.append('path')
            .datum(feature)
            .attr('class', 'country-path')
            .attr('d', path);
    }

    function checkGuess() {
        if (answered) return;
        const raw = document.getElementById('guess').value.trim();
        if (!raw) return;

        const input = raw.toLowerCase();
        const correct = getName(currentCountry);
        const correctLower = correct.toLowerCase();

        const isCorrect = input === correctLower ||
            (aliases[input] || '').toLowerCase() === correctLower;

        finish(isCorrect, correct);
    }

    function finish(isCorrect, correctName) {
        answered = true;
        total++;
        document.getElementById('total').textContent = total;
        document.getElementById('guess').disabled = true;
        document.getElementById('submit').disabled = true;
        document.getElementById('hint-btn').disabled = true;

        if (isCorrect) {
            score++;
            streak++;
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('feedback').className = 'correct';
            document.getElementById('feedback').textContent = '✓ Correct!';
        } else {
            streak = 0;
            document.getElementById('streak').textContent = '0';
            document.getElementById('feedback').className = 'wrong';
            document.getElementById('feedback').textContent =
                `✗ It was ${correctName}`;
        }

        setTimeout(nextCountry, 2200);
    }

    function skipCountry() {
        if (answered) return;
        const correct = getName(currentCountry);
        document.getElementById('feedback').className = 'skipped';
        document.getElementById('feedback').textContent = `Skipped — it was ${correct}`;
        finish(false, correct);
    }

    function showHint() {
        if (answered) return;
        const name = getName(currentCountry);
        hintRevealed = Math.min(hintRevealed + 1, name.length);

        let hint = '';
        for (let i = 0; i < name.length; i++) {
            if (name[i] === ' ') hint += '  ';
            else if (i < hintRevealed) hint += name[i];
            else hint += '_';
        }
        document.getElementById('hint-text').textContent = hint;
    }

    document.getElementById('submit').addEventListener('click', checkGuess);
    document.getElementById('skip').addEventListener('click', skipCountry);
    document.getElementById('hint-btn').addEventListener('click', showHint);
    document.getElementById('guess').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkGuess();
    });

    init();
    </script>
</body>
</html>
