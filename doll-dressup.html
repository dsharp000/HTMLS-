<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Dress-Up Doll ✨</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --skin: #F5C2A0;
  --skin-shade: #E8A882;
  --skin-line: #C8956C;
}
body {
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  background: linear-gradient(135deg, #ffd6e8 0%, #d6e8ff 50%, #d6ffd6 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 6px;
}
h1 {
  font-size: 1.8em;
  color: #d63384;
  text-shadow: 2px 2px 0 #ffb6d9;
  margin-bottom: 10px;
  letter-spacing: 2px;
}
.game-container {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 820px;
  width: 100%;
}
.doll-panel {
  background: white;
  border-radius: 24px;
  border: 4px solid #ffb6d9;
  padding: 12px;
  box-shadow: 0 8px 32px rgba(214,51,132,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
}
.controls-panel {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 250px;
  max-width: 270px;
}
.category-row {
  background: white;
  border-radius: 12px;
  border: 2.5px solid #e0e0e0;
  padding: 6px 9px;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.07);
}
.category-row.required { border-color: #ff69b4; }
.cat-icon { font-size: 1.1em; width: 22px; text-align: center; flex-shrink: 0; }
.cat-name { font-size: 0.72em; font-weight: bold; color: #999; min-width: 62px; flex-shrink: 0; }
.required .cat-name { color: #d63384; }
.option-name {
  flex: 1; font-size: 0.72em; color: #333;
  text-align: center; background: #f5f5f5;
  border-radius: 7px; padding: 3px 5px; min-width: 0;
}
.nav-btn {
  background: #ff69b4; color: white; border: none;
  border-radius: 50%; width: 24px; height: 24px;
  font-size: 0.8em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; font-weight: bold; flex-shrink: 0;
}
.nav-btn:hover { background: #e55c9e; transform: scale(1.1); }
.nav-btn:active { transform: scale(0.9); }
.section-label {
  font-size: 0.65em; color: #bbb; text-align: center;
  text-transform: uppercase; letter-spacing: 1px; padding: 3px 0 1px;
}

/* Action bar */
.action-row { display: flex; gap: 6px; }
.action-btn {
  flex: 1; border: none; border-radius: 12px; padding: 9px 4px;
  font-family: inherit; font-size: 0.78em; font-weight: bold; color: white;
  cursor: pointer; transition: transform 0.1s, filter 0.15s;
  box-shadow: 0 3px 0 rgba(0,0,0,0.15);
}
.action-btn:hover { filter: brightness(1.08); }
.action-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
.action-btn.surprise { background: #9B59B6; }
.action-btn.save { background: #36C796; }
.action-btn.reset-btn { background: #FF9EB5; }

/* Skin swatches */
.swatch-row {
  background: white; border-radius: 12px; border: 2.5px solid #e0e0e0;
  padding: 6px 9px; display: flex; align-items: center; gap: 7px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.07);
}
.swatch {
  width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent;
  cursor: pointer; transition: transform 0.1s, border-color 0.15s; padding: 0;
}
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: #d63384; transform: scale(1.12); }

/* Doll name */
.doll-name {
  font-family: inherit; font-size: 1em; font-weight: bold; color: #d63384;
  border: none; border-bottom: 2.5px dashed #ffb6d9; background: transparent;
  text-align: center; width: 160px; margin-top: 8px; padding: 3px;
}
.doll-name:focus { outline: none; border-bottom-style: solid; }
.doll-name::placeholder { color: #f0a8cc; }

/* Change feedback */
@keyframes doll-pop { 50% { transform: scale(1.025); } }
.doll-panel svg.pop { animation: doll-pop 0.25s ease; }
@keyframes doll-wiggle {
  25% { transform: rotate(-2deg) scale(1.02); }
  75% { transform: rotate(2deg) scale(1.02); }
}
.doll-panel svg.wiggle { animation: doll-wiggle 0.45s ease; }
</style>
</head>

const SKINS = [
  { name: "Fair",   base: "#FFDBB4", shade: "#F0C49A", line: "#D9A87E" },
  { name: "Peach",  base: "#F5C2A0", shade: "#E8A882", line: "#C8956C" },
  { name: "Tan",    base: "#E0A575", shade: "#C98B5F", line: "#B0774E" },
  { name: "Brown",  base: "#B07B4F", shade: "#96653C", line: "#7D5330" },
  { name: "Deep",   base: "#7C4E2A", shade: "#66401F", line: "#523318" },
];

const SAVE_KEY = "dollDressup.v1";
const state = {};
Object.keys(opts).forEach(k => { state[k] = 0; });
let skinIdx = 1;

/* ---------- persistence ---------- */
function persist() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      state: state, skin: skinIdx,
      name: document.getElementById('doll-name').value
    }));
  } catch(e) {}
}
function restore() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!d) return;
    Object.keys(opts).forEach(k => {
      if (typeof d.state?.[k] === 'number' && d.state[k] < opts[k].length) state[k] = d.state[k];
    });
    if (typeof d.skin === 'number' && d.skin < SKINS.length) skinIdx = d.skin;
    if (d.name) document.getElementById('doll-name').value = d.name;
  } catch(e) {}
}

/* ---------- rendering ---------- */
const layerMap = {
  scene: 'layer-bg', shirt: 'layer-shirt', bottom: 'layer-bottom',
  jacket: 'layer-jacket', shoes: 'layer-shoes',
  hat: 'layer-hat', earrings: 'layer-earrings',
  necklace: 'layer-necklace', bracelet: 'layer-bracelet',
  makeup: 'layer-makeup', glasses: 'layer-glasses'
};

function render(cat) {
  const o = opts[cat][state[cat]];
  document.getElementById('opt-' + cat).textContent = o.name;

  if (cat === 'hair') {
    document.getElementById('layer-hair-back').innerHTML = o.back || '';
    document.getElementById('layer-hair-front').innerHTML = o.front || '';
  } else {
    document.getElementById(layerMap[cat]).innerHTML = o.svg || '';
  }

  // Hide the base mouth when a makeup option (which draws its own lips) is active
  const baseMouth = document.getElementById('base-mouth');
  if (baseMouth) {
    baseMouth.style.display = (state.makeup === 0) ? '' : 'none';
  }
}

function applySkin() {
  const s = SKINS[skinIdx];
  const root = document.documentElement.style;
  root.setProperty('--skin', s.base);
  root.setProperty('--skin-shade', s.shade);
  root.setProperty('--skin-line', s.line);
  document.querySelectorAll('#skin-swatches .swatch').forEach((b, i) => {
    b.classList.toggle('active', i === skinIdx);
  });
}

function buildSwatches() {
  const wrap = document.getElementById('skin-swatches');
  wrap.innerHTML = SKINS.map((s, i) =>
    `<button class="swatch" style="background:${s.base}" title="${s.name}" onclick="setSkin(${i})"></button>`
  ).join('');
}

function pop(cls) {
  const svg = document.getElementById('doll');
  svg.classList.remove('pop', 'wiggle');
  void svg.offsetWidth;   // restart the animation
  svg.classList.add(cls || 'pop');
}

/* ---------- actions ---------- */
function change(cat, dir) {
  state[cat] = (state[cat] + dir + opts[cat].length) % opts[cat].length;
  render(cat);
  pop('pop');
  persist();
}

function setSkin(i) {
  skinIdx = i;
  applySkin();
  pop('pop');
  persist();
}

function surpriseMe() {
  Object.keys(opts).forEach(cat => {
    if (cat === 'scene') return;   // keep the chosen backdrop
    state[cat] = Math.floor(Math.random() * opts[cat].length);
    render(cat);
  });
  pop('wiggle');
  persist();
}

function resetDoll() {
  Object.keys(opts).forEach(cat => { state[cat] = 0; render(cat); });
  skinIdx = 1;
  applySkin();
  pop('wiggle');
  persist();
}

function saveLook() {
  const svg = document.getElementById('doll');
  const clone = svg.cloneNode(true);
  const s = SKINS[skinIdx];
  // Bake the skin vars onto the svg so they survive standalone rendering
  clone.setAttribute('style', `--skin:${s.base};--skin-shade:${s.shade};--skin-line:${s.line}`);
  clone.setAttribute('width', '400');
  clone.setAttribute('height', '840');
  const xml = new XMLSerializer().serializeToString(clone);
  const url = URL.createObjectURL(new Blob([xml], { type: 'image/svg+xml' }));
  const img = new Image();
  img.onload = function() {
    const c = document.createElement('canvas');
    c.width = 400; c.height = 840;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.drawImage(img, 0, 0, c.width, c.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    const nm = (document.getElementById('doll-name').value.trim() || 'my-doll')
      .replace(/[^a-z0-9]+/gi, '-').toLowerCase();
    a.download = nm + '.png';
    a.href = c.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

document.getElementById('doll-name').addEventListener('change', persist);

// Initialize
buildSwatches();
restore();
Object.keys(opts).forEach(cat => render(cat));
applySkin();
