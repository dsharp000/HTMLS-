<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00c853; --gold: #ffd600; --red: #ef5350; --blue: #42a5f5;
      --dark: #090e09; --dark2: #111811; --dark3: #192119;
      --card: #1a241a; --card2: #202e20; --border: #2a3e2a;
      --text: #e8f5e9; --muted: #6a8e6a; --accent: #00e676;
      --correct: #00c853; --wrong: #ef5350;
    }
    body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .app { max-width: 960px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .header {
      background: linear-gradient(160deg, #0b2e10 0%, #143a08 60%, #0a2e1a 100%);
      padding: 18px 20px 0; border-bottom: 2px solid var(--gold);
      position: relative; overflow: hidden;
    }
    .header::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 80% 0%, rgba(255,214,0,0.08) 0%, transparent 60%);
    }
    .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; position: relative; z-index: 1; }
    .trophy-anim { font-size: 44px; animation: glow 2.5s ease-in-out infinite; }
    @keyframes glow { 0%,100%{filter:drop-shadow(0 0 8px rgba(255,214,0,.3))} 50%{filter:drop-shadow(0 0 18px rgba(255,214,0,.7))} }
    .header-text h1 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:2px; color:var(--gold); line-height:1; }
    .header-text p { color:var(--muted); font-size:0.8rem; margin-top:3px; }
    .tabs { display:flex; position:relative; z-index:1; }
    .tab-btn {
      flex:1; padding:11px 6px; border:none; background:transparent;
      color:var(--muted); font-family:'DM Sans',sans-serif; font-weight:500; font-size:0.82rem;
      cursor:pointer; border-top:2px solid transparent; transition:all .2s;
    }
    .tab-btn.active { color:var(--gold); border-top-color:var(--gold); background:rgba(255,214,0,0.04); }
    .tab-btn:hover:not(.active) { color:var(--text); }

    /* LAYOUT */
    .content { flex:1; padding:18px; overflow-y:auto; }
    .section-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:1px; color:var(--accent); margin-bottom:16px; }

    /* BUTTONS */
    .btn {
      background:var(--green); color:#000; font-weight:700; padding:9px 16px;
      border:none; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:0.875rem; transition:all .15s; display:inline-flex; align-items:center; gap:6px;
    }
    .btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn.secondary { background:var(--card2); color:var(--text); border:1px solid var(--border); }
    .btn.secondary:hover { border-color:var(--accent); }
    .btn.gold { background:var(--gold); color:#000; }
    .btn.danger { background:#b71c1c; color:#fff; }
    .btn.sm { padding:6px 12px; font-size:0.78rem; }

    /* INPUTS */
    .input {
      background:var(--card); border:1px solid var(--border); color:var(--text);
      padding:9px 13px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.875rem; outline:none;
    }
    .input:focus { border-color:var(--accent); }
    .input::placeholder { color:var(--muted); }

    /* PLAYERS */
    .add-row { display:flex; gap:10px; margin-bottom:20px; }
    .add-row .input { flex:1; }
    .player-list { display:flex; flex-direction:column; gap:9px; }
    .player-card {
      background:var(--card); border:1px solid var(--border); border-radius:10px;
      padding:12px 15px; display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; transition:all .15s;
    }
    .player-card:hover, .player-card.active { border-color:var(--accent); background:var(--card2); }
    .player-card.active { box-shadow:0 0 0 2px rgba(0,230,118,.2); }
    .player-name { font-weight:700; font-size:0.95rem; }
    .player-status { font-size:0.76rem; color:var(--muted); margin-top:2px; }
    .player-actions { display:flex; gap:8px; }

    /* BANNER */
    .banner { background:rgba(255,214,0,.07); border:1px solid rgba(255,214,0,.25); border-radius:8px; padding:10px 14px; font-size:0.84rem; margin-bottom:16px; color:var(--gold); }
    .editing-bar { background:var(--card2); border:1px solid var(--accent); border-radius:8px; padding:9px 14px; display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .editing-bar span { font-size:0.85rem; color:var(--muted); }
    .editing-bar strong { color:var(--accent); }

    /* PROGRESS */
    .prog-bar { height:4px; background:var(--border); border-radius:2px; margin-bottom:18px; }
    .prog-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--accent)); border-radius:2px; transition:width .3s; }

    /* GROUPS GRID */
    .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(265px,1fr)); gap:12px; }
    .group-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .group-header { background:var(--card2); padding:9px 13px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .group-letter { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1px; color:var(--gold); }
    .results-badge { font-size:0.7rem; background:rgba(0,200,83,.2); color:var(--green); padding:2px 7px; border-radius:10px; }
    .group-teams { padding:6px; display:flex; flex-direction:column; gap:3px; }
    .group-team { display:flex; align-items:center; justify-content:space-between; padding:6px 8px; border-left:3px solid transparent; border-radius:4px; transition:all .15s; }
    .group-team:hover { background:var(--card2); }
    .group-team.rank-1 { background:rgba(0,200,83,.1); border-left-color:var(--green); }
    .group-team.rank-2 { background:rgba(0,200,83,.05); border-left-color:rgba(0,200,83,.4); }
    .group-team.rank-3 { background:rgba(255,214,0,.04); border-left-color:rgba(255,214,0,.3); }
    .group-team.correct { border-left-color:var(--correct) !important; }
    .group-team.wrong { border-left-color:var(--wrong) !important; }
    .team-info { display:flex; align-items:center; gap:7px; }
    .flag { font-size:1.15rem; }
    .team-name { font-size:0.82rem; font-weight:500; }
    .check { color:var(--correct); font-size:0.8rem; font-weight:700; }
    .cross { color:var(--wrong); font-size:0.8rem; font-weight:700; }
    .rank-buttons { display:flex; gap:3px; }
    .rank-btn { width:24px; height:24px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:0.72rem; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .rank-btn:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
    .rank-btn.active.pos-1 { background:var(--green); border-color:var(--green); color:#000; }
    .rank-btn.active.pos-2 { background:#43a047; border-color:#43a047; color:#000; }
    .rank-btn.active.pos-3 { background:#f9a825; border-color:#f9a825; color:#000; }
    .group-footer { padding:7px 12px 10px; }
    .advance-label { font-size:0.72rem; color:var(--muted); }
    .advance-label.done { color:var(--green); }

    /* BRACKET */
    .bracket-scroll { overflow-x:auto; padding-bottom:8px; }
    .bracket-rounds { display:flex; gap:14px; min-width:fit-content; }
    .bracket-round { min-width:175px; }
    .round-title { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
    .matchups { display:flex; flex-direction:column; gap:16px; }
    .matchup { background:var(--card); border:1px solid var(--border); border-radius:9px; overflow:hidden; }
    .knockout-slot {
      display:flex; align-items:center; gap:6px; width:100%; padding:8px 11px;
      background:transparent; border:none; color:var(--text); cursor:pointer; text-align:left;
      font-family:'DM Sans',sans-serif; font-size:0.8rem; transition:background .15s;
    }
    .knockout-slot:hover:not(.empty) { background:rgba(0,230,118,.07); }
    .knockout-slot.empty { color:var(--muted); cursor:default; }
    .knockout-slot.correct { background:rgba(0,200,83,.15); color:var(--correct); font-weight:700; }
    .knockout-slot.wrong { background:rgba(239,83,80,.1); color:var(--wrong); }
    .knockout-slot.pending { background:rgba(255,214,0,.08); }
    .slot-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:110px; }
    .slot-icon { margin-left:auto; font-size:0.75rem; }
    .vs-line { display:block; width:100%; text-align:center; font-size:0.68rem; color:var(--muted); padding:2px 0; background:var(--dark2); }
    .winner-badge { padding:5px 11px; font-size:0.73rem; color:var(--accent); background:rgba(0,230,118,.07); border-top:1px solid var(--border); }

    /* CHAMPION */
    .champion-section { margin-top:20px; background:linear-gradient(135deg,var(--card) 0%,var(--dark3) 100%); border:1px solid var(--border); border-radius:12px; padding:18px; text-align:center; }
    .champion-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--gold); letter-spacing:1px; margin-bottom:14px; }
    .finalist-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; }
    .finalist-btn {
      background:var(--card2); border:2px solid var(--border); color:var(--text);
      padding:11px 18px; border-radius:9px; font-family:'DM Sans',sans-serif;
      font-size:0.87rem; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:8px;
    }
    .finalist-btn:hover { border-color:var(--gold); }
    .finalist-btn.chosen { border-color:var(--gold); background:rgba(255,214,0,.12); color:var(--gold); }
    .finalist-btn.correct-pick { border-color:var(--correct); background:rgba(0,200,83,.15); color:var(--correct); }
    .finalist-btn.wrong-pick { border-color:var(--wrong); background:rgba(239,83,80,.1); color:var(--wrong); }

    /* RESULTS TAB */
    .results-section { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:16px; overflow:hidden; }
    .results-section-header { background:var(--card2); padding:12px 16px; border-bottom:1px solid var(--border); font-weight:700; font-size:0.85rem; }
    .results-body { padding:14px; }
    .team-picker { display:flex; flex-wrap:wrap; gap:6px; }
    .team-chip {
      background:var(--card2); border:1px solid var(--border); border-radius:20px;
      padding:4px 10px; font-size:0.75rem; cursor:pointer; transition:all .15s;
      display:flex; align-items:center; gap:5px; color:var(--text); font-family:'DM Sans',sans-serif;
    }
    .team-chip:hover { border-color:var(--accent); }
    .team-chip.selected { background:rgba(0,200,83,.15); border-color:var(--correct); color:var(--correct); }

    /* LEADERBOARD */
    .lb-list { display:flex; flex-direction:column; gap:10px; }
    .lb-row {
      background:var(--card); border:1px solid var(--border); border-radius:11px;
      padding:13px 15px; display:flex; align-items:center; gap:14px;
    }
    .lb-row.rank-1 { border-color:rgba(255,214,0,.5); background:rgba(255,214,0,.04); }
    .lb-row.rank-2 { border-color:rgba(176,190,197,.3); }
    .lb-row.rank-3 { border-color:rgba(255,143,0,.3); }
    .lb-medal { font-size:1.6rem; min-width:36px; text-align:center; }
    .lb-info { flex:1; }
    .lb-name { font-weight:700; font-size:0.95rem; }
    .lb-champ { font-size:0.78rem; color:var(--gold); margin-top:4px; }
    .lb-score { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:var(--accent); line-height:1; min-width:50px; text-align:right; }
    .lb-score.zero { color:var(--muted); }
    .lb-breakdown { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
    .bd-chip { font-size:0.7rem; padding:2px 6px; border-radius:6px; background:var(--card2); color:var(--muted); }
    .bd-chip.has-pts { background:rgba(0,200,83,.15); color:var(--correct); }

    /* SCORING GUIDE */
    .scoring-guide { background:var(--dark3); border-radius:9px; padding:14px; margin-top:20px; }
    .scoring-guide h3 { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; color:var(--muted); letter-spacing:1px; margin-bottom:10px; }
    .scoring-row { display:flex; justify-content:space-between; font-size:0.8rem; padding:5px 0; border-bottom:1px solid var(--border); color:var(--muted); }
    .scoring-row:last-child { border-bottom:none; }
    .scoring-row .pts { color:var(--gold); font-weight:700; }

    /* SAVE BAR */
    .save-bar { position:sticky; bottom:0; background:var(--dark2); border-top:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; gap:12px; }
    .save-bar .for-label { flex:1; font-size:0.84rem; color:var(--muted); }
    .save-bar strong { color:var(--accent); }

    /* MISC */
    .empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
    .empty-state .icon { font-size:2.8rem; margin-bottom:10px; }
    .empty-state p { font-size:0.88rem; line-height:1.6; }
    .divider { height:1px; background:var(--border); margin:18px 0; }

    /* SPLIT BRACKET */
    .bk-col { width:128px; flex-shrink:0; }
    .bk-col-final { width:164px; flex-shrink:0; }
    .bk-col-hdr { font-family:'Bebas Neue',sans-serif; font-size:0.72rem; letter-spacing:1px; color:var(--muted); text-align:center; padding-bottom:6px; }
    .bk-card { position:absolute; left:0; right:0; background:var(--card); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
    .bk-slot { display:flex; align-items:center; gap:4px; width:100%; padding:0 7px; height:30px; background:transparent; border:none; color:var(--text); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:500; transition:background .15s; text-align:left; }
    .bk-slot:hover:not(.bk-empty) { background:rgba(0,230,118,.07); }
    .bk-empty { color:var(--muted); cursor:default; }
    .bk-label { font-style:italic; color:var(--muted); font-size:0.68rem; }
    .bk-chosen { background:rgba(0,230,118,.1); }
    .bk-correct { background:rgba(0,200,83,.18); color:var(--correct); font-weight:700; }
    .bk-wrong { background:rgba(239,83,80,.1); color:var(--wrong); }
    .bk-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:82px; }
    .bk-vs { background:var(--dark2); text-align:center; font-size:0.6rem; color:var(--muted); height:16px; display:flex; align-items:center; justify-content:center; }
    .bk-winner { height:24px; padding:0 7px; font-size:0.63rem; color:var(--accent); background:rgba(0,230,118,.05); border-top:1px solid var(--border); display:flex; align-items:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .bk-win-ok { color:var(--correct); }
    .bk-win-err { color:var(--wrong); }

    /* LIVE SCORES */
    .ls-section { background:var(--card2); border:1px solid var(--border); border-radius:10px; margin-bottom:18px; overflow:hidden; }
    .ls-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-weight:700; font-size:0.88rem; }
    .ls-meta { font-size:0.72rem; color:var(--muted); font-weight:400; }
    .ls-empty { padding:20px; text-align:center; color:var(--muted); font-size:0.84rem; }
    .ls-date-label { padding:5px 14px; font-size:0.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); background:var(--dark2); border-top:1px solid var(--border); }
    .ls-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:9px 14px; border-top:1px solid var(--border); gap:8px; }
    .ls-row:first-of-type { border-top:none; }
    .ls-row.ls-live { background:rgba(0,230,118,.04); }
    .ls-team { display:flex; align-items:center; gap:6px; }
    .ls-team-away { justify-content:flex-end; }
    .ls-flag { font-size:1.1rem; line-height:1; }
    .ls-name { font-size:0.8rem; color:var(--text); }
    .ls-winner { color:var(--green); font-weight:700; }
    .ls-scores { display:flex; align-items:center; gap:6px; justify-content:center; }
    .ls-num { font-size:1rem; font-weight:800; min-width:16px; text-align:center; }
    .ls-badge { font-size:0.66rem; font-weight:700; padding:2px 7px; border-radius:4px; white-space:nowrap; }
    .ls-badge-live { background:rgba(0,230,118,.2); color:var(--green); }
    .ls-badge-ft { background:rgba(255,255,255,.06); color:var(--muted); }
    .ls-badge-sched { color:var(--muted); font-size:0.64rem; }
    .ls-dot { font-size:0.55rem; margin-right:2px; animation:ls-blink 1s infinite; }
    @keyframes ls-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* THIRD PLACE RANKING */
    .third-rank-section { margin-top:24px; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:16px; }
    .third-rank-header { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1px; color:var(--gold); margin-bottom:4px; }
    .third-rank-sub { font-size:0.78rem; color:var(--muted); margin-bottom:14px; line-height:1.5; }
    .third-rank-slots { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
    .third-slot { display:flex; align-items:center; gap:5px; background:var(--card); border:1px solid var(--border); border-radius:7px; padding:6px 8px; min-height:36px; }
    .third-slot.filled { border-color:rgba(255,214,0,.4); background:rgba(255,214,0,.05); }
    .third-slot-num { font-size:0.68rem; font-weight:800; color:var(--gold); min-width:14px; }
    .third-slot-flag { font-size:1rem; line-height:1; }
    .third-slot-name { font-size:0.72rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .third-slot-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:0 2px; line-height:1; }
    .third-slot-remove:hover { color:var(--wrong); }
    .third-slot-empty { font-size:0.72rem; color:var(--border); margin-left:4px; }
    .third-available { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-top:8px; }
    .third-avail-label { font-size:0.72rem; color:var(--muted); }
    .third-chip { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:20px; padding:4px 10px; font-size:0.75rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:border-color .15s,background .15s; }
    .third-chip:hover:not(:disabled) { border-color:var(--gold); background:rgba(255,214,0,.08); }
    .third-chip:disabled { opacity:0.4; cursor:default; }
    .third-chip-out { opacity:0.45; cursor:default; text-decoration:line-through; }
    .third-avail-out { color:var(--wrong) !important; }

    /* ADMIN */
    .admin-bar { display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(255,214,0,.07); border:1px solid rgba(255,214,0,.3); border-radius:8px; margin-bottom:14px; flex-wrap:wrap; }
    .admin-badge { font-size:0.82rem; font-weight:700; color:var(--gold); }

    /* QUALIFIER COUNTER */
    .qualifier-counter { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--card2); border:1px solid var(--border); border-radius:8px; margin-bottom:12px; }
    .qc-label { font-size:0.8rem; color:var(--muted); }
    .qc-count { font-size:1rem; font-weight:800; color:var(--gold); min-width:30px; }
    .qc-count.qc-done { color:var(--green); }
    .qc-note { font-size:0.72rem; color:var(--muted); opacity:0.7; margin-left:auto; }

    /* SYNC ROW */
    .sync-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding:10px 14px; background:var(--card2); border-radius:8px; border:1px solid var(--border); flex-wrap:wrap; }
    .sync-time { font-size:0.75rem; color:var(--muted); }
    .btn-sync { background:transparent; border:1px solid var(--accent); color:var(--accent); border-radius:6px; padding:5px 14px; font-size:0.78rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .15s; white-space:nowrap; }
    .btn-sync:hover:not(:disabled) { background:rgba(0,230,118,.1); }
    .btn-sync:disabled { opacity:0.5; cursor:default; }

const { useState, useEffect, useRef } = React;

};

const SCORING = { group: 1, third: 1, r32: 2, r16: 3, qf: 5, sf: 8, final: 13, champion: 20 };
const ROUND_KEYS = ["r32", "r16", "qf", "sf", "final"];

const TABS = ["👥 Players", "🌍 Groups", "🏆 Bracket", "🎯 Results", "📊 Scores"];

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {

function sanitizeKey(n) { return n.replace(/[.#$[\]/\s]/g, '_'); }

// ─── BRACKET CONSTANTS ───────────────────────────────────────────────────────
const B_UNIT = 112, B_SH = 100, B_COLS = 8;
const bTop = (r, i) => (Math.pow(2, r) * i + Math.pow(2, r) / 2) * B_UNIT - B_SH / 2;

// Actual 2026 WC R32 pairings in bracket order (left side → SF M101, right side → SF M102)
const BRACKET = [
  ['2A','2B'], ['1F','2C'],   // M73, M75 → R16 M89
  ['1E','3rd'],['1I','3rd'],  // M74, M77 → R16 M90
  ['2K','2L'], ['1H','2J'],   // M83, M84 → R16 M93
  ['1D','3rd'],['1G','3rd'],  // M81, M82 → R16 M94
  ['1C','2F'], ['2E','2I'],   // M76, M78 → R16 M91
  ['1A','3rd'],['1L','3rd'],  // M79, M80 → R16 M92
  ['1J','2H'], ['2D','2G'],   // M86, M88 → R16 M95
  ['1B','3rd'],['1K','3rd'],  // M85, M87 → R16 M96
];
const BRACKET_LABELS = BRACKET.flatMap(([a,b]) => [a,b]);

function getAdvancers(groupsData, thirdRanked) {
  const adv = new Array(32).fill(null);
  let ti = 0;
  const resolve = pos => {
    if (pos === '3rd') return (thirdRanked || [])[ti++] || null;
    const g = groupsData[pos[1]] || [];
    return g[pos[0] === '1' ? 0 : 1] || null;
  };
  BRACKET.forEach(([posA, posB], mi) => {
    adv[mi * 2]     = resolve(posA);
    adv[mi * 2 + 1] = resolve(posB);
  });
  return adv;
}

function getKnockoutMatchups(roundKey, koData, groupsData, thirdRanked) {
  const idx = ROUND_KEYS.indexOf(roundKey);
  if (idx === 0) {
    const adv = getAdvancers(groupsData, thirdRanked);
    const matchups = [];
    for (let i = 0; i < 32; i += 2) matchups.push([adv[i] || null, adv[i + 1] || null]);
    return matchups;
  }
  const prevKey = ROUND_KEYS[idx - 1];
  const prev    = koData[prevKey] || [];
  const matchups = [];
  for (let i = 0; i < prev.length; i += 2) matchups.push([prev[i] || null, prev[i + 1] || null]);
  return matchups;
}

function BracketCol({ title, roundKey, halfOffset, count, level, allMatchups, ko, resultKo, onPick }) {
  const NH = B_COLS * B_UNIT;
  const isR32 = roundKey === 'r32';
  return (
    <div className="bk-col">
      <div className="bk-col-hdr">{title}</div>
      <div style={{ position:'relative', height:NH }}>
        {Array.from({ length: count }, (_, li) => {
          const gi = halfOffset + li;
          const m = allMatchups[gi] || [null, null];
          const picked = ko[roundKey]?.[gi];
          const actual = resultKo?.[roundKey]?.[gi];
          const cls = t => picked !== t ? '' : !actual ? 'bk-chosen' : actual === t ? 'bk-correct' : 'bk-wrong';
          const winCls = !actual || !picked ? '' : picked === actual ? 'bk-win-ok' : 'bk-win-err';
          const labelA = isR32 ? BRACKET_LABELS[(gi) * 2] : null;
          const labelB = isR32 ? BRACKET_LABELS[(gi) * 2 + 1] : null;
          const slotA = m[0] ? <>{FLAGS[m[0]] || '🏳️'} <span className="bk-name">{m[0]}</span></> : <span className="bk-label">{labelA || 'TBD'}</span>;
          const slotB = m[1] ? <>{FLAGS[m[1]] || '🏳️'} <span className="bk-name">{m[1]}</span></> : <span className="bk-label">{labelB || 'TBD'}</span>;
          return (
            <div key={li} className="bk-card" style={{ top: bTop(level, li) }}>
              <button className={`bk-slot ${!m[0] ? 'bk-empty' : cls(m[0])}`}
                onClick={() => m[0] && onPick(roundKey, gi * 2, m[0])}>
                {slotA}
              </button>
              <div className="bk-vs">vs</div>
              <button className={`bk-slot ${!m[1] ? 'bk-empty' : cls(m[1])}`}
                onClick={() => m[1] && onPick(roundKey, gi * 2 + 1, m[1])}>
                {slotB}
              </button>
              <div className={`bk-winner ${winCls}`}>
                {picked ? `${FLAGS[picked] || ''} ${picked}${actual ? (picked === actual ? ' ✓' : ' ✗') : ''}` : ''}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── SCORING ENGINE ──────────────────────────────────────────────────────────
function calcScore(playerPicks, results) {
  let pts = 0;
  const breakdown = { group: 0, third: 0, r32: 0, r16: 0, qf: 0, sf: 0, final: 0, champion: 0 };

  for (const letter of Object.keys(GROUPS)) {
    const rg = results.groups[letter] || [];
    const pg = playerPicks.groups[letter] || [];
    for (let rank = 0; rank < 3; rank++) {
      if (pg[rank] && rg[rank] && pg[rank] === rg[rank]) {
        pts += SCORING.group;
        breakdown.group += SCORING.group;
      }
    }
  }

  const rTR = results.thirdRanked || [];
  const pTR = (playerPicks.thirdRanked || []);
  for (let i = 0; i < Math.min(8, rTR.length); i++) {
    if (pTR[i] && rTR[i] && pTR[i] === rTR[i]) {
      pts += SCORING.third;
      breakdown.third += SCORING.third;
    }
  }

  for (const rk of ROUND_KEYS) {
    const rr = results.knockout[rk] || [];
    const pr = playerPicks.knockout[rk] || [];
    const pts_per = SCORING[rk];
    for (let i = 0; i < Math.max(rr.length, pr.length); i++) {
      if (pr[i] && rr[i] && pr[i] === rr[i]) {
        pts += pts_per;
        breakdown[rk] += pts_per;
      }
    }
  }

  if (playerPicks.champion && results.champion && playerPicks.champion === results.champion) {
    pts += SCORING.champion;
    breakdown.champion += SCORING.champion;
  }

  return { total: pts, breakdown };
}

// ─── ESPN LIVE SYNC ──────────────────────────────────────────────────────────
const ESPN_NAMES = {
  'Curacao': 'Curaçao',
  'Korea Republic': 'South Korea',
  'IR Iran': 'Iran',
  'DR Congo': 'DR Congo',
};
const espnName = n => ESPN_NAMES[n] || n;

function getESPNRoundByDate(d) {
  if (!d) return null;
  if (d >= '2026-06-28' && d <= '2026-07-03') return 'r32';
  if (d >= '2026-07-04' && d <= '2026-07-07') return 'r16';
  if (d >= '2026-07-09' && d <= '2026-07-11') return 'qf';
  if (d >= '2026-07-14' && d <= '2026-07-15') return 'sf';
  if (d === '2026-07-19') return 'final';
  return null;
}

function findKnockoutSlot(roundKey, teamA, teamB, resultGroups, resultKo, thirdRanked) {
  const matchups = getKnockoutMatchups(roundKey, resultKo, resultGroups, thirdRanked);
  for (let i = 0; i < matchups.length; i++) {
    const [a, b] = matchups[i] || [];
    if (a && b && ((a === teamA && b === teamB) || (a === teamB && b === teamA))) return i;
  }
  return -1;
}

async function syncESPN(currentResults) {
  const out = {
    groups:      { ...currentResults.groups },
    knockout:    JSON.parse(JSON.stringify(currentResults.knockout || {})),
    champion:    currentResults.champion    || null,
    finalScore:  currentResults.finalScore  || [null, null],
    thirdRanked: currentResults.thirdRanked || [],
  };

  // 1. Group standings → auto-populate group results when teams have played
  try {
    const r = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026');
    const d = await r.json();
    for (const grp of (d.children || [])) {
      const raw    = (grp.abbreviation || grp.name || '').trim();
      const letter = raw.length === 1 ? raw : raw.replace(/^Group\s*/i, '').trim();
      if (!letter || letter.length !== 1) continue;
      const entries = (grp.standings?.entries || []).slice().sort((a, b) => {
        const rank = e => +(e.stats?.find(s => s.name === 'rank')?.value ?? 99);
        return rank(a) - rank(b);
      });
      const gp = +(entries[0]?.stats?.find(s => s.name === 'gamesPlayed')?.value ?? 0);
      if (gp === 0) continue;
      const top2 = entries.slice(0, 3).map(e => espnName(e.team.displayName));
      if (top2[0] && top2[1]) out.groups[letter] = top2;
    }
  } catch(e) { console.warn('ESPN standings sync failed:', e); }

  // 2. Knockout results — fetch all completed matches from R32 start through today
  try {
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    if (today >= '20260628') {
      const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-${today}&limit=200`;
      const r = await fetch(url);
      const d = await r.json();
      // Sort events by date so earlier rounds are processed first (needed for slot matching)
      const events = (d.events || []).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      for (const ev of events) {
        const comp = ev.competitions?.[0];
        if (!comp || comp.status?.type?.name !== 'STATUS_FINAL') continue;
        const dateStr = (ev.date || '').slice(0, 10);
        const rk = getESPNRoundByDate(dateStr);
        if (!rk) continue;
        const comps  = comp.competitors || [];
        const tA     = espnName(comps[0]?.team?.displayName);
        const tB     = espnName(comps[1]?.team?.displayName);
        const winner = espnName(comps.find(c => c.winner)?.team?.displayName);
        if (!tA || !tB || !winner) continue;
        const slot = findKnockoutSlot(rk, tA, tB, out.groups, out.knockout, out.thirdRanked);
        if (slot >= 0) {
          if (!out.knockout[rk]) out.knockout[rk] = [];
          out.knockout[rk][slot] = winner;
        }
      }
      // Auto-set champion from final result
      if (out.knockout.final?.[0]) out.champion = out.knockout.final[0];
    }
  } catch(e) { console.warn('ESPN knockout sync failed:', e); }

  return out;
}

// ─── COMPONENTS ──────────────────────────────────────────────────────────────
function GroupCard({ letter, picks, onPick, results, resultsMode }) {
  const teams  = GROUPS[letter];
  const picked = picks[letter] || [];
  const actual = results[letter] || [];

  return (
    <div className="group-card">
      <div className="group-header">
        <span className="group-letter">Group {letter}</span>
        {resultsMode && actual.length >= 3 && <span className="results-badge">✓ Set</span>}
      </div>
      <div className="group-teams">
        {teams.map(team => {
          const rank = picked.indexOf(team);
          const actualRank = actual.indexOf(team);
          let correctness = null;
          if (!resultsMode && actual.length >= 3 && rank >= 0 && rank < 3) {
            correctness = actual[rank] === team ? "correct" : "wrong";
          }
          return (
            <div key={team} className={`group-team ${rank >= 0 ? `ranked rank-${rank + 1}` : ""} ${correctness || ""}`}>
              <div className="team-info">
                <span className="flag">{FLAGS[team] || "🏳️"}</span>
                <span className="team-name">{team}</span>
                {correctness === "correct" && <span className="check">✓</span>}
                {correctness === "wrong" && <span className="cross">✗</span>}
              </div>
              <div className="rank-buttons">
                {[1, 2, 3].map(r => (
                  <button
                    key={r}
                    className={`rank-btn ${rank === r - 1 ? "active" : ""} pos-${r}`}
                    onClick={() => onPick(letter, team, r - 1)}
                    title={r === 1 ? "1st" : r === 2 ? "2nd" : "3rd"}
                  >{r}</button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div className="group-footer">
        <span className={`advance-label ${picked.length >= 3 ? "done" : ""}`}>
          {picked.length >= 3
            ? `${FLAGS[picked[0]]}${picked[0]} · ${FLAGS[picked[1]]}${picked[1]} · ${FLAGS[picked[2]]}${picked[2]}`
            : resultsMode ? "Set actual top 3" : `Pick 1st, 2nd & 3rd (${picked.length}/3)`}
        </span>
      </div>
    </div>
  );
}

function KnockoutSlot({ team, onClick, state }) {
  return (
    <button className={`knockout-slot ${team ? "filled" : "empty"} ${state || ""}`} onClick={onClick}>
      {team ? (
        <>
          <span>{FLAGS[team] || "🏳️"}</span>
          <span className="slot-name">{team}</span>
          {state === "correct" && <span className="slot-icon">✓</span>}
          {state === "wrong"   && <span className="slot-icon">✗</span>}
        </>
      ) : <span className="tbd">TBD</span>}
    </button>
  );
}

  const [tab, setTab]               = useState(0);

  const [resultGroups, setResultGroups]         = useState({});

  const [thirdRanked, setThirdRanked]             = useState([]);

  const [isAdmin, setIsAdmin]                     = useState(() => localStorage.getItem('wc_admin') === '1');
