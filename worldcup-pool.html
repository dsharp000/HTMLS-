<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00c853; --gold: #ffd600; --red: #ef5350; --blue: #42a5f5;
      --dark: #090e09; --dark2: #111811; --dark3: #192119;
      --card: #1a241a; --card2: #202e20; --border: #2a3e2a;
      --text: #e8f5e9; --muted: #6a8e6a; --accent: #00e676;
      --correct: #00c853; --wrong: #ef5350;
    }
    body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .app { max-width: 960px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .header {
      background: linear-gradient(160deg, #0b2e10 0%, #143a08 60%, #0a2e1a 100%);
      padding: 18px 20px 0; border-bottom: 2px solid var(--gold);
      position: relative; overflow: hidden;
    }
    .header::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 80% 0%, rgba(255,214,0,0.08) 0%, transparent 60%);
    }
    .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; position: relative; z-index: 1; }
    .trophy-anim { font-size: 44px; animation: glow 2.5s ease-in-out infinite; }
    @keyframes glow { 0%,100%{filter:drop-shadow(0 0 8px rgba(255,214,0,.3))} 50%{filter:drop-shadow(0 0 18px rgba(255,214,0,.7))} }
    .header-text h1 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:2px; color:var(--gold); line-height:1; }
    .header-text p { color:var(--muted); font-size:0.8rem; margin-top:3px; }
    .tabs { display:flex; position:relative; z-index:1; }
    .tab-btn {
      flex:1; padding:11px 6px; border:none; background:transparent;
      color:var(--muted); font-family:'DM Sans',sans-serif; font-weight:500; font-size:0.82rem;
      cursor:pointer; border-top:2px solid transparent; transition:all .2s;
    }
    .tab-btn.active { color:var(--gold); border-top-color:var(--gold); background:rgba(255,214,0,0.04); }
    .tab-btn:hover:not(.active) { color:var(--text); }

    /* LAYOUT */
    .content { flex:1; padding:18px; overflow:auto; scrollbar-width:thin; scrollbar-color:var(--border) var(--dark2); }
    .content::-webkit-scrollbar { width:12px; height:12px; -webkit-appearance:none; }
    .content::-webkit-scrollbar-track { background:var(--dark2); }
    .content::-webkit-scrollbar-thumb { background:var(--border); border-radius:6px; border:2px solid var(--dark2); }
    .content::-webkit-scrollbar-thumb:hover { background:var(--accent); }
    .content::-webkit-scrollbar-corner { background:var(--dark2); }
    .section-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:1px; color:var(--accent); margin-bottom:16px; }

    /* BUTTONS */
    .btn {
      background:var(--green); color:#000; font-weight:700; padding:9px 16px;
      border:none; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:0.875rem; transition:all .15s; display:inline-flex; align-items:center; gap:6px;
    }
    .btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn.secondary { background:var(--card2); color:var(--text); border:1px solid var(--border); }
    .btn.secondary:hover { border-color:var(--accent); }
    .btn.gold { background:var(--gold); color:#000; }
    .btn.danger { background:#b71c1c; color:#fff; }
    .btn.sm { padding:6px 12px; font-size:0.78rem; }

    /* INPUTS */
    .input {
      background:var(--card); border:1px solid var(--border); color:var(--text);
      padding:9px 13px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.875rem; outline:none;
    }
    .input:focus { border-color:var(--accent); }
    .input::placeholder { color:var(--muted); }

    /* PLAYERS */
    .add-row { display:flex; gap:10px; margin-bottom:20px; }
    .add-row .input { flex:1; }
    .player-list { display:flex; flex-direction:column; gap:9px; }
    .player-card {
      background:var(--card); border:1px solid var(--border); border-radius:10px;
      padding:12px 15px; display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; transition:all .15s;
    }
    .player-card:hover, .player-card.active { border-color:var(--accent); background:var(--card2); }
    .player-card.active { box-shadow:0 0 0 2px rgba(0,230,118,.2); }
    .player-name { font-weight:700; font-size:0.95rem; }
    .player-status { font-size:0.76rem; color:var(--muted); margin-top:4px; }
    .status-chips { display:inline-flex; flex-wrap:wrap; gap:3px 10px; align-items:center; }
    .status-chip { font-size:0.72rem; font-weight:600; white-space:nowrap; }
    .player-actions { display:flex; gap:8px; }

    /* BANNER */
    .banner { background:rgba(255,214,0,.07); border:1px solid rgba(255,214,0,.25); border-radius:8px; padding:10px 14px; font-size:0.84rem; margin-bottom:16px; color:var(--gold); }
    .editing-bar { background:var(--card2); border:1px solid var(--accent); border-radius:8px; padding:9px 14px; display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .editing-bar span { font-size:0.85rem; color:var(--muted); }
    .editing-bar strong { color:var(--accent); }

    /* PROGRESS */
    .prog-bar { height:4px; background:var(--border); border-radius:2px; margin-bottom:18px; }
    .prog-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--accent)); border-radius:2px; transition:width .3s; }

    /* GROUPS GRID */
    .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(265px,1fr)); gap:12px; }
    .group-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .group-header { background:var(--card2); padding:9px 13px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .group-letter { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1px; color:var(--gold); }
    .results-badge { font-size:0.7rem; background:rgba(0,200,83,.2); color:var(--green); padding:2px 7px; border-radius:10px; }
    .group-teams { padding:6px; display:flex; flex-direction:column; gap:3px; }
    .group-team { display:flex; align-items:center; justify-content:space-between; padding:6px 8px; border-left:3px solid transparent; border-radius:4px; transition:all .15s; }
    .group-team:hover { background:var(--card2); }
    .group-team.rank-1 { background:rgba(0,200,83,.1); border-left-color:var(--green); }
    .group-team.rank-2 { background:rgba(0,200,83,.05); border-left-color:rgba(0,200,83,.4); }
    .group-team.rank-3 { background:rgba(255,214,0,.04); border-left-color:rgba(255,214,0,.3); }
    .group-team.correct { border-left-color:var(--correct) !important; }
    .group-team.wrong { border-left-color:var(--wrong) !important; }
    .team-info { display:flex; align-items:center; gap:7px; }
    .flag { font-size:1.15rem; }
    .team-name { font-size:0.82rem; font-weight:500; }
    .check { color:var(--correct); font-size:0.8rem; font-weight:700; }
    .cross { color:var(--wrong); font-size:0.8rem; font-weight:700; }
    .rank-buttons { display:flex; gap:3px; }
    .rank-btn { width:24px; height:24px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:0.72rem; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .rank-btn:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
    .rank-btn.active.pos-1 { background:var(--green); border-color:var(--green); color:#000; }
    .rank-btn.active.pos-2 { background:#43a047; border-color:#43a047; color:#000; }
    .rank-btn.active.pos-3 { background:#f9a825; border-color:#f9a825; color:#000; }
    .group-footer { padding:7px 12px 10px; }
    .advance-label { font-size:0.72rem; color:var(--muted); }
    .advance-label.done { color:var(--green); }

    /* BRACKET */
    .bracket-scroll { overflow-x:auto; padding-bottom:8px; }
    /* Bracket wrapper: don't trap the overflow — let .content scroll both ways
       so the horizontal scrollbar sits at the bottom of the window (reachable). */
    .bracket-area { overflow:visible; padding-bottom:4px; }
    .bracket-rounds { display:flex; gap:14px; min-width:fit-content; }
    .bracket-round { min-width:175px; }
    .round-title { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
    .matchups { display:flex; flex-direction:column; gap:16px; }
    .matchup { background:var(--card); border:1px solid var(--border); border-radius:9px; overflow:hidden; }
    .knockout-slot {
      display:flex; align-items:center; gap:6px; width:100%; padding:8px 11px;
      background:transparent; border:none; color:var(--text); cursor:pointer; text-align:left;
      font-family:'DM Sans',sans-serif; font-size:0.8rem; transition:background .15s;
    }
    .knockout-slot:hover:not(.empty) { background:rgba(0,230,118,.07); }
    .knockout-slot.empty { color:var(--muted); cursor:default; }
    .knockout-slot.correct { background:rgba(0,200,83,.15); color:var(--correct); font-weight:700; }
    .knockout-slot.wrong { background:rgba(239,83,80,.1); color:var(--wrong); }
    .knockout-slot.pending { background:rgba(255,214,0,.08); }
    .slot-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:110px; }
    .slot-icon { margin-left:auto; font-size:0.75rem; }
    .vs-line { display:block; width:100%; text-align:center; font-size:0.68rem; color:var(--muted); padding:2px 0; background:var(--dark2); }
    .winner-badge { padding:5px 11px; font-size:0.73rem; color:var(--accent); background:rgba(0,230,118,.07); border-top:1px solid var(--border); }

    /* CHAMPION */
    .champion-section { margin-top:20px; background:linear-gradient(135deg,var(--card) 0%,var(--dark3) 100%); border:1px solid var(--border); border-radius:12px; padding:18px; text-align:center; }
    .champion-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--gold); letter-spacing:1px; margin-bottom:14px; }

    /* RESULTS TAB */
    .results-section { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:16px; overflow:hidden; }
    .results-section-header { background:var(--card2); padding:12px 16px; border-bottom:1px solid var(--border); font-weight:700; font-size:0.85rem; }
    .results-body { padding:14px; }
    .team-picker { display:flex; flex-wrap:wrap; gap:6px; }
    .team-chip {
      background:var(--card2); border:1px solid var(--border); border-radius:20px;
      padding:4px 10px; font-size:0.75rem; cursor:pointer; transition:all .15s;
      display:flex; align-items:center; gap:5px; color:var(--text); font-family:'DM Sans',sans-serif;
    }
    .team-chip:hover { border-color:var(--accent); }
    .team-chip.selected { background:rgba(0,200,83,.15); border-color:var(--correct); color:var(--correct); }

    /* LEADERBOARD */
    .lb-list { display:flex; flex-direction:column; gap:10px; }
    .lb-row {
      background:var(--card); border:1px solid var(--border); border-radius:11px;
      padding:13px 15px; display:flex; align-items:center; gap:14px;
    }
    .lb-row.rank-1 { border-color:rgba(255,214,0,.5); background:rgba(255,214,0,.04); }
    .lb-row.rank-2 { border-color:rgba(176,190,197,.3); }
    .lb-row.rank-3 { border-color:rgba(255,143,0,.3); }
    .lb-medal { font-size:1.6rem; min-width:36px; text-align:center; }
    .lb-info { flex:1; }
    .lb-name { font-weight:700; font-size:0.95rem; }
    .lb-name-link { cursor:pointer; display:inline-block; transition:color .15s; }
    .lb-name-link:hover { color:var(--accent); text-decoration:underline; }
    .lb-champ { font-size:0.78rem; color:var(--gold); margin-top:4px; }
    .lb-score { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:var(--accent); line-height:1; min-width:50px; text-align:right; }
    .lb-score.zero { color:var(--muted); }
    .lb-breakdown { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
    .bd-chip { font-size:0.7rem; padding:2px 6px; border-radius:6px; background:var(--card2); color:var(--muted); }
    .bd-chip.has-pts { background:rgba(0,200,83,.15); color:var(--correct); }

    /* SCORING GUIDE */
    .scoring-guide { background:var(--dark3); border-radius:9px; padding:14px; margin-top:20px; }
    .scoring-guide h3 { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; color:var(--muted); letter-spacing:1px; margin-bottom:10px; }
    .scoring-row { display:flex; justify-content:space-between; font-size:0.8rem; padding:5px 0; border-bottom:1px solid var(--border); color:var(--muted); }
    .scoring-row:last-child { border-bottom:none; }
    .scoring-row .pts { color:var(--gold); font-weight:700; }

    /* SAVE BAR */
    .save-bar { position:sticky; bottom:0; background:var(--dark2); border-top:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; gap:12px; }
    .save-bar .for-label { flex:1; font-size:0.84rem; color:var(--muted); }
    .save-bar strong { color:var(--accent); }

    /* MISC */
    .empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
    .empty-state .icon { font-size:2.8rem; margin-bottom:10px; }
    .empty-state p { font-size:0.88rem; line-height:1.6; }
    .divider { height:1px; background:var(--border); margin:18px 0; }

    /* SPLIT BRACKET */
    .bk-col { width:128px; flex-shrink:0; }
    .bk-col-final { width:164px; flex-shrink:0; }
    .bk-col-hdr { font-family:'Bebas Neue',sans-serif; font-size:0.72rem; letter-spacing:1px; color:var(--muted); text-align:center; padding-bottom:6px; }
    .bk-card { position:absolute; left:0; right:0; background:var(--card); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
    .bk-slot { display:flex; align-items:center; gap:4px; width:100%; padding:0 7px; height:30px; background:transparent; border:none; color:var(--text); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:500; transition:background .15s; text-align:left; }
    .bk-slot:hover:not(.bk-empty) { background:rgba(0,230,118,.07); }
    .bk-empty { color:var(--muted); cursor:default; }
    .bk-label { font-style:italic; color:var(--muted); font-size:0.68rem; }
    .bk-chosen { background:rgba(0,230,118,.1); }
    .bk-correct { background:rgba(0,200,83,.18); color:var(--correct); font-weight:700; }
    .bk-wrong { background:rgba(239,83,80,.1); color:var(--wrong); }
    .bk-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:82px; }
    .bk-vs { background:var(--dark2); text-align:center; font-size:0.6rem; color:var(--muted); height:16px; display:flex; align-items:center; justify-content:center; }
    .bk-winner { height:24px; padding:0 7px; font-size:0.63rem; color:var(--accent); background:rgba(0,230,118,.05); border-top:1px solid var(--border); display:flex; align-items:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .bk-win-ok { color:var(--correct); }
    .bk-win-err { color:var(--wrong); }

    /* LIVE SCORES */
    .ls-section { background:var(--card2); border:1px solid var(--border); border-radius:10px; margin-bottom:18px; overflow:hidden; }
    .ls-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-weight:700; font-size:0.88rem; }
    .ls-meta { font-size:0.72rem; color:var(--muted); font-weight:400; }
    .ls-empty { padding:20px; text-align:center; color:var(--muted); font-size:0.84rem; }
    .ls-date-label { padding:5px 14px; font-size:0.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); background:var(--dark2); border-top:1px solid var(--border); }
    .ls-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:9px 14px; border-top:1px solid var(--border); gap:8px; }
    .ls-row:first-of-type { border-top:none; }
    .ls-row.ls-live { background:rgba(0,230,118,.04); }
    .ls-team { display:flex; align-items:center; gap:6px; }
    .ls-team-away { justify-content:flex-end; }
    .ls-flag { font-size:1.1rem; line-height:1; }
    .ls-name { font-size:0.8rem; color:var(--text); }
    .ls-winner { color:var(--green); font-weight:700; }
    .ls-scores { display:flex; align-items:center; gap:6px; justify-content:center; }
    .ls-num { font-size:1rem; font-weight:800; min-width:16px; text-align:center; }
    .ls-badge { font-size:0.66rem; font-weight:700; padding:2px 7px; border-radius:4px; white-space:nowrap; }
    .ls-badge-live { background:rgba(0,230,118,.2); color:var(--green); }
    .ls-badge-ft { background:rgba(255,255,255,.06); color:var(--muted); }
    .ls-badge-sched { color:var(--muted); font-size:0.64rem; }
    .ls-dot { font-size:0.55rem; margin-right:2px; animation:ls-blink 1s infinite; }
    @keyframes ls-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* THIRD PLACE RANKING */
    .third-rank-section { margin-top:24px; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:16px; }
    .third-rank-header { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1px; color:var(--gold); margin-bottom:4px; }
    .third-rank-sub { font-size:0.78rem; color:var(--muted); margin-bottom:14px; line-height:1.5; }
    .third-rank-slots { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
    .third-slot { display:flex; align-items:center; gap:5px; background:var(--card); border:1px solid var(--border); border-radius:7px; padding:6px 8px; min-height:36px; }
    .third-slot.filled { border-color:rgba(255,214,0,.4); background:rgba(255,214,0,.05); }
    .third-slot-num { font-size:0.68rem; font-weight:800; color:var(--gold); min-width:14px; }
    .third-slot-flag { font-size:1rem; line-height:1; }
    .third-slot-name { font-size:0.72rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .third-slot-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:0 2px; line-height:1; }
    .third-slot-remove:hover { color:var(--wrong); }
    .third-slot-empty { font-size:0.72rem; color:var(--border); margin-left:4px; }
    .third-available { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-top:8px; }
    .third-avail-label { font-size:0.72rem; color:var(--muted); }
    .third-chip { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:20px; padding:4px 10px; font-size:0.75rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:border-color .15s,background .15s; }
    .third-chip:hover:not(:disabled) { border-color:var(--gold); background:rgba(255,214,0,.08); }
    .third-chip:disabled { opacity:0.4; cursor:default; }
    .third-chip-out { opacity:0.45; cursor:default; text-decoration:line-through; }
    .third-avail-out { color:var(--wrong) !important; }

    /* ADMIN */
    .admin-bar { display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(255,214,0,.07); border:1px solid rgba(255,214,0,.3); border-radius:8px; margin-bottom:14px; flex-wrap:wrap; }
    .admin-badge { font-size:0.82rem; font-weight:700; color:var(--gold); }

    /* QUALIFIER COUNTER */
    .qualifier-counter { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--card2); border:1px solid var(--border); border-radius:8px; margin-bottom:12px; }
    .qc-label { font-size:0.8rem; color:var(--muted); }
    .qc-count { font-size:1rem; font-weight:800; color:var(--gold); min-width:30px; }
    .qc-count.qc-done { color:var(--green); }
    .qc-note { font-size:0.72rem; color:var(--muted); opacity:0.7; margin-left:auto; }

    /* SYNC ROW */
    .sync-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding:10px 14px; background:var(--card2); border-radius:8px; border:1px solid var(--border); flex-wrap:wrap; }
    .sync-time { font-size:0.75rem; color:var(--muted); }
    .btn-sync { background:transparent; border:1px solid var(--accent); color:var(--accent); border-radius:6px; padding:5px 14px; font-size:0.78rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .15s; white-space:nowrap; }
    .btn-sync:hover:not(:disabled) { background:rgba(0,230,118,.1); }

// Build the 3rd-place → R32-slot assignment for a set of qualifying third teams (Annex C).
// Returns { winnerLetter: thirdPlaceTeam } or null if the 8 qualifying groups aren't yet known.
function thirdAssignment(thirdTeams, groupsData) {
  const groups = [];
  for (const t of (thirdTeams || [])) {
    const g = TEAM_GROUP[t];
    if (g && !groups.includes(g)) groups.push(g);
  }
  if (groups.length !== 8) return null;
  const val = ANNEX_C[groups.slice().sort().join('')];
  if (!val) return null;
  const out = {};
  THIRD_WINNERS.forEach((w, i) => { out[w] = (groupsData[val[i]] || [])[2] || null; });
  return out;
}

function getAdvancers(groupsData, thirdTeams) {
  const adv = new Array(32).fill(null);
  const assign = thirdAssignment(thirdTeams, groupsData);
  const resolve = (pos, winnerLetter) => {
    if (pos === '3rd') return assign ? (assign[winnerLetter] || null) : null;
    const g = groupsData[pos[1]] || [];
    return g[pos[0] === '1' ? 0 : 1] || null;
  };
  BRACKET.forEach(([posA, posB], mi) => {
    const winnerLetter = (posA !== '3rd' && posA[0] === '1') ? posA[1]
                       : (posB !== '3rd' && posB[0] === '1') ? posB[1] : null;
    adv[mi * 2]     = resolve(posA, winnerLetter);
    adv[mi * 2 + 1] = resolve(posB, winnerLetter);
  });
  return adv;
}

function getKnockoutMatchups(roundKey, koData, groupsData, thirdRanked) {
  const idx = ROUND_KEYS.indexOf(roundKey);
  if (idx === 0) {
    const adv = getAdvancers(groupsData, thirdRanked);
    const matchups = [];
    for (let i = 0; i < 32; i += 2) matchups.push([adv[i] || null, adv[i + 1] || null]);
    return matchups;
  }
  const prevKey = ROUND_KEYS[idx - 1];
  const prev    = arrify(koData[prevKey]);
  const matchups = [];
  for (let i = 0; i < prev.length; i += 2) matchups.push([prev[i] || null, prev[i + 1] || null]);
  return matchups;
}

          const labelA = isR32 ? BRACKET_LABELS[(gi) * 2] : null;

// ─── SCORING ENGINE ──────────────────────────────────────────────────────────
function calcScore(playerPicks, results) {
  let pts = 0;
  const breakdown = { group: 0, third: 0, r32: 0, r16: 0, qf: 0, sf: 0, final: 0 };

  for (const letter of Object.keys(GROUPS)) {
    const rg = results.groups[letter] || [];
    const pg = playerPicks.groups[letter] || [];
    for (let rank = 0; rank < 3; rank++) {
      if (pg[rank] && rg[rank] && pg[rank] === rg[rank]) {
        pts += SCORING.group;
        breakdown.group += SCORING.group;
      }
    }
  }

  // 3rd-place: 1 pt per team correctly predicted to be among the 8 that advance.
  // Order doesn't matter — FIFA's Annex C decides each team's bracket slot.
  const rThirds = new Set((results.thirdRanked || []).filter(Boolean));
  for (const t of new Set((playerPicks.thirdRanked || []).filter(Boolean))) {
    if (rThirds.has(t)) { pts += SCORING.third; breakdown.third += SCORING.third; }
  }

  for (const rk of ROUND_KEYS) {
    const rr = arrify(results.knockout?.[rk]);
    const pr = arrify(playerPicks.knockout?.[rk]);
    const pts_per = SCORING[rk];
    for (let i = 0; i < Math.max(rr.length, pr.length); i++) {
      if (pr[i] && rr[i] && pr[i] === rr[i]) {
        pts += pts_per;
        breakdown[rk] += pts_per;
      }
    }
  }


  return { total: pts, breakdown };
}

// ─── ESPN LIVE SYNC ──────────────────────────────────────────────────────────
const ESPN_NAMES = {
  'Curacao': 'Curaçao',
  'Korea Republic': 'South Korea',
  'IR Iran': 'Iran',
  'Congo DR': 'DR Congo',
};
const espnName = n => ESPN_NAMES[n] || n;

function getESPNRoundByDate(d) {
  if (!d) return null;
  if (d >= '2026-06-28' && d <= '2026-07-03') return 'r32';
  if (d >= '2026-07-04' && d <= '2026-07-07') return 'r16';
  if (d >= '2026-07-09' && d <= '2026-07-11') return 'qf';
  if (d >= '2026-07-14' && d <= '2026-07-15') return 'sf';
  if (d === '2026-07-19') return 'final';
  return null;
}

function findKnockoutSlot(roundKey, teamA, teamB, resultGroups, resultKo, thirdRanked) {
  const matchups = getKnockoutMatchups(roundKey, resultKo, resultGroups, thirdRanked);
  for (let i = 0; i < matchups.length; i++) {
    const [a, b] = matchups[i] || [];
    if (a && b && ((a === teamA && b === teamB) || (a === teamB && b === teamA))) return i;
  }
  return -1;
}

async function syncESPN(currentResults) {
  const out = {
    groups:      { ...currentResults.groups },
    knockout:    JSON.parse(JSON.stringify(currentResults.knockout || {})),
    thirdRanked: currentResults.thirdRanked || [],
  };

  // 1. Group standings → auto-populate group results when teams have played
  try {
    const r = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026');
    const d = await r.json();
    const thirdCands = [];  // each group's 3rd-placed team, with FIFA tiebreaker stats
    for (const grp of (d.children || [])) {
      const raw    = (grp.abbreviation || grp.name || '').trim();
      const letter = raw.length === 1 ? raw : raw.replace(/^Group\s*/i, '').trim();
      if (!letter || letter.length !== 1) continue;
      const entries = (grp.standings?.entries || []).slice().sort((a, b) => {
        const rank = e => +(e.stats?.find(s => s.name === 'rank')?.value ?? 99);
        return rank(a) - rank(b);
      });
      const gp = +(entries[0]?.stats?.find(s => s.name === 'gamesPlayed')?.value ?? 0);
      if (gp === 0) continue;
      const top2 = entries.slice(0, 3).map(e => espnName(e.team.displayName));
      if (top2[0] && top2[1]) out.groups[letter] = top2;

      const e3 = entries[2];
      if (e3) {
        const st = n => +(e3.stats?.find(s => s.name === n)?.value ?? 0);
        thirdCands.push({
          team:     espnName(e3.team.displayName),
          advanced: st('advanced') === 1,
          gp,
          pts: st('points'), gd: st('pointDifferential'), gf: st('pointsFor'),
        });
      }
    }

    // 2. Best 8 third-place teams → out.thirdRanked, once the group stage is complete.
    // Prefer ESPN's own `advanced` flag; fall back to FIFA tiebreakers
    // (points → goal difference → goals scored) if the flag isn't set on exactly 8.
    const doneThirds = thirdCands.filter(t => t.team && t.gp >= 3);
    if (doneThirds.length === Object.keys(GROUPS).length) {
      const flagged = doneThirds.filter(t => t.advanced).map(t => t.team);
      out.thirdRanked = flagged.length === 8
        ? flagged
        : doneThirds.slice()
            .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf)
            .slice(0, 8)
            .map(t => t.team);
    }
  } catch(e) { console.warn('ESPN standings sync failed:', e); }

  // 3. Knockout results — fetch all completed matches from R32 start through today
  try {
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    if (today >= '20260628') {
      const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-${today}&limit=200`;
      const r = await fetch(url);
      const d = await r.json();
      // Sort events by date so earlier rounds are processed first (needed for slot matching)
      const events = (d.events || []).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      for (const ev of events) {
        const comp = ev.competitions?.[0];
        if (!comp || comp.status?.type?.state !== 'post' || !comp.status?.type?.completed) continue;
        const dateStr = (ev.date || '').slice(0, 10);
        const rk = getESPNRoundByDate(dateStr);
        if (!rk) continue;
        const comps  = comp.competitors || [];
        const tA     = espnName(comps[0]?.team?.displayName);
        const tB     = espnName(comps[1]?.team?.displayName);
        const winner = espnName(comps.find(c => c.winner)?.team?.displayName);
        if (!tA || !tB || !winner) continue;
        const slot = findKnockoutSlot(rk, tA, tB, out.groups, out.knockout, out.thirdRanked);
        if (slot >= 0) {
          if (!out.knockout[rk]) out.knockout[rk] = [];
          out.knockout[rk][slot] = winner;
        }
      }
    }
  } catch(e) { console.warn('ESPN knockout sync failed:', e); }

  return out;
}

function GroupCard({ letter, picks, onPick, results, resultsMode }) {
  const teams  = GROUPS[letter];
  const picked = picks[letter] || [];
  const actual = results[letter] || [];

  return (
    <div className="group-card">
      <div className="group-header">
        <span className="group-letter">Group {letter}</span>
        {resultsMode && actual.length >= 3 && <span className="results-badge">✓ Set</span>}
      </div>
      <div className="group-teams">
        {teams.map(team => {
          const rank = picked.indexOf(team);
          const actualRank = actual.indexOf(team);
          let correctness = null;
          if (!resultsMode && actual.length >= 3 && rank >= 0 && rank < 3) {
            correctness = actual[rank] === team ? "correct" : "wrong";
          }
          return (
            <div key={team} className={`group-team ${rank >= 0 ? `ranked rank-${rank + 1}` : ""} ${correctness || ""}`}>
              <div className="team-info">
                <span className="flag">{FLAGS[team] || "🏳️"}</span>
                <span className="team-name">{team}</span>
                {correctness === "correct" && <span className="check">✓</span>}
                {correctness === "wrong" && <span className="cross">✗</span>}
              </div>
              <div className="rank-buttons">
                {[1, 2, 3].map(r => (
                  <button
                    key={r}
                    className={`rank-btn ${rank === r - 1 ? "active" : ""} pos-${r}`}
                    onClick={() => onPick(letter, team, r - 1)}
                    title={r === 1 ? "1st" : r === 2 ? "2nd" : "3rd"}
                  >{r}</button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div className="group-footer">
        <span className={`advance-label ${picked.length >= 3 ? "done" : ""}`}>
          {picked.length >= 3
            ? `${FLAGS[picked[0]]}${picked[0]} · ${FLAGS[picked[1]]}${picked[1]} · ${FLAGS[picked[2]]}${picked[2]}`
            : resultsMode ? "Set actual top 3" : `Pick 1st, 2nd & 3rd (${picked.length}/3)`}
        </span>
      </div>
    </div>
  );
}

function KnockoutSlot({ team, onClick, state }) {
  return (
    <button className={`knockout-slot ${team ? "filled" : "empty"} ${state || ""}`} onClick={onClick}>
      {team ? (
        <>
          <span>{FLAGS[team] || "🏳️"}</span>
          <span className="slot-name">{team}</span>
          {state === "correct" && <span className="slot-icon">✓</span>}
          {state === "wrong"   && <span className="slot-icon">✗</span>}

      ) : <span className="tbd">TBD</span>}
    </button>
  );
}

    setSyncStatus('syncing');
    try {
      const updated = await syncESPN(results);
      wcRef.child('results').set(updated);
      setLastSync(new Date());
      setSyncStatus('ok');
    } catch(e) {
      console.error('Sync error:', e);
      setSyncStatus('error');
    }
  };

  // Auto-sync every 3 minutes
  useEffect(() => {
    const id = setInterval(runSync, 3 * 60 * 1000);
    return () => clearInterval(id);
  }, [results]);

  const deletePlayer = name => {
    if (!isAdmin) return;
    if (!confirm(`Delete "${name}" from the pool? This cannot be undone.`)) return;
    const key = sanitizeKey(name);
    wcRef.child('players').child(key).remove();
    wcRef.child('picks').child(key).remove();
    if (name === myPlayer) {
      localStorage.removeItem('wc_my_name');
      setMyPlayer(null); setActivePlayer(null);
    }
  };

  const adminLogin = () => {
    if (adminInput === 'WC*2026') {
      localStorage.setItem('wc_admin', '1');
      setIsAdmin(true); setShowAdminLogin(false); setAdminInput('');
    } else {
      alert('Incorrect password.');
    }
  };

  const adminLogout = () => {
    localStorage.removeItem('wc_admin');
    setIsAdmin(false);
  };

  const fetchLiveScores = async () => {
    try {
      const today = new Date();
      const days = [-1, 0, 1].map(d => {
        const dt = new Date(today);
        dt.setDate(dt.getDate() + d);
        return dt.toISOString().slice(0, 10).replace(/-/g, '');
      });
      const batches = await Promise.all(
        days.map(date =>
          fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date}&limit=20`)
            .then(r => r.json()).then(d => d.events || []).catch(() => [])
        )
      );
      const seen = new Set();
      const events = batches.flat().filter(e => { if (seen.has(e.id)) return false; seen.add(e.id); return true; });
      events.sort((a, b) => new Date(a.date) - new Date(b.date));
      setLiveScores(events);
      setScoresReady(true);
    } catch(e) { console.warn('Live scores fetch failed:', e); }
  };

  // All completed matches across the whole tournament (for the bottom results table)
  const fetchPlayedMatches = async () => {
    const TOURNEY_START = '20260611';
    try {
      const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      if (today < TOURNEY_START) { setPlayedReady(true); return; }
      const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${TOURNEY_START}-${today}&limit=500`;
      const r = await fetch(url);
      const d = await r.json();
      const seen = new Set();
      const done = (d.events || []).filter(ev => {
        if (seen.has(ev.id)) return false;
        seen.add(ev.id);
        const t = ev.competitions?.[0]?.status?.type;
        return t && t.state === 'post' && t.completed;
      });
      done.sort((a, b) => new Date(b.date) - new Date(a.date)); // newest first
      setPlayedMatches(done);
      setPlayedReady(true);
    } catch(e) { console.warn('Played matches fetch failed:', e); setPlayedReady(true); }
  };

  useEffect(() => {
    if (tab !== 3) return;
    fetchLiveScores();
    fetchPlayedMatches();
    const id = setInterval(() => { fetchLiveScores(); fetchPlayedMatches(); }, 60 * 1000);
    return () => clearInterval(id);
  }, [tab]);

  const loadPlayer = p => {
    setActivePlayer(p);
    setGroupPicks(allPicks[p]?.groups || {});
    setKnockoutPicks(allPicks[p]?.knockout || {});
    setThirdRanked(allPicks[p]?.thirdRanked || []);
    setTab(1);
  };
  // Anyone may view others' picks once picks lock (so they can't be copied beforehand); admin may at any time.
  const canViewAll = isAdmin || picksLocked;

  // Open a player's card (their Groups/Bracket picks), same as clicking them on the Players tab.
  const goToPlayerCard = p => {
    if (p === myPlayer) { setActivePlayer(p); setTab(1); }
    else if (canViewAll) { loadPlayer(p); }
  };

  const handleGroupPick = (letter, team, rank) => {
    setGroupPicks(prev => {
      const curr = [...(prev[letter] || [])];
      const existing = curr.indexOf(team);
      if (existing >= 0) curr.splice(existing, 1);
      if (curr[rank]) curr.splice(rank, 1);
      curr.splice(rank, 0, team);
      return { ...prev, [letter]: curr.slice(0, 3) };
    });
  };

  const handleResultGroupPick = (letter, team, rank) => {
    setResultGroups(prev => {
      const curr = [...(prev[letter] || [])];
      const existing = curr.indexOf(team);
      if (existing >= 0) curr.splice(existing, 1);
      if (curr[rank]) curr.splice(rank, 1);
      curr.splice(rank, 0, team);
      return { ...prev, [letter]: curr.slice(0, 3) };
    });
  };

  const handleKnockoutPick = (roundKey, matchIndex, team, setter) => {
    setter(prev => {
      const curr = { ...prev };
      if (!curr[roundKey]) curr[roundKey] = [];
      const arr = [...curr[roundKey]];
      arr[Math.floor(matchIndex / 2)] = team;
      curr[roundKey] = arr;
      return curr;
    });
  };

  const pickKO = (rk, mi, t) => handleKnockoutPick(rk, mi, t, setKnockoutPicks);

  const groupProgress = (gp) => Object.keys(GROUPS).filter(l => (gp[l] || []).length >= 3).length;

  const getSortedScores = () =>
    players.map(p => {
      const picks = allPicks[p] || { groups: {}, knockout: {} };
      const { total, breakdown } = calcScore(picks, results);
      return { name: p, total, breakdown, finalWinner: picks.knockout?.final?.[0] || null };
    }).sort((a, b) => b.total - a.total);

  const exportPicks = (playerName) => {
    const picks = allPicks[playerName];
    if (!picks) return;
    let out = `🏆 WORLD CUP 2026 — ${playerName}'s Picks\n${"=".repeat(40)}\n\nGROUP STAGE PICKS:\n`;
    for (const l of Object.keys(GROUPS)) {
      const g = picks.groups[l] || [];
      out += `  Group ${l}: 1st ${g[0] || "?"} · 2nd ${g[1] || "?"} · 3rd ${g[2] || "?"}\n`;
    }
    out += `\nKNOCKOUT PICKS:\n`;
    for (const rk of ROUND_KEYS) {
      const arr = picks.knockout[rk] || [];
      if (arr.filter(Boolean).length) out += `  ${ROUND_LABELS[rk]}: ${arr.filter(Boolean).join(", ")}\n`;
    }
    out += `\n🏆 PICKED TO WIN: ${picks.knockout?.final?.[0] || "None"}\n`;
    const blob = new Blob([out], { type: "text/plain" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `${playerName.replace(/\s+/g, "_")}_WC2026_picks.txt`;
    a.click(); URL.revokeObjectURL(url);
  };

  const exportLeaderboard = () => {
    const scores = getSortedScores();
    let out = `🏆 WORLD CUP 2026 POOL — LEADERBOARD\n${"=".repeat(40)}\n\n`;
    scores.forEach((s, i) => {
      out += `#${i + 1} ${s.name}: ${s.total} pts\n`;
      out += `   Group:${s.breakdown.group} 3rd:${s.breakdown.third} R32:${s.breakdown.r32} R16:${s.breakdown.r16} QF:${s.breakdown.qf} SF:${s.breakdown.sf} F:${s.breakdown.final}\n`;
      if (s.finalWinner) out += `   Picked to win: ${s.finalWinner}\n`;
      out += "\n";
    });
    const blob = new Blob([out], { type: "text/plain" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "WC2026_Leaderboard.txt";
    a.click(); URL.revokeObjectURL(url);
  };

  const scores    = getSortedScores();
  const hasResults = Object.keys(results.groups).length > 0 || Object.keys(results.knockout).length > 0;

  return (
    <div className="app">
      {/* ── HEADER ── */}
      <div className="header">
        <div className="header-top">
          <div className="trophy-anim">🏆</div>
          <div className="header-text">
            <h1>World Cup 2026 Pool</h1>
            <p>USA · Canada · Mexico &nbsp;|&nbsp; June 11 – July 19 &nbsp;|&nbsp; 48 Teams · 12 Groups</p>
          </div>
        </div>
        <div className="tabs">
          {TABS.map((t, i) => (
            <button key={i} className={`tab-btn ${tab === i ? "active" : ""}`} onClick={() => setTab(i)}>{t}</button>
          ))}
        </div>
      </div>

      <div className="content">

        {/* ══ PLAYERS TAB ══ */}
        {tab === 0 && (
          <div>
            <div className="section-title">Pool Players</div>
            {activePlayer && activePlayer !== myPlayer && (
              <div className="banner" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap',background:'rgba(66,165,245,.08)',border:'1px solid rgba(66,165,245,.35)',color:'var(--blue)'}}>
                <span>👀 Viewing <strong>{activePlayer}</strong>'s picks — open the Groups or Bracket tab to see them.</span>
                <button className="btn sm secondary" onClick={() => setActivePlayer(myPlayer)}>{myPlayer ? '← Back to mine' : 'Stop viewing'}</button>
              </div>
            )}
            {myPlayer
              ? <div className="banner" style={{ marginBottom: 20 }}>✅ You're in as <strong>{myPlayer}</strong>. Click your card below to edit your picks.</div>
              : <div className="add-row">
                  <input className="input" value={newPlayer} placeholder="Enter your name to join..."
                    onChange={e => setNewPlayer(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addPlayer()} />
                  <button className="btn" onClick={addPlayer}>+ Join</button>
                </div>
            }
            {players.length === 0 ? (
              <div className="empty-state">
                <div className="icon">👥</div>
                <p>Add your crew above.<br />Each player fills their own picks in Groups &amp; Bracket tabs.</p>
              </div>
            ) : (
              <div className="player-list">
                {players.map(p => {
                  const pk   = allPicks[p] || { groups:{}, knockout:{}, thirdRanked:[] };
                  const pg   = pk.groups || {};
                  const done = groupProgress(pg);
                  const groupsOk  = done === 12;
                  const thirdOk   = (pk.thirdRanked || []).length === 8;
                  const bracketOk = bracketComplete(pk.knockout || {});
                  const { total } = calcScore(allPicks[p] || { groups:{}, knockout:{} }, results);
                  const showProgress = picksLocked || p === myPlayer || isAdmin;
                  const canView = p === myPlayer || canViewAll;
                  const chip = (ok, label) => (
                    <span className="status-chip" style={{ color: ok ? 'var(--green)' : 'var(--red)' }}>
                      {ok ? '✅' : '❌'} {label}
                    </span>
                  );
                  return (
                    <div key={p} className={`player-card ${p === myPlayer ? "active" : ""}`}
                      style={canView ? {} : { cursor: 'default' }}
                      onClick={() => {
                        if (p === myPlayer) { setActivePlayer(p); setTab(1); }
                        else if (canViewAll) { loadPlayer(p); }
                      }}>
                      <div>
                        <div className="player-name">
                          {p} {p === myPlayer && <span style={{ fontSize: "0.72rem", color: "var(--accent)", fontWeight: 400 }}>(you)</span>}
                        </div>
                        <div className="player-status">
                          {!showProgress
                            ? 'In the tournament'
                            : <span className="status-chips">
                                {chip(groupsOk, groupsOk ? 'Groups' : `Groups ${done}/12`)}
                                {chip(thirdOk, '3rd place')}
                                {chip(bracketOk, 'Bracket')}
                              </span>
                          }
                          {showProgress && hasResults && <span> · {total} pts</span>}
                        </div>
                      </div>
                      <div className="player-actions">
                        {(p === myPlayer || picksLocked || isAdmin) && (
                          <button className="btn sm secondary" onClick={e => { e.stopPropagation(); exportPicks(p); }}>📥 Export</button>
                        )}
                        {(p === myPlayer || isAdmin) && !picksLocked && (
                          <button className="btn sm" onClick={e => { e.stopPropagation(); isAdmin && p !== myPlayer ? loadPlayer(p) : (setActivePlayer(p), setTab(1)); }}>Edit →</button>
                        )}
                        {canViewAll && p !== myPlayer && picksLocked && (
                          <button className="btn sm secondary" onClick={e => { e.stopPropagation(); loadPlayer(p); }}>View →</button>
                        )}
                        {isAdmin && (
                          <button className="btn sm" style={{background:'var(--wrong)',borderColor:'var(--wrong)',color:'#fff'}} onClick={e => { e.stopPropagation(); deletePlayer(p); }}>🗑️</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {isAdmin
              ? <div className="admin-bar"><span className="admin-badge">🔑 Admin Mode</span><button className="btn sm secondary" onClick={adminLogout}>Log out</button></div>
              : showAdminLogin
                ? <div className="admin-bar">
                    <input className="input" type="password" placeholder="Admin password" value={adminInput}
                      onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && adminLogin()}
                      style={{flex:1,maxWidth:200}} autoFocus />
                    <button className="btn sm" onClick={adminLogin}>Unlock</button>
                    <button className="btn sm secondary" onClick={() => { setShowAdminLogin(false); setAdminInput(''); }}>Cancel</button>
                  </div>
                : <button className="btn sm secondary" style={{marginBottom:14}} onClick={() => setShowAdminLogin(true)}>🔑 Admin</button>
            }

            <div className="scoring-guide">
              <h3>📋 Scoring Rules</h3>
              {[
                ["Correct group finish position (1st/2nd/3rd)", "1 pt each"],
                ["Each 3rd-placed team you pick to advance (any of 8)", "1 pt each"],
                ["Round of 32 winner correct", "2 pts"],
                ["Round of 16 winner correct", "3 pts"],
                ["Quarterfinal winner correct", "5 pts"],
                ["Semifinal winner correct", "8 pts"],
                ["Correct Final winner (tournament champion)", "13 pts"],
              ].map(([r, p]) => (
                <div key={r} className="scoring-row"><span>{r}</span><span className="pts">{p}</span></div>
              ))}
            </div>
          </div>
        )}

        {/* ══ GROUPS TAB ══ */}
        {tab === 1 && (
          <div>
            {activePlayer && activePlayer !== myPlayer
              ? <div className="editing-bar">
                  <span>👀 Viewing <strong>{activePlayer}</strong>'s picks{picksLocked || !isAdmin ? ' (read-only)' : ''}</span>
                  {myPlayer && <button className="btn sm secondary" onClick={() => loadPlayer(myPlayer)}>← My picks</button>}
                </div>
              : picksLocked
                ? <div className="banner" style={{background:'rgba(239,83,80,.07)',border:'1px solid rgba(239,83,80,.3)',color:'#ef9a9a'}}>🔒 Picks are locked — the tournament begins June 11. Good luck!</div>
                : !myPlayer
                  ? <div className="banner">⚠️ Go to the Players tab and join the pool first.</div>
                  : <div className="editing-bar">
                      <span>Your picks — <strong>{myPlayer}</strong></span>
                      <span style={{ color: "var(--green)", fontSize: "0.8rem" }}>{groupProgress(groupPicks)}/12 groups picked</span>
                    </div>
            }
            {(() => {
              const thirdCount = thirdRanked.length;
              return (
                <div className="qualifier-counter">
                  <span className="qc-label">3rd place qualifiers</span>
                  <span className={`qc-count ${thirdCount === 8 ? 'qc-done' : ''}`}>{thirdCount}/8</span>
                  <span className="qc-note">(rank 8 of 12 to advance)</span>
                </div>
              );
            })()}
            <div className="prog-bar">
              <div className="prog-fill" style={{ width: `${(groupProgress(groupPicks) / 12) * 100}%` }} />
            </div>
            <div style={picksLocked ? {pointerEvents:'none',opacity:0.75} : {}}>
            <div className="groups-grid">
              {Object.keys(GROUPS).map(letter => (
                <GroupCard key={letter} letter={letter} picks={groupPicks} onPick={handleGroupPick}
                  results={results.groups} resultsMode={false} />
              ))}
            </div>

            {myPlayer && (() => {
              const allThirds = Object.keys(GROUPS).map(l => groupPicks[l]?.[2]).filter(Boolean);
              const unranked = allThirds.filter(t => !thirdRanked.includes(t));
              const canAdd = thirdRanked.length < 8;
              const addRanked = t => { if (canAdd && !thirdRanked.includes(t)) setThirdRanked([...thirdRanked, t]); };
              const removeRanked = i => setThirdRanked(thirdRanked.filter((_, j) => j !== i));
              return (
                <div className="third-rank-section">
                  <div className="third-rank-header">3rd Place Qualifiers — Pick 8 to Advance</div>
                  <div className="third-rank-sub">Pick 3rd in all 12 groups, then choose the 8 you think advance. Order doesn't matter — FIFA's bracket rules (Annex C) slot each team automatically. 1 pt per correct team.</div>
                  <div className="third-rank-slots">
                    {Array.from({length: 8}, (_, i) => (
                      <div key={i} className={`third-slot ${thirdRanked[i] ? 'filled' : ''}`}>
                        <span className="third-slot-num">{i + 1}</span>
                        {thirdRanked[i] ? (
                          <><span className="third-slot-flag">{FLAGS[thirdRanked[i]] || '🏳️'}</span>
                          <span className="third-slot-name">{thirdRanked[i]}</span>
                          <button className="third-slot-remove" onClick={() => removeRanked(i)}>×</button></>
                        ) : <span className="third-slot-empty">—</span>}
                      </div>
                    ))}
                  </div>
                  {canAdd && unranked.length > 0 && (
                    <div className="third-available">
                      <span className="third-avail-label">Add to ranking:</span>
                      {unranked.map(t => (
                        <button key={t} className="third-chip" onClick={() => addRanked(t)}>
                          {FLAGS[t] || '🏳️'} {t}
                        </button>
                      ))}
                    </div>
                  )}
                  {!canAdd && unranked.length > 0 && (
                    <div className="third-available" style={{marginTop:10}}>
                      <span className="third-avail-label third-avail-out">Didn't make the cut:</span>
                      {unranked.map(t => (
                        <span key={t} className="third-chip third-chip-out">
                          {FLAGS[t] || '🏳️'} {t}
                        </span>
                      ))}
                    </div>
                  )}
                  {allThirds.length === 0 && <p className="third-rank-sub" style={{opacity:0.5}}>Pick 3rd place in your groups above to unlock this section.</p>}
                </div>
              );
            })()}
            </div>
          </div>
        )}

        {/* ══ BRACKET TAB ══ */}
        {tab === 2 && (
          <div>
            {activePlayer && activePlayer !== myPlayer
              ? <div className="editing-bar">
                  <span>👀 Viewing <strong>{activePlayer}</strong>'s bracket{picksLocked || !isAdmin ? ' (read-only)' : ''}</span>
                  {myPlayer && <button className="btn sm secondary" onClick={() => loadPlayer(myPlayer)}>← My picks</button>}
                </div>
              : picksLocked
                ? <div className="banner" style={{background:'rgba(239,83,80,.07)',border:'1px solid rgba(239,83,80,.3)',color:'#ef9a9a'}}>🔒 Picks are locked — the tournament begins June 11. Good luck!</div>
                : !myPlayer
                  ? <div className="banner">⚠️ Go to the Players tab and join the pool first.</div>
                  : <div className="editing-bar">
                      <span>Your bracket — <strong>{myPlayer}</strong></span>
                      <span style={{ fontSize:"0.78rem", color:"var(--muted)" }}>Click a team to advance them</span>
                    </div>
            }
            <div style={picksLocked ? {pointerEvents:'none',opacity:0.75} : {}}>
            {(() => {
              const r32m = getKnockoutMatchups('r32', knockoutPicks, groupPicks, thirdRanked);
              const r16m = getKnockoutMatchups('r16', knockoutPicks, groupPicks, thirdRanked);
              const qfm  = getKnockoutMatchups('qf',  knockoutPicks, groupPicks, thirdRanked);
              const sfm  = getKnockoutMatchups('sf',  knockoutPicks, groupPicks, thirdRanked);
              const finM = getKnockoutMatchups('final', knockoutPicks, groupPicks, thirdRanked);
              const fin  = finM[0] || [null, null];
              const finPicked = knockoutPicks['final']?.[0];
              const finActual = results.knockout?.['final']?.[0];
              const finCls = t => finPicked !== t ? '' : !finActual ? 'bk-chosen' : finActual === t ? 'bk-correct' : 'bk-wrong';
              const NH = B_COLS * B_UNIT;
              const cp = { ko: knockoutPicks, resultKo: results.knockout, onPick: pickKO };
              return (
                <div className="bracket-area">
                  <div style={{ display:'flex', gap:4, minWidth:'max-content', padding:'14px 0', alignItems:'flex-start' }}>
                    <BracketCol title="R32" roundKey="r32" halfOffset={0} count={8} level={0} allMatchups={r32m} {...cp} />
                    <BracketCol title="R16" roundKey="r16" halfOffset={0} count={4} level={1} allMatchups={r16m} {...cp} />
                    <BracketCol title="QF"  roundKey="qf"  halfOffset={0} count={2} level={2} allMatchups={qfm}  {...cp} />
                    <BracketCol title="SF"  roundKey="sf"  halfOffset={0} count={1} level={3} allMatchups={sfm}  {...cp} />
                    <div className="bk-col-final">
                      <div className="bk-col-hdr">FINAL</div>
                      <div style={{ position:'relative', height:NH }}>
                        {(fin[0] || fin[1]) && (
                          <div className="bk-final-card">
                            <button className={`bk-slot bk-final-slot ${!fin[0] ? 'bk-empty' : finCls(fin[0])}`}
                              onClick={() => fin[0] && handleKnockoutPick('final', 0, fin[0], setKnockoutPicks)}>
                              {fin[0] ? <>{FLAGS[fin[0]]||'🏳️'} <span className="bk-name">{fin[0]}</span></> : 'TBD'}
                            </button>
                            <div className="bk-vs">vs</div>
                            <button className={`bk-slot bk-final-slot ${!fin[1] ? 'bk-empty' : finCls(fin[1])}`}
                              onClick={() => fin[1] && handleKnockoutPick('final', 1, fin[1], setKnockoutPicks)}>
                              {fin[1] ? <>{FLAGS[fin[1]]||'🏳️'} <span className="bk-name">{fin[1]}</span></> : 'TBD'}
                            </button>
                            {finPicked && (
                              <div className={`bk-winner ${finActual && finPicked===finActual ? 'bk-win-ok' : finActual && finPicked!==finActual ? 'bk-win-err' : ''}`}>
                                {FLAGS[finPicked]||''} {finPicked}{finActual ? (finPicked===finActual?' ✓':' ✗') : ''}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                    <BracketCol title="SF"  roundKey="sf"  halfOffset={1} count={1} level={3} allMatchups={sfm}  {...cp} />
                    <BracketCol title="QF"  roundKey="qf"  halfOffset={2} count={2} level={2} allMatchups={qfm}  {...cp} />
                    <BracketCol title="R16" roundKey="r16" halfOffset={4} count={4} level={1} allMatchups={r16m} {...cp} />
                    <BracketCol title="R32" roundKey="r32" halfOffset={8} count={8} level={0} allMatchups={r32m} {...cp} />
                  </div>
                </div>
              );
            })()}

            {(() => {
              const winner = knockoutPicks['final']?.[0];
              return (
                <div className="champion-section">
                  <div className="champion-title">🏆 Your Champion</div>
                  {winner
                    ? <div style={{ color:"var(--gold)", fontSize:"1.1rem", fontWeight:700 }}>{FLAGS[winner]||"🏳️"} {winner} — your pick to win it all (13 pts)</div>
                    : <p style={{ color:"var(--muted)", fontSize:"0.87rem" }}>Pick the winner in the <strong>Final</strong> box above to set your champion.</p>
                  }
                </div>
              );
            })()}
            </div>
          </div>
        )}

        {/* ══ RESULTS TAB ══ */}
        {tab === 3 && (
          <div>
            {/* Header row with tiny admin key */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div className="section-title" style={{margin:0}}>⚽ Match Results</div>
              <button className="key-btn" title="Admin" onClick={() => {
                if (isAdmin) { setShowAdminEdit(v => !v); }
                else { setShowAdminLogin(v => !v); setAdminInput(''); }
              }}>🔑</button>
            </div>

            {/* Admin login input — appears inline when key clicked */}
            {!isAdmin && showAdminLogin && (
              <div className="admin-bar" style={{marginBottom:14}}>
                <input className="input" type="password" placeholder="Password" value={adminInput}
                  onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && adminLogin()}
                  style={{flex:1,maxWidth:200}} autoFocus />
                <button className="btn sm" onClick={adminLogin}>Unlock</button>
                <button className="btn sm secondary" onClick={() => { setShowAdminLogin(false); setAdminInput(''); }}>✕</button>
              </div>
            )}

            {/* Live scores — everyone */}
            <div className="ls-section">
              <div className="ls-header">
                <span>Recent &amp; Upcoming Matches</span>
                <span className="ls-meta">{scoresReady ? 'Updates every min' : 'Loading…'}</span>
              </div>
              {!scoresReady ? (
                <div className="ls-empty">Fetching scores…</div>
              ) : liveScores.length === 0 ? (
                <div className="ls-empty">No matches in this window — check back on June 11.</div>
              ) : (() => {
                const byDate = {};
                liveScores.forEach(ev => {
                  const d = new Date(ev.date).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
                  if (!byDate[d]) byDate[d] = [];
                  byDate[d].push(ev);
                });
                return Object.entries(byDate).map(([dateLabel, evs]) => (
                  <div key={dateLabel}>
                    <div className="ls-date-label">{dateLabel}</div>
                    {evs.map(ev => {
                      const comp  = ev.competitions?.[0];
                      if (!comp) return null;
                      const home  = comp.competitors?.find(c => c.homeAway === 'home') || comp.competitors?.[0];
                      const away  = comp.competitors?.find(c => c.homeAway === 'away') || comp.competitors?.[1];
                      const stinfo = comp.status?.type || {};
                      const clock = comp.status?.displayClock;
                      const isLive  = stinfo.state === 'in';
                      const isFinal = stinfo.state === 'post' && stinfo.completed;
                      const badgeText = isFinal ? 'FT' : isLive ? (clock || 'LIVE') : new Date(ev.date).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZoneName:'short'});
                      const hFlag = FLAGS[espnName(home?.team?.displayName)] || '🏳️';
                      const aFlag = FLAGS[espnName(away?.team?.displayName)] || '🏳️';
                      return (
                        <div key={ev.id} className={`ls-row ${isLive ? 'ls-live' : ''}`}>
                          <div className="ls-team">
                            <span className="ls-flag">{hFlag}</span>
                            <span className={`ls-name ${home?.winner ? 'ls-winner' : ''}`}>{home?.team?.abbreviation || home?.team?.shortDisplayName}</span>
                          </div>
                          <div className="ls-scores">
                            {(isFinal || isLive) && <span className={`ls-num ${home?.winner ? 'ls-winner' : ''}`}>{home?.score}{home?.shootoutScore != null ? ` (${home.shootoutScore})` : ''}</span>}
                            <div className={`ls-badge ${isLive ? 'ls-badge-live' : isFinal ? 'ls-badge-ft' : 'ls-badge-sched'}`}>
                              {isLive && <span className="ls-dot">●</span>}{badgeText}
                            </div>
                            {(isFinal || isLive) && <span className={`ls-num ${away?.winner ? 'ls-winner' : ''}`}>{away?.score}{away?.shootoutScore != null ? ` (${away.shootoutScore})` : ''}</span>}
                          </div>
                          <div className="ls-team ls-team-away">
                            <span className={`ls-name ${away?.winner ? 'ls-winner' : ''}`}>{away?.team?.abbreviation || away?.team?.shortDisplayName}</span>
                            <span className="ls-flag">{aFlag}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ));
              })()}
            </div>

            {/* Group standings — everyone */}
            {(() => {
              const groupsWithResults = Object.entries(results.groups).filter(([,g]) => g.length >= 1);
              if (groupsWithResults.length === 0) return (
                <div className="stnd-empty">Group standings will appear here as results come in.</div>
              );
              return (
                <div className="stnd-section">
                  <div className="stnd-title">Group Standings</div>
                  <div className="stnd-grid">
                    {Object.keys(GROUPS).map(letter => {
                      const teams = results.groups[letter] || [];
                      if (!teams.length) return null;
                      return (
                        <div key={letter} className="stnd-group">
                          <div className="stnd-group-lbl">Group {letter}</div>
                          {teams.map((t, i) => (
                            <div key={t} className="stnd-row">
                              <span className={`stnd-pos rank-btn active pos-${i+1}`}>{i+1}</span>
                              <span className="stnd-flag">{FLAGS[t]||'🏳️'}</span>
                              <span className="stnd-name">{t}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                  </div>
                  {results.thirdRanked?.length > 0 && (
                    <div className="stnd-thirds">
                      <div className="stnd-thirds-lbl">3rd Place Qualifiers</div>
                      <div className="stnd-thirds-list">
                        {results.thirdRanked.map((t,i) => (
                          <div key={t} className="stnd-third-chip">
                            <span className="stnd-third-n">{i+1}</span>
                            <span>{FLAGS[t]||'🏳️'}</span>
                            <span>{t}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Completed matches — full tournament record */}
            <div className="pm-section">
              <div className="pm-title">Match Log</div>
              <div className="pm-sub">
                {!playedReady ? 'Loading…'
                  : playedMatches.length === 0 ? 'No matches have finished yet.'
                  : `${playedMatches.length} ${playedMatches.length === 1 ? 'match' : 'matches'} played — most recent first`}
              </div>
              {playedReady && playedMatches.length > 0 && (
                <div className="pm-table-wrap">
                  <table className="pm-table">
                    <thead>
                      <tr>
                        <th>Stage</th>
                        <th>Date</th>
                        <th className="pm-r">Home</th>
                        <th className="pm-c">Score</th>
                        <th>Away</th>
                      </tr>
                    </thead>
                    <tbody>
                      {playedMatches.map(ev => {
                        const comp = ev.competitions?.[0];
                        if (!comp) return null;
                        const home = comp.competitors?.find(c => c.homeAway === 'home') || comp.competitors?.[0];
                        const away = comp.competitors?.find(c => c.homeAway === 'away') || comp.competitors?.[1];
                        const hn = espnName(home?.team?.displayName);
                        const an = espnName(away?.team?.displayName);
                        const dateStr = (ev.date || '').slice(0, 10);
                        const stage = dateStr < '2026-06-28'
                          ? (TEAM_GROUP[hn] ? `Group ${TEAM_GROUP[hn]}` : 'Group Stage')
                          : (ROUND_LABELS[getESPNRoundByDate(dateStr)] || '—');
                        const dateLabel = new Date(ev.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const hPen = home?.shootoutScore != null ? ` (${home.shootoutScore})` : '';
                        const aPen = away?.shootoutScore != null ? ` (${away.shootoutScore})` : '';
                        return (
                          <tr key={ev.id} className="pm-row">
                            <td className="pm-stage">{stage}</td>
                            <td className="pm-date">{dateLabel}</td>
                            <td>
                              <div className="pm-team pm-team-home">
                                <span className={`pm-tname ${home?.winner ? 'pm-w' : ''}`}>{hn}</span>
                                <span className="pm-flag">{FLAGS[hn] || '🏳️'}</span>
                              </div>
                            </td>
                            <td className="pm-score">{home?.score}{hPen} – {away?.score}{aPen}</td>
                            <td>
                              <div className="pm-team">
                                <span className="pm-flag">{FLAGS[an] || '🏳️'}</span>
                                <span className={`pm-tname ${away?.winner ? 'pm-w' : ''}`}>{an}</span>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* Admin edit form — admin only, toggled by 🔑 */}
            {isAdmin && showAdminEdit && (
              <div style={{marginTop:20}}>
                <div className="admin-bar" style={{marginBottom:14}}>
                  <span className="admin-badge">🔑 Editing Results</span>
                  <button className="btn sm secondary" onClick={adminLogout}>Log out</button>
                </div>
                <div className="sync-row">
                  <button className="btn-sync" onClick={runSync} disabled={syncStatus === 'syncing'}>
                    {syncStatus === 'syncing' ? '↻ Syncing…' : '↻ Sync from ESPN'}
                  </button>
                  {syncStatus === 'ok' && lastSync && (
                    <span className="sync-time">✓ Synced {lastSync.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
                  )}
                  {syncStatus === 'error' && <span className="sync-time" style={{color:'var(--wrong)'}}>Sync failed</span>}
                  <span className="sync-time" style={{marginLeft:'auto',opacity:0.6}}>Auto-syncs every 3 min</span>
                </div>

                <div className="results-section">
                  <div className="results-section-header">Group Stage Results</div>
                  <div className="results-body">
                    <div className="groups-grid">
                      {Object.keys(GROUPS).map(letter => (
                        <GroupCard key={letter} letter={letter} picks={resultGroups}
                          onPick={handleResultGroupPick} results={{}} resultsMode={true} />
                      ))}
                    </div>
                  </div>
                </div>

                <div className="results-section">
                  <div className="results-section-header">3rd Place Qualifiers (8 advance)</div>
                  <div className="results-body">
                    <p style={{fontSize:'0.8rem',color:'var(--muted)',marginBottom:10}}>Select the 8 3rd-place teams that advanced. Order doesn't matter — Annex C places them in the bracket automatically.</p>
                    {(() => {
                      const allThirds = Object.keys(GROUPS).map(l => resultGroups[l]?.[2]).filter(Boolean);
                      const available = allThirds.filter(t => !resultThirdRanked.includes(t));
                      const addR = t => { if (resultThirdRanked.length < 8 && !resultThirdRanked.includes(t)) setResultThirdRanked([...resultThirdRanked, t]); };
                      const removeR = i => setResultThirdRanked(resultThirdRanked.filter((_, j) => j !== i));
                      return (
                        <>
                          <div className="third-rank-slots">
                            {Array.from({length: 8}, (_, i) => (
                              <div key={i} className={`third-slot ${resultThirdRanked[i] ? 'filled' : ''}`}>
                                <span className="third-slot-num">{i + 1}</span>
                                {resultThirdRanked[i] ? (
                                  <><span className="third-slot-flag">{FLAGS[resultThirdRanked[i]] || '🏳️'}</span>
                                  <span className="third-slot-name">{resultThirdRanked[i]}</span>
                                  <button className="third-slot-remove" onClick={() => removeR(i)}>×</button></>
                                ) : <span className="third-slot-empty">—</span>}
                              </div>
                            ))}
                          </div>
                          {available.length > 0 && (
                            <div className="third-available" style={{marginTop:10}}>
                              <span className="third-avail-label">Add:</span>
                              {available.map(t => (
                                <button key={t} className="third-chip" onClick={() => addR(t)} disabled={resultThirdRanked.length >= 8}>
                                  {FLAGS[t] || '🏳️'} {t}
                                </button>
                              ))}
                            </div>
                          )}
                          {allThirds.length === 0 && <p style={{fontSize:'0.8rem',color:'var(--muted)',opacity:0.6}}>Set group results above first.</p>}
                        </>
                      );
                    })()}
                  </div>
                </div>

                <div className="results-section">
                  <div className="results-section-header">Knockout Stage Results</div>
                  <div className="results-body">
                    {ROUND_KEYS.map(rk => {
                      const matchups = getKnockoutMatchups(rk, resultKnockout, resultGroups, resultThirdRanked);
                      if (matchups.length === 0 || matchups.every(m => !m[0] && !m[1])) return null;
                      return (
                        <div key={rk} style={{ marginBottom: 20 }}>
                          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: "1rem", letterSpacing: "1px", color: "var(--muted)", marginBottom: 8 }}>{ROUND_LABELS[rk]}</div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                            {matchups.map((match, i) => {
                              const picked = resultKnockout[rk]?.[i];
                              return (
                                <div key={i} style={{ background: "var(--card2)", borderRadius: 8, padding: 10 }}>
                                  <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginBottom: 6 }}>Match {i + 1}</div>
                                  <div className="team-picker">
                                    {[match[0], match[1]].filter(Boolean).map(team => (
                                      <button key={team} className={`team-chip ${picked === team ? "selected" : ""}`}
                                        onClick={() => handleKnockoutPick(rk, i * 2, team, setResultKnockout)}>
                                        <span>{FLAGS[team] || "🏳️"}</span><span>{team}</span>
                                      </button>
                                    ))}
                                    {!match[0] && !match[1] && <span style={{ fontSize: "0.78rem", color: "var(--muted)" }}>TBD</span>}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <button className="btn gold" style={{ width: "100%", justifyContent: "center" }} onClick={saveResults}>
                  ✓ Save Results &amp; Update Scores
                </button>
              </div>
            )}
          </div>
        )}

        {/* ══ SCORES TAB ══ */}
        {tab === 4 && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <div className="section-title" style={{ margin: 0 }}>Leaderboard</div>
              {(picksLocked || isAdmin) && players.length > 0 && (
                <button className="btn sm secondary" onClick={exportLeaderboard}>📥 Export</button>
              )}
            </div>
            {!picksLocked && !isAdmin ? (
              <div className="empty-state">
                <div className="icon">🔒</div>
                <p>Scores are hidden until picks lock at 2:00 PM ET on June 11 (1 hour before kickoff).<br />Check back once the tournament begins!</p>
              </div>
            ) : (
              <>
                {!hasResults && players.length > 0 && (
                  <div className="banner">Scores show 0 until the commissioner enters results in the Results tab.</div>
                )}
                {players.length === 0 ? (
                  <div className="empty-state">
                    <div className="icon">📊</div>
                    <p>No players yet. Add some in the Players tab!</p>
                  </div>
                ) : (
                  <div className="lb-list">
                    {scores.map((s, i) => (
                      <div key={s.name} className={`lb-row rank-${i + 1}`}>
                        <div className="lb-medal">{i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}.`}</div>
                        <div className="lb-info">
                          <div className="lb-name lb-name-link" onClick={() => goToPlayerCard(s.name)} title="View picks">{s.name}{s.name === myPlayer && <span style={{ fontSize: "0.72rem", color: "var(--accent)", fontWeight: 400 }}> (you)</span>}</div>
                          <div className="lb-breakdown">
                            {[
                              ["Grp", s.breakdown.group],
                              ["3rd", s.breakdown.third],
                              ["R32", s.breakdown.r32],
                              ["R16", s.breakdown.r16],
                              ["QF",  s.breakdown.qf],
                              ["SF",  s.breakdown.sf],
                              ["F",   s.breakdown.final],
                            ].map(([label, val]) => (
                              <span key={label} className={`bd-chip ${val > 0 ? "has-pts" : ""}`}>{label}: {val}</span>
                            ))}
                          </div>
                          {s.finalWinner && <div className="lb-champ">🏆 Picked to win: {FLAGS[s.finalWinner]} {s.finalWinner}</div>}
                        </div>
                        <div className={`lb-score ${s.total === 0 ? "zero" : ""}`}>{s.total}</div>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
            <div className="scoring-guide" style={{ marginTop: 20 }}>
              <h3>Max Possible Points</h3>
              {[
                ["Group stage (all correct)",              `${SCORING.group * 36} pts`],
                ["3rd-place teams advancing (all 8)",       `${SCORING.third * 8} pts`],
                ["Round of 32 (all correct)",              `${SCORING.r32 * 16} pts`],
                ["Round of 16 (all correct)",              `${SCORING.r16 * 8} pts`],
                ["Quarterfinals (all correct)",            `${SCORING.qf * 4} pts`],
                ["Semifinals (all correct)",               `${SCORING.sf * 2} pts`],
                ["Final winner / champion (correct)",      `${SCORING.final} pts`],
                ["TOTAL",                                  `${SCORING.group*36 + SCORING.third*8 + SCORING.r32*16 + SCORING.r16*8 + SCORING.qf*4 + SCORING.sf*2 + SCORING.final} pts`],
              ].map(([r, p]) => (
                <div key={r} className="scoring-row"><span>{r}</span><span className="pts">{p}</span></div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* ── SAVE BAR ── */}
      {(tab === 1 || tab === 2) && myPlayer && !picksLocked && (
        <div className="save-bar">
          <span className="for-label">Editing: <strong>{activePlayer}</strong></span>
          <button className="btn" onClick={savePicks}>Save Picks ✓</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
