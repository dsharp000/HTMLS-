<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Lunch Picker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 32px 16px;
        }

        h1 {
            font-size: 2rem;
            color: #fb923c;
            margin-bottom: 4px;
        }

        #subtitle {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        #main {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        /* --- LEFT: Input panel --- */
        #input-panel {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            width: 320px;
            border: 1px solid #334155;
        }

        #input-panel h2 {
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        #add-area {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        #new-option {
            flex: 1;
            padding: 10px 14px;
            font-size: 1rem;
            border: 2px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
            outline: none;
            transition: border-color 0.2s;
        }

        #new-option:focus { border-color: #fb923c; }

        #add-btn {
            padding: 10px 16px;
            background: #fb923c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #add-btn:hover { background: #ea7c28; }

        #options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 340px;
            overflow-y: auto;
        }

        #options-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            border: 1px solid #1e293b;
        }

        #options-list li span {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0 0 10px;
            transition: color 0.2s;
        }

        .remove-btn:hover { color: #f87171; }

        #count {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #475569;
            text-align: right;
        }

        /* --- RIGHT: Results panel --- */
        #results-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 320px;
        }

        #pick-btn {
            width: 100%;
            padding: 16px;
            background: #fb923c;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }

        #pick-btn:hover { background: #ea7c28; }
        #pick-btn:active { transform: scale(0.97); }
        #pick-btn:disabled { background: #334155; color: #64748b; cursor: default; }

        #results {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-card {
            background: #1e293b;
            border-radius: 14px;
            padding: 16px 18px;
            border: 1px solid #334155;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.3s;
        }

        .result-card.winner {
            border-color: #fb923c;
            box-shadow: 0 0 12px rgba(251, 146, 60, 0.25);
        }

        .result-card:nth-child(1) { animation-delay: 0.0s; }
        .result-card:nth-child(2) { animation-delay: 0.15s; }
        .result-card:nth-child(3) { animation-delay: 0.30s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .medal {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .result-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #f1f5f9;
            flex: 1;
        }

        .vote-btn {
            padding: 6px 14px;
            background: #fb923c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .vote-btn:hover { background: #ea7c28; }
        .vote-btn:active { transform: scale(0.95); }

        .vote-count {
            font-size: 0.85rem;
            color: #94a3b8;
            min-width: 20px;
            text-align: right;
        }

        .bar-track {
            background: #0f172a;
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #fb923c;
            border-radius: 99px;
            width: 0%;
            transition: width 0.4s ease;
        }

        #reset-votes-btn {
            width: 100%;
            padding: 10px;
            background: none;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #64748b;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            display: none;
        }

        #reset-votes-btn:hover { border-color: #f87171; color: #f87171; }

        #empty-msg {
            color: #475569;
            font-size: 0.95rem;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <h1>Friday Lunch Picker</h1>
    <p id="subtitle">Add your options, then spin to pick 3</p>

    <div id="main">
        <div id="input-panel">
            <h2>Your Options</h2>
            <div id="add-area">
                <input type="text" id="new-option" placeholder="e.g. Chipotle" maxlength="50">
                <button id="add-btn">+</button>
            </div>
            <ul id="options-list"></ul>
            <p id="count"></p>
        </div>

        <div id="results-panel">
            <button id="pick-btn" disabled>Pick 3 for Us</button>
            <div id="results">
                <p id="empty-msg">Add at least 3 options to get started</p>
            </div>
            <button id="reset-votes-btn">Reset votes</button>
        </div>
    </div>

    <script>
        let options = JSON.parse(localStorage.getItem('lunchOptions') || '[]');

        const listEl     = document.getElementById('options-list');
        const inputEl    = document.getElementById('new-option');
        const addBtn     = document.getElementById('add-btn');
        const pickBtn    = document.getElementById('pick-btn');
        const resultsEl  = document.getElementById('results');
        const countEl    = document.getElementById('count');
        const emptyMsg   = document.getElementById('empty-msg');

        const medals = ['🥇', '🥈', '🥉'];
        const resetVotesBtn = document.getElementById('reset-votes-btn');
        let votes = [0, 0, 0];
        let currentPicks = [];

        function save() {
            localStorage.setItem('lunchOptions', JSON.stringify(options));
        }

        function render() {
            listEl.innerHTML = '';
            options.forEach((opt, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${opt}</span>`;
                const btn = document.createElement('button');
                btn.className = 'remove-btn';
                btn.textContent = '×';
                btn.title = 'Remove';
                btn.addEventListener('click', () => {
                    options.splice(i, 1);
                    save();
                    render();
                });
                li.appendChild(btn);
                listEl.appendChild(li);
            });

            const n = options.length;
            countEl.textContent = n === 0 ? '' : `${n} option${n !== 1 ? 's' : ''}`;
            pickBtn.disabled = n < 3;
            if (n < 3) {
                emptyMsg.style.display = 'block';
                emptyMsg.textContent = n === 0
                    ? 'Add at least 3 options to get started'
                    : `Add ${3 - n} more option${3 - n !== 1 ? 's' : ''}...`;
            }
        }

        function addOption() {
            const val = inputEl.value.trim();
            if (!val) return;
            if (options.includes(val)) {
                inputEl.style.borderColor = '#f87171';
                setTimeout(() => inputEl.style.borderColor = '', 1000);
                inputEl.select();
                return;
            }
            options.push(val);
            save();
            render();
            inputEl.value = '';
            inputEl.focus();
        }

        function updateBars() {
            const total = votes.reduce((a, b) => a + b, 0);
            const maxVotes = Math.max(...votes);
            const cards = resultsEl.querySelectorAll('.result-card');

            cards.forEach((card, i) => {
                const fill = card.querySelector('.bar-fill');
                const count = card.querySelector('.vote-count');
                const pct = total === 0 ? 0 : (votes[i] / total) * 100;
                fill.style.width = pct + '%';
                count.textContent = votes[i] === 1 ? '1 vote' : `${votes[i]} votes`;
                card.classList.toggle('winner', total > 0 && votes[i] === maxVotes);
            });
        }

        function pick() {
            const shuffled = [...options].sort(() => Math.random() - 0.5);
            currentPicks = shuffled.slice(0, 3);
            votes = [0, 0, 0];

            resultsEl.innerHTML = '';
            emptyMsg.style.display = 'none';
            resetVotesBtn.style.display = 'block';

            currentPicks.forEach((name, i) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="card-top">
                        <span class="medal">${medals[i]}</span>
                        <span class="result-name">${name}</span>
                        <button class="vote-btn">Vote</button>
                        <span class="vote-count">0 votes</span>
                    </div>
                    <div class="bar-track"><div class="bar-fill"></div></div>
                `;
                card.querySelector('.vote-btn').addEventListener('click', () => {
                    votes[i]++;
                    updateBars();
                });
                resultsEl.appendChild(card);
            });
        }

        function resetVotes() {
            votes = [0, 0, 0];
            updateBars();
        }

        addBtn.addEventListener('click', addOption);
        inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addOption(); });
        pickBtn.addEventListener('click', pick);
        resetVotesBtn.addEventListener('click', resetVotes);

        render();
    </script>
</body>
</html>
