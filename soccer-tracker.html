<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a1a0f;
    color: #e8f5e0;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    padding-bottom: 70px;
    overflow-x: hidden;
  }

  /* ── BOTTOM TAB BAR ── */
  #tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: #0d2010;
    border-top: 1px solid #1e4a20;
    display: flex;
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: #4a7a4a;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: color 0.2s;
  }
  .tab-btn.active { color: #7fff7f; }
  .tab-btn svg { width: 20px; height: 20px; }

  /* ── SCREENS ── */
  .screen { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── COMMON ── */
  h2 {
    font-size: 13px;
    letter-spacing: 2px;
    color: #7fff7f;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card {
    background: #0d2010;
    border: 1px solid #1e4a20;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  input[type="text"], input[type="date"], input[type="number"] {
    background: #0a1a0f;
    border: 1px solid #2a5a2a;
    border-radius: 4px;
    color: #e8f5e0;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    width: 100%;
  }
  input:focus { border-color: #7fff7f; }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: #1a5c1a;
    color: #7fff7f;
    border: 1px solid #2a8c2a;
    padding: 8px 16px;
  }
  .btn-primary:hover { background: #236b23; }
  .btn-primary:active { background: #145014; }
  .btn-danger {
    background: #4a0a0a;
    color: #ff7f7f;
    border: 1px solid #8c2a2a;
    padding: 8px 16px;
  }
  .btn-danger:hover { background: #5a1010; }
  .btn-sm {
    padding: 4px 8px;
    font-size: 11px;
  }
  .btn-ghost {
    background: transparent;
    color: #4a7a4a;
    border: 1px solid #2a4a2a;
    padding: 4px 8px;
  }
  .btn-ghost:hover { color: #7fff7f; border-color: #7fff7f; }

  /* ── MATCH HEADER ── */
  #match-header {
    text-align: center;
    margin-bottom: 16px;
  }
  #team-vs {
    font-size: 14px;
    letter-spacing: 2px;
    color: #7fff7f;
    margin-bottom: 4px;
  }
  #match-date-display {
    font-size: 11px;
    color: #4a7a4a;
    margin-bottom: 12px;
  }
  #clock-display {
    font-size: 52px;
    font-weight: bold;
    color: #7fff7f;
    text-shadow: 0 0 20px rgba(127,255,127,0.5);
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 8px;
  }
  #half-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #4a7a4a;
    margin-bottom: 8px;
  }
  #halftime-banner {
    display: none;
    background: #1a4a00;
    border: 1px solid #7fff7f;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 12px;
    letter-spacing: 3px;
    color: #7fff7f;
    margin-bottom: 8px;
    text-align: center;
  }
  /* progress bar */
  #progress-wrap {
    background: #0a2a0a;
    border-radius: 4px;
    height: 6px;
    margin-bottom: 6px;
    position: relative;
    overflow: visible;
  }
  #progress-fill {
    background: linear-gradient(90deg, #1a6a1a, #7fff7f);
    height: 100%;
    border-radius: 4px;
    transition: width 1s linear;
    position: relative;
  }
  #progress-dot {
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    background: #7fff7f;
    border-radius: 50%;
    box-shadow: 0 0 8px #7fff7f;
  }
  #halftime-tick {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 14px;
    background: #ffca28;
    border-radius: 1px;
  }
  #halftime-tick::after {
    content: 'HT';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 7px;
    color: #ffca28;
    letter-spacing: 0.5px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── SCORE ── */
  #score-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 12px 0;
  }
  .score-team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .score-label { font-size: 10px; color: #4a7a4a; letter-spacing: 1px; }
  .score-value { font-size: 36px; font-weight: bold; color: #e8f5e0; line-height: 1; }
  .score-btns { display: flex; gap: 4px; }
  .score-btn {
    width: 26px; height: 26px;
    border-radius: 4px;
    font-size: 16px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .score-dash { font-size: 28px; color: #4a7a4a; }

  /* ── MATCH CONTROLS ── */
  #match-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  #match-controls button { flex: 1 1 auto; min-width: 80px; padding: 10px 8px; }

  /* ── PITCH COUNT ── */
  #pitch-count {
    font-size: 11px;
    color: #4a7a4a;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-align: center;
  }
  #pitch-count span { color: #7fff7f; font-weight: bold; }

  /* ── PLAYER GRID ── */
  #player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  /* ── PLAYER CARD (FLIP) ── */
  .player-card-wrapper {
    perspective: 800px;
    height: 200px;
  }
  .player-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.4s ease;
  }
  .player-card-wrapper.flipped .player-card-inner {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 8px;
    overflow: hidden;
  }
  .card-front {
    background: #0d2010;
    border: 1px solid #1e4a20;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    padding: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card-front.on-pitch {
    border-color: #7fff7f;
    box-shadow: 0 0 12px rgba(127,255,127,0.3);
  }
  .card-back {
    background: #0a1f0a;
    border: 1px solid #2a6a2a;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    padding: 10px;
    overflow-y: auto;
  }

  /* card front layout */
  .card-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .pos-badge {
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 1px;
    background: #1a3a1a;
    border: 1px solid #2a6a2a;
    border-radius: 3px;
    padding: 2px 5px;
    color: #7fff7f;
    cursor: pointer;
    user-select: none;
    min-width: 28px;
    text-align: center;
  }
  .pos-badge:hover { background: #2a5a2a; }
  .card-actions {
    display: flex;
    gap: 3px;
  }
  .icon-btn {
    background: transparent;
    border: none;
    color: #4a7a4a;
    cursor: pointer;
    padding: 2px;
    font-size: 13px;
    line-height: 1;
    border-radius: 3px;
  }
  .icon-btn:hover { color: #7fff7f; background: #1a3a1a; }
  .player-name {
    font-size: 14px;
    font-weight: bold;
    color: #e8f5e0;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-name-input {
    width: 100%;
    font-size: 13px;
    font-weight: bold;
    background: #0a1a0f;
    border: 1px solid #7fff7f;
    border-radius: 3px;
    color: #e8f5e0;
    padding: 2px 4px;
    font-family: inherit;
    margin-bottom: 4px;
  }
  .player-time {
    font-size: 18px;
    font-weight: bold;
    color: #7fff7f;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  /* mini bar */
  .mini-bar-wrap {
    background: #0a2a0a;
    border-radius: 2px;
    height: 3px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .mini-bar-fill {
    background: #7fff7f;
    height: 100%;
    border-radius: 2px;
    transition: width 1s linear;
  }
  .card-bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }
  .status-badge {
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .status-on { background: #1a4a1a; color: #7fff7f; border: 1px solid #2a8a2a; }
  .status-off { background: #1a1a1a; color: #4a7a4a; border: 1px solid #2a3a2a; }
  .goals-row {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #4a7a4a;
  }
  .goals-count { color: #e8f5e0; font-weight: bold; }
  .goal-btn {
    background: #1a3a0a;
    border: 1px solid #2a6a1a;
    color: #7fff7f;
    width: 18px; height: 18px;
    border-radius: 3px;
    font-size: 12px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .goal-btn:hover { background: #2a5a1a; }

  /* card back */
  .card-back-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .card-back-name { font-size: 12px; font-weight: bold; color: #7fff7f; }
  .sub-log-list { list-style: none; flex: 1; overflow-y: auto; }
  .sub-log-list li {
    font-size: 10px;
    padding: 3px 0;
    border-bottom: 1px solid #1a3a1a;
    color: #a0c8a0;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sub-on { color: #7fff7f; }
  .sub-off { color: #ff9a9a; }
  .sub-empty { color: #4a7a4a; font-size: 10px; font-style: italic; }

  /* ── MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal-box {
    background: #0d2010;
    border: 1px solid #2a6a2a;
    border-radius: 10px;
    padding: 24px;
    width: 90%;
    max-width: 380px;
  }
  #modal-box h3 {
    color: #7fff7f;
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 1px;
    color: #4a7a4a;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btns button { flex: 1; padding: 10px; }

  /* ── SEASON SCREEN ── */
  #season-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .season-tab {
    padding: 7px 16px;
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 1px;
    background: #0d2010;
    border: 1px solid #1e4a20;
    color: #4a7a4a;
  }
  .season-tab.active { background: #1a5c1a; color: #7fff7f; border-color: #2a8c2a; }

  .match-row {
    background: #0d2010;
    border: 1px solid #1e4a20;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .match-row:hover { border-color: #2a6a2a; }
  .match-row-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .match-row-title { font-size: 13px; font-weight: bold; }
  .match-row-score { font-size: 18px; font-weight: bold; color: #7fff7f; }
  .match-row-meta { font-size: 10px; color: #4a7a4a; margin-top: 3px; }
  .match-detail {
    display: none;
    margin-top: 10px;
    border-top: 1px solid #1e4a20;
    padding-top: 10px;
  }
  .match-detail.open { display: block; }
  .match-detail table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .match-detail th {
    color: #4a7a4a;
    font-size: 10px;
    letter-spacing: 1px;
    text-align: left;
    padding: 4px 6px;
    border-bottom: 1px solid #1e4a20;
  }
  .match-detail td {
    padding: 4px 6px;
    border-bottom: 1px solid #0f2a0f;
  }
  .sub-log-inline { font-size: 9px; color: #4a7a4a; }

  /* season stats table */
  #stats-table-wrap { overflow-x: auto; }
  #stats-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  #stats-table th {
    color: #4a7a4a;
    font-size: 10px;
    letter-spacing: 1px;
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid #1e4a20;
    text-transform: uppercase;
  }
  #stats-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #0f2a0f;
  }
  #stats-table tr:hover td { background: #0d2010; }
  .stat-minutes { color: #7fff7f; font-weight: bold; }

  /* ── SETTINGS ── */
  .setting-group { margin-bottom: 20px; }
  .setting-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 1px;
    color: #4a7a4a;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  #conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #1e4a20;
    border-radius: 6px;
  }
  #conn-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; flex-shrink: 0; }
  #conn-dot.live { background: #7fff7f; box-shadow: 0 0 6px #7fff7f; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a5c1a;
    border: 1px solid #7fff7f;
    color: #7fff7f;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 300;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SUB PANEL ── */
  #sub-panel {
    background: #0d2010;
    border: 1px solid #1e4a20;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .sub-panel-title {
    font-size: 9px;
    letter-spacing: 2px;
    color: #4a7a4a;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .sub-panel-cols {
    display: flex;
    gap: 16px;
  }
  .sub-col { flex: 1; }
  .sub-col-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: #4a7a4a;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #1a3a1a;
  }
  .sub-col-label.label-off { color: #ff9a9a; border-color: #3a1a1a; }
  .sub-col-label.label-on  { color: #7fff7f; border-color: #1a3a1a; }
  .sub-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: 11px;
  }
  .sub-row-num { color: #2a5a2a; font-size: 9px; margin-right: 4px; min-width: 12px; }
  .sub-row-name { color: #e8f5e0; }
  .sub-row-time { color: #4a6a4a; font-size: 10px; }
  .sub-row:first-child .sub-row-name { color: #7fff7f; }
  .sub-row:first-child .sub-col-off .sub-row-name { color: #ff9a9a; }
  .sub-empty-msg { font-size: 10px; color: #2a4a2a; font-style: italic; }

  /* ── UNAVAILABLE ── */
  .is-unavailable { opacity: 0.3; filter: grayscale(80%); }
  .status-out { background: #2a0a0a; color: #ff6060; border: 1px solid #5a1a1a; }
  .icon-btn.unavail-on { color: #ff5a5a; }

  @media (max-width: 400px) {
    #clock-display { font-size: 40px; }
    .player-card-wrapper { height: 210px; }
  }
</style>
</head>
<body>

<!-- SCREENS -->
<div id="screen-match" class="screen active">
  <div id="match-header">
    <div id="team-vs">— vs —</div>
    <div id="match-date-display"></div>
    <div id="clock-display">00:00</div>
    <div id="half-label">1ST HALF</div>
    <div id="halftime-banner">⏸ HALFTIME</div>
    <div id="progress-wrap">
      <div id="progress-fill" style="width:0%">
        <div id="progress-dot"></div>
      </div>
      <div id="halftime-tick"></div>
    </div>

    <!-- Score -->
    <div id="score-section">
      <div class="score-team">
        <div class="score-label" id="score-team-label">TEAM</div>
        <div class="score-value" id="score-home">0</div>
        <div class="score-btns">
          <button class="score-btn btn-primary" onclick="adjustScore('home',1)">+</button>
          <button class="score-btn btn-ghost" onclick="adjustScore('home',-1)">−</button>
        </div>
      </div>
      <div class="score-dash">–</div>
      <div class="score-team">
        <div class="score-label" id="score-opp-label">OPP</div>
        <div class="score-value" id="score-away">0</div>
        <div class="score-btns">
          <button class="score-btn btn-primary" onclick="adjustScore('away',1)">+</button>
          <button class="score-btn btn-ghost" onclick="adjustScore('away',-1)">−</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="match-controls">
    <button class="btn-primary" onclick="openNewMatchModal()">⚽ New Match</button>
    <button class="btn-primary" id="btn-kickoff" onclick="kickOff()">▶ Kick Off</button>
    <button class="btn-ghost" id="btn-pause" onclick="pauseMatch()" disabled>⏸ Pause</button>

    <button class="btn-ghost" id="btn-reset" onclick="resetMatch()">↺ Reset</button>
    <button class="btn-primary" id="btn-end" onclick="endMatch()">✓ Save Match</button>
  </div>
  <div id="pitch-count">ON PITCH: <span id="pitch-count-num">0</span> / 11</div>

  <div id="sub-panel" style="display:none"></div>

  <div id="player-grid"></div>
</div>

<div id="screen-season" class="screen">
  <h2>Season</h2>
  <div id="season-tabs">
    <button class="season-tab active" onclick="switchSeasonTab('history')">Match History</button>
    <button class="season-tab" onclick="switchSeasonTab('stats')">Season Stats</button>
  </div>
  <div id="tab-history">
    <div id="match-list"><p style="color:#4a7a4a;font-size:12px;">No saved matches yet.</p></div>
  </div>
  <div id="tab-stats" style="display:none">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
      <button class="btn-primary btn-sm" onclick="exportCSV()">↓ Export CSV</button>
    </div>
    <div id="stats-table-wrap">
      <table id="stats-table">
        <thead><tr>
          <th>Player</th><th>Matches</th><th>Minutes</th><th>Goals</th>
        </tr></thead>
        <tbody id="stats-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="screen-settings" class="screen">
  <h2>Settings</h2>
  <div class="card">
    <div class="setting-group">
      <label>Team Name</label>
      <input type="text" id="team-name-input" placeholder="Enter team name…"

<script type="module">
/*
  Firebase rules needed:
  {
    "rules": {
      "soccer": { ".read": true, ".write": true }
    }
  }
*/

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getDatabase, ref, set, get, onValue, runTransaction, remove
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── FIREBASE INIT ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCp2PBbqdj_g6NPR9iYQb7Z6tgXbqLtHIA",
  authDomain:        "lunch-f7021.firebaseapp.com",
  databaseURL:       "https://lunch-f7021-default-rtdb.firebaseio.com",
  projectId:         "lunch-f7021",
  storageBucket:     "lunch-f7021.firebasestorage.app",
  messagingSenderId: "1053755216064",
  appId:             "1:1053755216064:web:14b749200f825a4e9bdd25"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const ROSTER_NAMES = ['Abel','Anthony','Blake','Braxton','Graham','Louis','Luis','Maddox','Roman','Sila','Xavier'];
const POSITIONS    = ['','GK','DEF','MID','FOR'];

function makePlayers() {
  return ROSTER_NAMES.map((name, i) => ({
    id: i,
    name,
    position: '',
    onPitch: false,
    totalTime: 0,
    startedAt: null,
    goals: 0,
    subLog: [],
    unavailable: false
  }));
}

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  teamName: 'My Team',
  matchDuration: 50,   // minutes
  live: {
    matchId: null,
    opponent: '',
    date: '',
    phase: 'stopped', // 'stopped'|'running'|'halftime'|'done'
    elapsed: 0,       // seconds accumulated before last resume
    resumedAt: null,  // Date.now() timestamp when last resumed
    scoreHome: 0,
    scoreAway: 0,
    players: makePlayers()
  },
  matches: {}
};

let localTickInterval = null;
let ignoreFirebase = false; // brief flag to avoid echo on local writes

// ── FIREBASE LISTENERS ─────────────────────────────────────────────────────
onValue(ref(db, 'soccer/team-name'), snap => {
  const v = snap.val();
  if (v !== null) {
    state.teamName = v;
    document.getElementById('team-name-input').value = v;
    renderMatchHeader();
  }
});

onValue(ref(db, 'soccer/live'), snap => {
  const v = snap.val();
  if (v === null) return;
  // Merge into state.live
  const prev = state.live;
  state.live = { ...makeLiveDefaults(), ...v };
  // Deserialise player arrays (Firebase drops undefined keys)
  if (v.players) {
    state.live.players = ROSTER_NAMES.map((name, i) => {
      const p = v.players[i] || {};
      return {
        id: i, name: p.name || name,
        position: p.position || '',
        onPitch: !!p.onPitch,
        totalTime: p.totalTime || 0,
        startedAt: p.startedAt || null,
        goals: p.goals || 0,
        subLog: p.subLog || [],
        unavailable: !!p.unavailable
      };
    });
  }
  setupLocalTick();
  renderAll();
});

onValue(ref(db, 'soccer/matches'), snap => {
  state.matches = snap.val() || {};
  renderSeasonScreen();
});

// Connection status
onValue(ref(db, '.info/connected'), snap => {
  const live = snap.val() === true;
  document.getElementById('conn-dot').classList.toggle('live', live);
  document.getElementById('conn-text').textContent = live ? 'Live — connected to Firebase' : 'Disconnected';
});

// ── HELPERS ───────────────────────────────────────────────────────────────
function makeLiveDefaults() {
  return {
    matchId: null, opponent: '', date: '',
    phase: 'stopped', elapsed: 0, resumedAt: null,
    scoreHome: 0, scoreAway: 0,
    players: makePlayers()
  };
}

function currentElapsed() {
  const { phase, elapsed, resumedAt } = state.live;
  if (phase === 'running' && resumedAt) {
    return elapsed + (Date.now() / 1000 - resumedAt);
  }
  return elapsed || 0;
}

function fmtTime(secs) {
  const s = Math.max(0, Math.floor(secs));
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function matchMinute() {
  return currentElapsed(); // returns total seconds for precise MM:SS logging
}

function halfLabel() {
  const half = state.matchDuration / 2;
  return currentElapsed() < half * 60 ? '1ST HALF' : '2ND HALF';
}

function writeLive() {
  // Serialise players array to plain object for Firebase
  const live = { ...state.live };
  live.players = state.live.players.map(p => ({ ...p, subLog: p.subLog || [] }));
  set(ref(db, 'soccer/live'), live);
}

// ── LOCAL TICK ─────────────────────────────────────────────────────────────
function setupLocalTick() {
  clearInterval(localTickInterval);
  if (state.live.phase === 'running') {
    localTickInterval = setInterval(() => {
      renderClockAndBars();
      renderSubPanel();
    }, 500);
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderMatchHeader();
  renderControls();
  renderSubPanel();
  renderPlayerGrid();
}

function renderMatchHeader() {
  const { teamName, live, matchDuration } = state;
  const { opponent, date, scoreHome, scoreAway, phase } = live;

  document.getElementById('team-vs').textContent =
    `${teamName || 'My Team'} vs ${opponent || '—'}`;
  document.getElementById('match-date-display').textContent = date || '';

  document.getElementById('score-team-label').textContent = (teamName || 'TEAM').toUpperCase().slice(0,8);
  document.getElementById('score-opp-label').textContent  = (opponent || 'OPP').toUpperCase().slice(0,8);
  document.getElementById('score-home').textContent = scoreHome ?? 0;
  document.getElementById('score-away').textContent = scoreAway ?? 0;

  document.getElementById('halftime-banner').style.display =
    phase === 'halftime' ? 'block' : 'none';

  renderClockAndBars();
}

function renderClockAndBars() {
  const elapsed = currentElapsed();
  const totalSecs = (state.matchDuration || 50) * 60;
  const halfSecs  = totalSecs / 2;

  // Cap display at match duration
  const display = Math.min(elapsed, totalSecs);
  document.getElementById('clock-display').textContent = fmtTime(display);

  // Half label
  if (state.live.phase === 'halftime') {
    document.getElementById('half-label').textContent = '— HALFTIME —';
  } else {
    document.getElementById('half-label').textContent =
      elapsed < halfSecs ? '1ST HALF' : '2ND HALF';
  }

  // Progress bar
  const pct = Math.min(100, (elapsed / totalSecs) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  // Player time bars + live counters
  state.live.players.forEach((p, i) => {
    const card = document.getElementById(`card-${i}`);
    if (!card) return;
    const playerSecs = playerElapsed(p);
    const timeEl = card.querySelector('.player-time');
    if (timeEl) timeEl.textContent = fmtTime(playerSecs);
    const barEl = card.querySelector('.mini-bar-fill');
    if (barEl) {
      const pPct = Math.min(100, (playerSecs / totalSecs) * 100);
      barEl.style.width = pPct + '%';
    }
  });

  // Pitch count
  const onCount = state.live.players.filter(p => p.onPitch).length;
  document.getElementById('pitch-count-num').textContent = onCount;
}

function playerElapsed(p) {
  let t = p.totalTime || 0;
  if (p.onPitch && p.startedAt && state.live.phase === 'running') {
    t += Date.now() / 1000 - p.startedAt;
  }
  return t;
}

function renderControls() {
  const phase = state.live.phase;
  const hasMatch = !!state.live.matchId;

  document.getElementById('btn-kickoff').disabled  = !hasMatch || phase === 'running';
  document.getElementById('btn-kickoff').textContent =
    phase === 'stopped' ? '▶ Kick Off' : '▶ Resume';
  document.getElementById('btn-pause').disabled    = phase !== 'running';

  document.getElementById('btn-end').disabled      = !hasMatch;
}

function renderPlayerGrid() {
  const grid = document.getElementById('player-grid');
  // Preserve flip states
  const flipped = {};
  grid.querySelectorAll('.player-card-wrapper').forEach(el => {
    flipped[el.dataset.pid] = el.classList.contains('flipped');
  });

  grid.innerHTML = '';
  const sortedPlayers = state.live.players
    .map((p, i) => ({ p, i }))
    .sort((a, b) => playerElapsed(b.p) - playerElapsed(a.p));
  sortedPlayers.forEach(({ p, i }) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'player-card-wrapper' + (flipped[i] ? ' flipped' : '') + (p.unavailable ? ' is-unavailable' : '');
    wrapper.dataset.pid = i;
    wrapper.id = `card-${i}`;

    const playerSecs = playerElapsed(p);
    const totalSecs  = (state.matchDuration || 50) * 60;
    const pPct = Math.min(100, (playerSecs / totalSecs) * 100);
    const posLabel = p.position || '—';

    wrapper.innerHTML = `
      <div class="player-card-inner">
        <div class="card-face card-front ${p.onPitch ? 'on-pitch' : ''}">
          <div class="card-top-row">
            <span class="pos-badge" title="Click to change position" onclick="cyclePosition(event,${i})">${posLabel}</span>
            <div class="card-actions">
              <button class="icon-btn ${p.unavailable ? 'unavail-on' : ''}" title="${p.unavailable ? 'Mark available' : 'Mark unavailable'}" onclick="toggleUnavailable(event,${i})">⛔</button>
              <button class="icon-btn" title="Edit name" onclick="editName(event,${i})">✏</button>
              <button class="icon-btn" title="Timeline" onclick="flipCard(event,${i})">🕐</button>
            </div>
          </div>
          <div class="player-name" id="name-display-${i}">${p.name}</div>
          <div class="player-time">${fmtTime(playerSecs)}</div>
          <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${pPct}%"></div></div>
          <div class="card-bottom-row">
            <span class="status-badge ${p.onPitch ? 'status-on' : p.unavailable ? 'status-out' : 'status-off'}">
              ${p.onPitch ? 'ON PITCH' : p.unavailable ? 'OUT' : 'BENCH'}
            </span>
            <div class="goals-row">
              ⚽<span class="goals-count">${p.goals}</span>
              <button class="goal-btn" title="Add goal" onclick="addGoal(event,${i})">+</button>
            </div>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-back-header">
            <span class="card-back-name">${p.name}</span>
            <button class="icon-btn" onclick="flipCard(event,${i})">✕</button>
          </div>
          <ul class="sub-log-list">
            ${renderSubLog(p)}
          </ul>
        </div>
      </div>
    `;

    // Click on front face to toggle on/off pitch
    wrapper.querySelector('.card-front').addEventListener('click', (e) => {
      // Don't trigger for buttons / badges
      if (e.target.closest('button') || e.target.closest('.pos-badge') ||
          e.target.closest('.icon-btn')) return;
      togglePlayer(i);
    });

    grid.appendChild(wrapper);
  });
}

function renderSubPanel() {
  const panel = document.getElementById('sub-panel');
  const { matchId, phase } = state.live;

  if (!matchId || phase === 'done') {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';

  const elapsed = currentElapsed();
  const players = state.live.players;

  // Sub OFF: on pitch, available, sorted by most time on pitch (longest first)
  const subOff = players
    .filter(p => p.onPitch && !p.unavailable)
    .map(p => ({ p, secs: playerElapsed(p) }))
    .sort((a, b) => b.secs - a.secs)
    .slice(0, 4);

  // Sub ON: off pitch, available, sorted by most time off (longest sit first)
  const subOn = players
    .filter(p => !p.onPitch && !p.unavailable)
    .map(p => ({ p, timeOff: elapsed - playerElapsed(p) }))
    .sort((a, b) => b.timeOff - a.timeOff)
    .slice(0, 4);

  const offRows = subOff.length
    ? subOff.map((r, idx) => `
        <div class="sub-row">
          <span class="sub-row-num">${idx + 1}.</span>
          <span class="sub-row-name">${r.p.name}</span>
          <span class="sub-row-time">${fmtTime(r.secs)}</span>
        </div>`).join('')
    : `<div class="sub-empty-msg">None on pitch</div>`;

  const onRows = subOn.length
    ? subOn.map((r, idx) => `
        <div class="sub-row">
          <span class="sub-row-num">${idx + 1}.</span>
          <span class="sub-row-name">${r.p.name}</span>
          <span class="sub-row-time">${fmtTime(Math.max(0, r.timeOff))} off</span>
        </div>`).join('')
    : `<div class="sub-empty-msg">None on bench</div>`;

  panel.innerHTML = `
    <div class="sub-panel-title">⇄ Sub Recommendations</div>
    <div class="sub-panel-cols">
      <div class="sub-col">
        <div class="sub-col-label label-off">Take Off</div>
        ${offRows}
      </div>
      <div class="sub-col">
        <div class="sub-col-label label-on">Bring On</div>
        ${onRows}
      </div>
    </div>`;
}

window.toggleUnavailable = function(e, i) {
  e.stopPropagation();
  const p = state.live.players[i];
  p.unavailable = !p.unavailable;
  // If they're on the pitch, take them off when marked unavailable
  if (p.unavailable && p.onPitch) {
    const nowSec = Date.now() / 1000;
    if (p.startedAt && state.live.phase === 'running') {
      p.totalTime = (p.totalTime || 0) + (nowSec - p.startedAt);
    }
    p.startedAt = null;
    p.onPitch   = false;
    p.subLog    = [...(p.subLog || []), { type: 'off', matchMinute: matchMinute() }];
  }
  writeLive();
  renderSubPanel();
  renderPlayerGrid();
};

function renderSubLog(p) {
  if (!p.subLog || p.subLog.length === 0) {
    return `<li><span class="sub-empty">No substitutions yet</span></li>`;
  }
  return p.subLog.map(entry => {
    const totalSec = Math.round(entry.matchMinute || 0);
    const mm = Math.floor(totalSec / 60).toString().padStart(2,'0');
    const ss = (totalSec % 60).toString().padStart(2,'0');
    return `
      <li>
        <span class="${entry.type === 'on' ? 'sub-on' : 'sub-off'}">
          ${entry.type === 'on' ? '▶ ON' : '◼ OFF'}
        </span>
        ${mm}:${ss}
      </li>
    `;
  }).join('');
}

// ── SCREEN NAVIGATION ──────────────────────────────────────────────────────
window.switchScreen = function(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'season') renderSeasonScreen();
};

// ── MATCH MODAL ────────────────────────────────────────────────────────────
window.openNewMatchModal = function() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('modal-date').value = today;
  document.getElementById('modal-opponent').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-opponent').focus(), 100);
};

window.closeModal = function() {
  document.getElementById('modal-overlay').classList.remove('open');
};

window.createNewMatch = function() {
  const opp  = document.getElementById('modal-opponent').value.trim() || 'Unknown';
  const date = document.getElementById('modal-date').value || new Date().toISOString().slice(0,10);
  const matchId = 'match_' + Date.now();

  state.live = {
    matchId,
    opponent: opp,
    date,
    phase: 'stopped',
    elapsed: 0,
    resumedAt: null,
    scoreHome: 0,
    scoreAway: 0,
    players: makePlayers()
  };

  writeLive();
  closeModal();
  showToast('Match created!');
};

// ── CLOCK CONTROLS ─────────────────────────────────────────────────────────
window.kickOff = function() {
  if (!state.live.matchId) return;
  if (state.live.phase === 'running') return;
  state.live.resumedAt = Date.now() / 1000;
  state.live.phase = 'running';

  // Start all on-pitch players
  const now = Date.now() / 1000;
  state.live.players.forEach(p => {
    if (p.onPitch && !p.startedAt) p.startedAt = now;
  });

  writeLive();
  setupLocalTick();
  renderControls();
};

window.pauseMatch = function() {
  if (state.live.phase !== 'running') return;
  const nowSec = Date.now() / 1000;

  // Freeze player times
  state.live.players.forEach(p => {
    if (p.onPitch && p.startedAt) {
      p.totalTime = (p.totalTime || 0) + (nowSec - p.startedAt);
      p.startedAt = null;
    }
  });

  state.live.elapsed  = currentElapsed();
  state.live.resumedAt = null;
  state.live.phase    = 'stopped';

  writeLive();
  setupLocalTick();
  renderAll();
};

window.doHalftime = function() {
  if (!state.live.matchId) return;
  const nowSec = Date.now() / 1000;

  if (state.live.phase === 'halftime') {
    // Resume 2nd half
    state.live.phase = 'running';
    state.live.resumedAt = nowSec;
    state.live.players.forEach(p => {
      if (p.onPitch) p.startedAt = nowSec;
    });
    writeLive();
    setupLocalTick();
    renderAll();
    showToast('2nd half started!');
    return;
  }

  // Pause for halftime
  if (state.live.phase === 'running') {
    state.live.players.forEach(p => {
      if (p.onPitch && p.startedAt) {
        p.totalTime = (p.totalTime || 0) + (nowSec - p.startedAt);
        p.startedAt = null;
      }
    });
  }

  const halfSecs = ((state.matchDuration || 50) / 2) * 60;
  state.live.elapsed   = halfSecs; // lock at halftime
  state.live.resumedAt = null;
  state.live.phase     = 'halftime';

  writeLive();
  setupLocalTick();
  renderAll();
  showToast('Halftime!');
};

window.resetMatch = function() {
  if (!confirm('Reset the current match? All progress will be lost.')) return;
  state.live = makeLiveDefaults();
  writeLive();
  setupLocalTick();
  renderAll();
  showToast('Match reset.');
};

window.endMatch = function() {
  if (!state.live.matchId) return;
  if (!confirm('Save and end this match?')) return;

  // Final freeze of player times
  const nowSec = Date.now() / 1000;
  if (state.live.phase === 'running') {
    state.live.players.forEach(p => {
      if (p.onPitch && p.startedAt) {
        p.totalTime = (p.totalTime || 0) + (nowSec - p.startedAt);
        p.startedAt = null;
      }
    });
  }
  state.live.phase = 'done';

  // Save snapshot
  const matchId  = state.live.matchId;
  const snapshot = {
    matchId,
    opponent:  state.live.opponent,
    date:      state.live.date,
    scoreHome: state.live.scoreHome,
    scoreAway: state.live.scoreAway,
    players:   state.live.players.map(p => ({
      id: p.id, name: p.name,
      totalTime: p.totalTime || 0,
      goals: p.goals || 0,
      subLog: p.subLog || []
    }))
  };

  set(ref(db, `soccer/matches/${matchId}`), snapshot);
  remove(ref(db, 'soccer/live'));
  state.live = makeLiveDefaults();

  setupLocalTick();
  renderAll();
  showToast('Match saved!');
};

// ── SCORE ──────────────────────────────────────────────────────────────────
window.adjustScore = function(side, delta) {
  if (side === 'home') {
    state.live.scoreHome = Math.max(0, (state.live.scoreHome || 0) + delta);
  } else {
    state.live.scoreAway = Math.max(0, (state.live.scoreAway || 0) + delta);
  }
  writeLive();
  renderMatchHeader();
};

// ── PLAYER ACTIONS ─────────────────────────────────────────────────────────
window.togglePlayer = function(i) {
  if (!state.live.matchId) { showToast('Start a match first!'); return; }
  const p = state.live.players[i];
  const nowSec = Date.now() / 1000;
  const minute = matchMinute();

  if (p.onPitch) {
    // Take off
    if (p.startedAt && state.live.phase === 'running') {
      p.totalTime = (p.totalTime || 0) + (nowSec - p.startedAt);
    }
    p.startedAt = null;
    p.onPitch   = false;
    p.subLog    = [...(p.subLog || []), { type: 'off', matchMinute: minute }];
  } else {
    // Put on
    p.onPitch   = true;
    p.startedAt = state.live.phase === 'running' ? nowSec : null;
    p.subLog    = [...(p.subLog || []), { type: 'on', matchMinute: minute }];
  }

  writeLive();
  renderPlayerGrid();
};

window.cyclePosition = function(e, i) {
  e.stopPropagation();
  const p   = state.live.players[i];
  const idx = POSITIONS.indexOf(p.position);
  p.position = POSITIONS[(idx + 1) % POSITIONS.length];
  writeLive();
  // Just update the badge in place
  const badge = document.querySelector(`#card-${i} .pos-badge`);
  if (badge) badge.textContent = p.position || '—';
};

window.addGoal = function(e, i) {
  e.stopPropagation();
  state.live.players[i].goals = (state.live.players[i].goals || 0) + 1;
  state.live.scoreHome = (state.live.scoreHome || 0) + 1;
  writeLive();
  renderMatchHeader();
  // Update goal count in card
  const goalEl = document.querySelector(`#card-${i} .goals-count`);
  if (goalEl) goalEl.textContent = state.live.players[i].goals;
  document.getElementById('score-home').textContent = state.live.scoreHome;
};

window.flipCard = function(e, i) {
  e.stopPropagation();
  const wrapper = document.getElementById(`card-${i}`);
  if (wrapper) wrapper.classList.toggle('flipped');
};

window.editName = function(e, i) {
  e.stopPropagation();
  const nameEl = document.getElementById(`name-display-${i}`);
  if (!nameEl) return;
  const current = state.live.players[i].name;
  const inp = document.createElement('input');
  inp.className = 'player-name-input';
  inp.value = current;
  nameEl.replaceWith(inp);
  inp.focus();
  inp.select();

  const save = () => {
    const newName = inp.value.trim() || current;
    state.live.players[i].name = newName;
    writeLive();
    inp.replaceWith(nameEl);
    nameEl.textContent = newName;
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') inp.blur(); });
};

// ── SETTINGS ──────────────────────────────────────────────────────────────
window.saveTeamName = function() {
  const val = document.getElementById('team-name-input').value.trim();
  if (!val) return;
  state.teamName = val;
  set(ref(db, 'soccer/team-name'), val);
  renderMatchHeader();
  showToast('Team name saved!');
};

window.saveMatchDuration = function() {
  const val = parseInt(document.getElementById('match-duration-input').value) || 50;
  state.matchDuration = val;
  showToast(`Duration set to ${val} min`);
};

window.clearLiveMatch = function() {
  if (!confirm('Clear the live match? All unsaved data will be lost.')) return;
  remove(ref(db, 'soccer/live'));
  state.live = makeLiveDefaults();
  setupLocalTick();
  renderAll();
  showToast('Live match cleared.');
};

// ── SEASON SCREEN ──────────────────────────────────────────────────────────
let seasonTab = 'history';

window.switchSeasonTab = function(tab) {
  seasonTab = tab;
  document.querySelectorAll('.season-tab').forEach((b,i) => {
    b.classList.toggle('active', (i === 0 && tab === 'history') || (i === 1 && tab === 'stats'));
  });
  document.getElementById('tab-history').style.display = tab === 'history' ? '' : 'none';
  document.getElementById('tab-stats').style.display   = tab === 'stats'   ? '' : 'none';
  if (tab === 'stats') renderStatsTable();
};

function renderSeasonScreen() {
  renderMatchHistory();
  if (seasonTab === 'stats') renderStatsTable();
}

function renderMatchHistory() {
  const listEl = document.getElementById('match-list');
  const matches = Object.values(state.matches).sort((a,b) => (b.date||'').localeCompare(a.date||''));
  if (matches.length === 0) {
    listEl.innerHTML = '<p style="color:#4a7a4a;font-size:12px;">No saved matches yet.</p>';
    return;
  }
  listEl.innerHTML = matches.map(m => {
    const totalMins = m.players
      ? Math.round(m.players.reduce((s,p) => s + (p.totalTime||0), 0) / 60)
      : 0;
    const playerRows = m.players ? m.players.map(p => {
      const mins = Math.round((p.totalTime||0)/60);
      const subStr = (p.subLog||[]).map(e => {
        const sec = Math.round(e.matchMinute||0);
        const mm  = Math.floor(sec/60).toString().padStart(2,'0');
        const ss  = (sec%60).toString().padStart(2,'0');
        return `<span class="${e.type==='on'?'sub-on':'sub-off'}">${e.type==='on'?'▶':'◼'} ${mm}:${ss}</span>`;
      }).join(' ');
      return `<tr>
        <td>${p.name}</td>
        <td>${mins} min</td>
        <td>${p.goals||0}</td>
        <td class="sub-log-inline">${subStr||'—'}</td>
      </tr>`;
    }).join('') : '';

    return `
      <div class="match-row" onclick="toggleMatchDetail('${m.matchId}')">
        <div class="match-row-header">
          <div>
            <div class="match-row-title">vs ${m.opponent||'Unknown'}</div>
            <div class="match-row-meta">${m.date||''} &nbsp;·&nbsp; ${totalMins} min tracked</div>
          </div>
          <div class="match-row-score">${m.scoreHome??0}–${m.scoreAway??0}</div>
        </div>
        <div class="match-detail" id="detail-${m.matchId}">
          <table>
            <thead><tr><th>Player</th><th>Minutes</th><th>Goals</th><th>Sub Log</th></tr></thead>
            <tbody>${playerRows}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');
}

window.toggleMatchDetail = function(matchId) {
  const el = document.getElementById(`detail-${matchId}`);
  if (el) el.classList.toggle('open');
};

function renderStatsTable() {
  const matches = Object.values(state.matches);
  // Aggregate per player
  const stats = {};
  ROSTER_NAMES.forEach(name => { stats[name] = { name, matches: 0, totalTime: 0, goals: 0 }; });

  matches.forEach(m => {
    if (!m.players) return;
    m.players.forEach(p => {
      const key = p.name;
      if (!stats[key]) stats[key] = { name: key, matches: 0, totalTime: 0, goals: 0 };
      if ((p.totalTime||0) > 0) stats[key].matches++;
      stats[key].totalTime += (p.totalTime||0);
      stats[key].goals     += (p.goals||0);
    });
  });

  const sorted = Object.values(stats).sort((a,b) => b.totalTime - a.totalTime);
  const tbody = document.getElementById('stats-tbody');
  tbody.innerHTML = sorted.map(s => `
    <tr>
      <td>${s.name}</td>
      <td>${s.matches}</td>
      <td class="stat-minutes">${Math.round(s.totalTime/60)}</td>
      <td>${s.goals}</td>
    </tr>
  `).join('');
}

window.exportCSV = function() {
  const matches = Object.values(state.matches);
  const stats   = {};
  ROSTER_NAMES.forEach(name => { stats[name] = { name, matches: 0, totalTime: 0, goals: 0 }; });
  matches.forEach(m => {
    if (!m.players) return;
    m.players.forEach(p => {
      const key = p.name;
      if (!stats[key]) stats[key] = { name: key, matches: 0, totalTime: 0, goals: 0 };
      if ((p.totalTime||0) > 0) stats[key].matches++;
      stats[key].totalTime += (p.totalTime||0);
      stats[key].goals     += (p.goals||0);
    });
  });

  const rows = [['Player','Matches','Minutes','Goals']];
  Object.values(stats)
    .sort((a,b) => b.totalTime - a.totalTime)
    .forEach(s => rows.push([s.name, s.matches, Math.round(s.totalTime/60), s.goals]));

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `soccer-season-stats-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported!');
};

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── INIT ───────────────────────────────────────────────────────────────────
// Initialise date default for modal
document.getElementById('modal-date').value = new Date().toISOString().slice(0,10);

// Load persisted team name
get(ref(db, 'soccer/team-name')).then(snap => {
  if (snap.exists()) {
    state.teamName = snap.val();
    document.getElementById('team-name-input').value = snap.val();
    renderMatchHeader();
  }
});

// Initial render
renderAll();

// Expose globals needed by inline handlers
window.adjustScore   = adjustScore;
window.kickOff       = kickOff;
window.pauseMatch    = pauseMatch;
window.doHalftime    = doHalftime;
window.resetMatch    = resetMatch;
window.endMatch      = endMatch;
window.togglePlayer  = togglePlayer;
window.cyclePosition = cyclePosition;
window.addGoal       = addGoal;
window.flipCard      = flipCard;
window.editName      = editName;
window.saveTeamName  = saveTeamName;
window.saveMatchDuration = saveMatchDuration;
window.clearLiveMatch    = clearLiveMatch;
window.openNewMatchModal = openNewMatchModal;
window.closeModal        = closeModal;
window.createNewMatch    = createNewMatch;
window.switchScreen      = switchScreen;
window.switchSeasonTab   = switchSeasonTab;
window.toggleMatchDetail = toggleMatchDetail;
window.exportCSV         = exportCSV;
window.toggleUnavailable = toggleUnavailable;
</script>
