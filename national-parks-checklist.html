<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>National Park Sites Checklist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 24px 16px;
        }

        header {
            max-width: 860px;
            margin: 0 auto 24px;
            text-align: center;
        }

        h1 { font-size: 1.9rem; color: #93c5fd; margin-bottom: 4px; }
        #tagline { color: #64748b; font-size: 0.9rem; margin-bottom: 18px; }

        #stats {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat { text-align: center; }
        .stat .val { font-size: 1.6rem; font-weight: bold; color: #fb923c; }
        .stat .lbl { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

        #progress-bar-track {
            height: 6px;
            background: #1e293b;
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #progress-bar-fill {
            height: 100%;
            background: #fb923c;
            border-radius: 99px;
            width: 0%;
            transition: width 0.3s;
        }

        #controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
        }

        #search {
            padding: 9px 14px;
            font-size: 0.95rem;
            border: 2px solid #334155;
            border-radius: 10px;
            background: #1e293b;
            color: #e2e8f0;
            width: 240px;
            outline: none;
            transition: border-color 0.2s;
        }
        #search:focus { border-color: #93c5fd; }

        .ctrl-btn {
            padding: 9px 16px;
            font-size: 0.85rem;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .ctrl-btn:hover { background: #334155; color: #e2e8f0; }
        .ctrl-btn.active { background: #fb923c; color: white; border-color: #fb923c; }

        #legend {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 24px;
        }
        .legend-np {
            display: inline-block;
            width: 14px; height: 14px;
            background: rgba(251,146,60,0.2);
            border: 1px solid #fb923c;
            border-radius: 3px;
        }

        #content { max-width: 860px; margin: 0 auto; }

        .state-section {
            margin-bottom: 10px;
            border: 1px solid #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }

        .state-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #1e293b;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .state-header:hover { background: #263349; }

        .state-name {
            font-weight: 600;
            font-size: 1rem;
            color: #cbd5e1;
        }

        .state-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .state-progress {
            font-size: 0.8rem;
            color: #64748b;
        }

        .state-progress .done { color: #4ade80; }

        .chevron {
            color: #475569;
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        .state-section.open .chevron { transform: rotate(90deg); }

        .site-list {
            display: none;
            padding: 8px 0;
        }
        .state-section.open .site-list { display: block; }

        .site-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 16px;
            transition: background 0.1s;
        }
        .site-item:hover { background: #131f35; }
        .site-item.hidden { display: none; }

        .site-item.np {
            background: rgba(251, 146, 60, 0.08);
        }
        .site-item.np:hover { background: rgba(251, 146, 60, 0.14); }

        .site-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #fb923c;
            flex-shrink: 0;
        }

        .site-name {
            font-size: 0.9rem;
            color: #cbd5e1;
            cursor: pointer;
            flex: 1;
        }

        .site-item.np .site-name {
            font-weight: 700;
            color: #fed7aa;
        }

        .site-item input:checked + .site-name {
            text-decoration: line-through;
            color: #475569;
        }

        .np-badge {
            font-size: 0.65rem;
            background: rgba(251,146,60,0.2);
            color: #fb923c;
            border: 1px solid rgba(251,146,60,0.4);
            border-radius: 4px;
            padding: 1px 5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .no-results {
            text-align: center;
            color: #475569;
            padding: 40px;
            font-size: 0.95rem;
        }
    </style>
</head>

// --- State ---
const STORAGE_KEY = 'nps-checklist-v1';
let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let npOnlyMode = false;

// --- Build IDs ---
function siteId(state, name) {
    return state + '::' + name;
}

// --- Render ---
function render() {
    const content = document.getElementById('content');
    content.innerHTML = '';

    let totalSites = 0, totalNP = 0;

    for (const [state, sites] of Object.entries(parkData)) {
        totalSites += sites.length;
        totalNP += sites.filter(s => s.np).length;

        const section = document.createElement('div');
        section.className = 'state-section';
        section.dataset.state = state;

        const header = document.createElement('div');
        header.className = 'state-header';
        header.innerHTML = `
            <span class="state-name">${state}</span>
            <div class="state-meta">
                <span class="state-progress" data-state="${state}"></span>
                <span class="chevron">▶</span>
            </div>
        `;
        header.addEventListener('click', () => {
            section.classList.toggle('open');
        });

        const list = document.createElement('div');
        list.className = 'site-list';

        for (const site of sites) {
            const id = siteId(state, site.name);
            const item = document.createElement('div');
            item.className = 'site-item' + (site.np ? ' np' : '');
            item.dataset.name = site.name.toLowerCase();
            item.dataset.np = site.np ? 'true' : 'false';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = id;
            cb.checked = !!checked[id];
            cb.addEventListener('change', () => {
                checked[id] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
                updateStats();
                updateStateProgress(state);
            });

            const label = document.createElement('label');
            label.className = 'site-name';
            label.htmlFor = id;
            label.textContent = site.name;

            item.appendChild(cb);
            item.appendChild(label);

            if (site.np) {
                const badge = document.createElement('span');
                badge.className = 'np-badge';
                badge.textContent = 'National Park';
                item.appendChild(badge);
            }

            list.appendChild(item);
        }

        section.appendChild(header);
        section.appendChild(list);
        content.appendChild(section);
    }

    document.getElementById('stat-total').textContent = totalSites;
    updateStats();
    applyFilters();
}

function updateStats() {
    let checked_count = 0, np_checked = 0;
    let total = 0, total_np = 0;

    for (const [state, sites] of Object.entries(parkData)) {
        for (const site of sites) {
            total++;
            if (site.np) total_np++;
            const id = siteId(state, site.name);
            if (checked[id]) {
                checked_count++;
                if (site.np) np_checked++;
            }
        }
    }

    document.getElementById('stat-checked').textContent = checked_count;
    document.getElementById('stat-np-checked').textContent = np_checked;
    document.getElementById('stat-total').textContent = total;
    const pct = total > 0 ? (checked_count / total) * 100 : 0;
    document.getElementById('progress-bar-fill').style.width = pct + '%';

    // Update state progress labels
    for (const state of Object.keys(parkData)) {
        updateStateProgress(state);
    }
}

function updateStateProgress(state) {
    const el = document.querySelector(`.state-progress[data-state="${state}"]`);
    if (!el) return;
    const sites = parkData[state];
    const done = sites.filter(s => checked[siteId(state, s.name)]).length;
    el.innerHTML = done > 0
        ? `<span class="done">${done}</span>/${sites.length}`
        : `${sites.length} sites`;
}

function applyFilters() {
    const query = document.getElementById('search').value.trim().toLowerCase();
    let anyVisible = false;

    document.querySelectorAll('.state-section').forEach(section => {
        const state = section.dataset.state;
        let stateHasVisible = false;

        section.querySelectorAll('.site-item').forEach(item => {
            const name = item.dataset.name;
            const isNP = item.dataset.np === 'true';
            const matchesSearch = !query || name.includes(query) || state.toLowerCase().includes(query);
            const matchesNPFilter = !npOnlyMode || isNP;

            if (matchesSearch && matchesNPFilter) {
                item.classList.remove('hidden');
                stateHasVisible = true;
            } else {
                item.classList.add('hidden');
            }
        });

        section.style.display = stateHasVisible ? '' : 'none';
        if (stateHasVisible) anyVisible = true;

        // Auto-expand when searching
        if (query && stateHasVisible) {
            section.classList.add('open');
        } else if (!query && !npOnlyMode) {
            // don't force close
        }
    });

    let noResults = document.getElementById('no-results');
    if (!anyVisible) {
        if (!noResults) {
            noResults = document.createElement('p');
            noResults.id = 'no-results';
            noResults.className = 'no-results';
            noResults.textContent = 'No sites match your search.';
            document.getElementById('content').appendChild(noResults);
        }
    } else {
        if (noResults) noResults.remove();
    }
}

// --- Controls ---
document.getElementById('search').addEventListener('input', applyFilters);

document.getElementById('np-only-btn').addEventListener('click', function() {
    npOnlyMode = !npOnlyMode;
    this.classList.toggle('active', npOnlyMode);
    applyFilters();
    if (npOnlyMode) {
        document.querySelectorAll('.state-section').forEach(s => {
            if (s.style.display !== 'none') s.classList.add('open');
        });
    }
});

document.getElementById('expand-all-btn').addEventListener('click', () => {
    document.querySelectorAll('.state-section').forEach(s => {
        if (s.style.display !== 'none') s.classList.add('open');
    });
});

document.getElementById('collapse-all-btn').addEventListener('click', () => {
    document.querySelectorAll('.state-section').forEach(s => s.classList.remove('open'));
});

document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('Reset all checkmarks? This cannot be undone.')) return;
    checked = {};
    localStorage.removeItem(STORAGE_KEY);
    document.querySelectorAll('.site-item input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateStats();
});

render();
</script>
