<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alaska Fly-In Packer · Razor's Edge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surf:    #161616;
      --surf2:   #1e1e1e;
      --border:  #2a2a2a;
      --accent:  #6abf8a;
      --text:    #e8e4dc;
      --muted:   #888;
      --ok:      #4ade80;
      --warn:    #fbbf24;
      --danger:  #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── Hero ─────────────────────────────────────────────────── */
    .hero {
      padding: 3rem 2rem 2rem;
      text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(106,191,138,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .hero h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 60%, var(--text) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .hero-sub {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .back-link {
      position: absolute;
      top: 1.25rem;
      left: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Countdown ────────────────────────────────────────────── */
    .countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      margin-top: 1.5rem;
    }
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 60px;
    }
    .cd-num {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: 600;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .cd-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .cd-sep {
      font-size: 2rem;
      color: var(--border);
      line-height: 1;
      padding-bottom: 0.6rem;
      align-self: center;
    }
    .cd-until {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* ── Weight meter ─────────────────────────────────────────── */
    .meter-wrap {
      max-width: 900px;
      margin: 0 auto 2rem;
      padding: 0 1.5rem;
      position: relative;
    }
    .meter-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }
    .meter-label {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .meter-numbers {
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
    }
    .meter-track {
      height: 14px;
      background: var(--surf2);
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      gap: 2px;               /* surface gap between traveler segments */
      position: relative;
    }
    .meter-track.over { border-color: var(--danger); }
    /* Everything past the limit line is off the scale — striped red overlay */
    .over-zone {
      position: absolute;
      top: 0; bottom: 0; right: 0;
      background: repeating-linear-gradient(135deg,
        rgba(248,113,113,0.55) 0 4px, rgba(13,13,13,0.55) 4px 8px);
      pointer-events: none;
    }
    .limit-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: var(--danger);
      pointer-events: none;
    }

    /* Over-limit banner */
    @keyframes ob-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    .over-banner {
      display: none;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.7rem;
      padding: 0.75rem 1rem;
      background: rgba(248,113,113,0.09);
      border: 1px solid rgba(248,113,113,0.5);
      border-radius: 8px;
    }
    .over-banner.show { display: flex; }
    .ob-icon { font-size: 1.4rem; line-height: 1; animation: ob-pulse 1.5s ease-in-out infinite; }
    .ob-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--danger);
      letter-spacing: 0.04em;
    }
    .ob-sub { font-size: 0.76rem; color: var(--text); margin-top: 0.15rem; }
    .meter-seg {
      height: 100%;
      transition: width 0.4s ease;
      min-width: 0;
      cursor: default;
    }
    .meter-seg:first-child { border-radius: 7px 0 0 7px; }
    .meter-seg:hover { filter: brightness(1.2); }
    .meter-status {
      margin-top: 0.5rem;
      text-align: right;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .meter-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 1.1rem;
      margin-top: 0.6rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
    }
    .legend-item:hover .legend-name { color: var(--accent); }
    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-name { transition: color 0.15s; }
    .legend-lbs {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .meter-tip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.72rem;
      color: var(--text);
      transform: translate(-50%, -130%);
      white-space: nowrap;
      transition: opacity 0.12s;
      z-index: 5;
      font-variant-numeric: tabular-nums;
    }

    /* ── Person grid ──────────────────────────────────────────── */
    .people-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    /* ── Person card ──────────────────────────────────────────── */
    .person-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
      gap: 0.5rem;
    }

    .person-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .person-name-input {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      width: 100%;
      outline: none;
      min-width: 0;
    }
    .person-name-input::placeholder { color: var(--muted); font-weight: 400; }
    .person-name-input:focus { color: var(--accent); }

    .person-total-badge {
      font-size: 0.8rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      background: var(--surf2);
      border: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Body vs gear split bar */
    .split-bar {
      display: flex;
      gap: 2px;               /* surface gap between the two segments */
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin: 0.45rem 1rem 0;
      background: var(--surf2);
    }
    .split-seg { height: 100%; transition: width 0.3s ease; }

    /* ── Body weight row ──────────────────────────────────────── */
    .bw-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surf2);
    }
    .bw-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .bw-input-wrap {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .bw-input {
      width: 72px;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      font-size: 0.9rem;
      color: var(--text);
      text-align: right;
      outline: none;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s;
    }
    .bw-input:focus { border-color: var(--accent); }
    .bw-unit { font-size: 0.72rem; color: var(--muted); }

    /* ── Gear section ─────────────────────────────────────────── */
    .gear-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem 0.35rem;
    }
    .gear-header-label {
      font-size: 0.63rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .gear-subtotal {
      font-size: 0.72rem;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .gear-list { padding: 0 0.5rem 0.25rem; }

    .gear-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .gear-row:hover { background: var(--surf2); }
    .gear-row.excluded { opacity: 0.38; }

    .gear-check {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .gear-name-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
      min-width: 0;
      padding: 0;
    }
    .gear-name-input::placeholder { color: var(--muted); }
    .gear-name-input:focus { color: var(--accent); }

    .gear-weight-input {
      width: 54px;
      background: var(--surf2);
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 0.15rem 0.35rem;
      font-size: 0.8rem;
      color: var(--text);
      text-align: right;
      outline: none;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s;
    }
    .gear-weight-input:focus { border-color: var(--accent); background: var(--surf); }

    .gear-lbs { font-size: 0.68rem; color: var(--muted); flex-shrink: 0; }

    .gear-del {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0 0.15rem;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .gear-del:hover { color: var(--danger); }

    /* ── Add gear row ─────────────────────────────────────────── */
    .add-gear-row {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem 1rem 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 0.25rem;
    }
    .add-name-input {
      flex: 1;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      min-width: 0;
      transition: border-color 0.15s;
    }
    .add-name-input:focus { border-color: var(--accent); }
    .add-name-input::placeholder { color: var(--muted); }

    .add-weight-input {
      width: 60px;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.4rem;
      font-size: 0.8rem;
      color: var(--text);
      text-align: right;
      outline: none;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s;
    }
    .add-weight-input:focus { border-color: var(--accent); }
    .add-weight-input::placeholder { color: var(--muted); font-size: 0.72rem; }

    .add-btn {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 6px;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .add-btn:hover { opacity: 0.85; }

    /* ── Card summary ─────────────────────────────────────────── */
    .card-summary {
      padding: 0.5rem 1rem 0.75rem;
      font-size: 0.7rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      margin-top: auto;
    }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.72rem;
      color: var(--border);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 620px) {
      .people-grid { grid-template-columns: 1fr; }
      .hero { padding: 3rem 1.25rem 1.5rem; }
      .meter-wrap { padding: 0 1.25rem; }
      .people-grid { padding: 0 1.25rem 2rem; }
    }
  </style>
</head>
<body>

<div class="hero">
  <a href="index.html" class="back-link">← Razor's Edge</a>
  <p class="hero-eyebrow">Bush Plane · 850 lb limit</p>
  <h1>Alaska Fly-In</h1>
  <p class="hero-sub">4 guys · backcountry · everything counts</p>
  <div class="countdown" id="countdown">
    <div class="cd-block"><span class="cd-num" id="cd-days">--</span><span class="cd-label">days</span></div>
    <div class="cd-sep">:</div>
    <div class="cd-block"><span class="cd-num" id="cd-hours">--</span><span class="cd-label">hrs</span></div>
    <div class="cd-sep">:</div>
    <div class="cd-block"><span class="cd-num" id="cd-mins">--</span><span class="cd-label">min</span></div>
    <div class="cd-sep">:</div>
    <div class="cd-block"><span class="cd-num" id="cd-secs">--</span><span class="cd-label">sec</span></div>
  </div>
  <p class="cd-until">until August 14, 2026 · wheels up 🛩️</p>
</div>

<!-- Weight meter -->
<div class="meter-wrap">
  <div class="meter-header">
    <span class="meter-label">Total Load</span>
    <span class="meter-numbers" id="meter-numbers">— / 850 lbs</span>
  </div>
  <div class="meter-track" id="meter-track"></div>
  <div class="over-banner" id="over-banner">
    <span class="ob-icon">⚠️</span>
    <div>
      <div class="ob-title" id="ob-title">OFF THE SCALE</div>
      <div class="ob-sub" id="ob-sub"></div>
    </div>
  </div>
  <div class="meter-status" id="meter-status"></div>
  <div class="meter-legend" id="meter-legend"></div>
  <div class="meter-tip" id="meter-tip"></div>
</div>

<!-- 4 person cards -->
<div class="people-grid" id="people-grid">
  <div class="person-card" id="card-slot1"><div style="padding:2rem;color:var(--muted);font-size:.85rem">Connecting…</div></div>
  <div class="person-card" id="card-slot2"><div style="padding:2rem;color:var(--muted);font-size:.85rem">Connecting…</div></div>
  <div class="person-card" id="card-slot3"><div style="padding:2rem;color:var(--muted);font-size:.85rem">Connecting…</div></div>
  <div class="person-card" id="card-slot4"><div style="padding:2rem;color:var(--muted);font-size:.85rem">Connecting…</div></div>
</div>

<footer>Razor's Edge · Alaska Fly-In Packer</footer>

<script type="module">
import { initializeApp }                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, remove, onValue, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── Firebase ────────────────────────────────────────────────────

const firebaseConfig = {
  apiKey:            "AIzaSyCp2PBbqdj_g6NPR9iYQb7Z6tgXbqLtHIA",
  authDomain:        "lunch-f7021.firebaseapp.com",
  databaseURL:       "https://lunch-f7021-default-rtdb.firebaseio.com",
  projectId:         "lunch-f7021",
  storageBucket:     "lunch-f7021.firebasestorage.app",
  messagingSenderId: "1053755216064",
  appId:             "1:1053755216064:web:14b749200f825a4e9bdd25",
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Constants ───────────────────────────────────────────────────

const LIMIT = 850;
const SLOTS = ['slot1','slot2','slot3','slot4'];
const SLOT_LABELS = ['Traveler 1','Traveler 2','Traveler 3','Traveler 4'];

// Per-traveler identity colors (fixed order; contrast-checked against the dark surface).
// `main` marks the traveler everywhere; `tint` is a lighter step of the same hue for
// the gear half of the body/gear split bar.
const SLOT_COLORS = {
  slot1: { main:'#3987e5', tint:'#86b6ef' },  // blue
  slot2: { main:'#199e70', tint:'#5fcda2' },  // aqua
  slot3: { main:'#c98500', tint:'#edb84d' },  // yellow
  slot4: { main:'#008300', tint:'#4fae4f' },  // green
};

const DEFAULT_GEAR = [
  { id:'g01', name:'Clothes',            weight:3.0,  included:true },
  { id:'g02', name:'Food',               weight:6.0,  included:true },
  { id:'g03', name:'Tent',               weight:4.5,  included:true },
  { id:'g04', name:'Sleeping Bag',       weight:3.0,  included:true },
  { id:'g05', name:'Sleeping Mat',       weight:1.5,  included:true },
  { id:'g06', name:'Pillow',             weight:0.5,  included:true },
  { id:'g07', name:'Extra Layer',        weight:0.5,  included:true },
  { id:'g08', name:'Stove',              weight:0.5,  included:true },
  { id:'g09', name:'Fuel',              weight:1.0,  included:true },
  { id:'g10', name:'Pots',              weight:0.5,  included:true },
  { id:'g11', name:'Cup',               weight:0.2,  included:true },
  { id:'g12', name:'Bowl',              weight:0.2,  included:true },
  { id:'g13', name:'Toiletries',        weight:0.5,  included:true },
  { id:'g14', name:'Backup Shoes',      weight:1.5,  included:true },
  { id:'g15', name:'Mosquito Head Net', weight:0.1,  included:true },
  { id:'g16', name:'Headlamp',          weight:0.2,  included:true },
];

function defaultMember(label) {
  const gear = {};
  DEFAULT_GEAR.forEach(g => { gear[g.id] = { ...g }; });
  return { name: label, bodyWeight: 0, gear };
}

// ── State ───────────────────────────────────────────────────────

let members  = {};
let fbInited = false;

// ── Math ────────────────────────────────────────────────────────

function gearTotal(member) {
  if (!member || !member.gear) return 0;
  return Object.values(member.gear)
    .filter(g => g.included)
    .reduce((s, g) => s + (Number(g.weight) || 0), 0);
}

function personTotal(member) {
  if (!member) return 0;
  return (Number(member.bodyWeight) || 0) + gearTotal(member);
}

function grandTotal() {
  return SLOTS.reduce((s, id) => s + personTotal(members[id]), 0);
}

function fmt(n) { return (Math.round(n * 10) / 10).toFixed(1); }

// ── Render helpers ──────────────────────────────────────────────

function setIfNotFocused(id, value) {
  const el = document.getElementById(id);
  if (el && document.activeElement !== el) el.value = value;
}

// ── Render meter ────────────────────────────────────────────────

function renderMeter() {
  const total = grandTotal();
  const pct   = (total / LIMIT) * 100;
  const rem   = LIMIT - total;

  // Per-traveler segments. If over the limit, scale everything to fit the track
  // so proportions stay honest; the limit line + striped over-zone mark what's off the scale.
  const over  = total > LIMIT;
  const scale = over ? LIMIT / total : 1;
  const track = document.getElementById('meter-track');
  track.classList.toggle('over', over);
  let trackHtml = SLOTS.map(id => {
    const p = personTotal(members[id]);
    if (p <= 0) return '';
    const w = (p / LIMIT) * 100 * scale;
    return `<div class="meter-seg" id="mseg-${id}" style="width:${w}%;background:${SLOT_COLORS[id].main}"></div>`;
  }).join('');
  if (over) {
    const limitPct = (LIMIT / total) * 100;
    trackHtml += `<div class="over-zone" style="left:${limitPct}%"></div>` +
                 `<div class="limit-line" style="left:${limitPct}%"></div>`;
  }
  track.innerHTML = trackHtml;

  // Over-limit banner
  const banner = document.getElementById('over-banner');
  banner.classList.toggle('show', over);
  if (over) {
    document.getElementById('ob-title').textContent = `OFF THE SCALE — ${fmt(total - LIMIT)} LBS OVER`;
    document.getElementById('ob-sub').textContent =
      `The plane lifts 850 lbs. You're asking it to lift ${fmt(total)}. Cut ${fmt(total - LIMIT)} lbs of gear before wheels up.`;
  }

  // Hover tooltip per segment
  const tip = document.getElementById('meter-tip');
  const wrap = tip.parentElement;
  SLOTS.forEach(id => {
    const seg = document.getElementById(`mseg-${id}`);
    if (!seg) return;
    seg.addEventListener('mouseenter', () => {
      const p = personTotal(members[id]);
      const name = (members[id]?.name || '').trim() || SLOT_LABELS[SLOTS.indexOf(id)];
      const share = total > 0 ? Math.round((p / total) * 100) : 0;
      tip.textContent = `${name} — ${fmt(p)} lbs (${share}% of load)`;
      const segR = seg.getBoundingClientRect(), wrapR = wrap.getBoundingClientRect();
      tip.style.left = (segR.left - wrapR.left + segR.width / 2) + 'px';
      tip.style.top  = (segR.top - wrapR.top) + 'px';
      tip.style.opacity = '1';
    });
    seg.addEventListener('mouseleave', () => { tip.style.opacity = '0'; });
  });

  // Legend: identity dot + name + weight, click scrolls to the card
  document.getElementById('meter-legend').innerHTML = SLOTS.map((id, i) => {
    const name = esc((members[id]?.name || '').trim() || SLOT_LABELS[i]);
    return `<button class="legend-item" onclick="document.getElementById('card-${id}').scrollIntoView({behavior:'smooth',block:'center'})">
      <span class="legend-dot" style="background:${SLOT_COLORS[id].main}"></span>
      <span class="legend-name">${name}</span>
      <span class="legend-lbs">${fmt(personTotal(members[id]))} lbs</span>
    </button>`;
  }).join('');

  let statusText, statusColor;
  if (pct >= 100) {
    statusColor = 'var(--danger)';
    statusText = `⚠ ${fmt(Math.abs(rem))} lbs OVER the limit`;
  } else if (pct >= 95) {
    statusColor = '#f97316';
    statusText = `⚠ ${fmt(rem)} lbs remaining — cutting it close`;
  } else if (pct >= 80) {
    statusColor = 'var(--warn)';
    statusText = `${fmt(rem)} lbs remaining`;
  } else {
    statusColor = 'var(--ok)';
    statusText = `${fmt(rem)} lbs remaining`;
  }

  const nums = document.getElementById('meter-numbers');
  nums.textContent = `${over ? '⚠ ' : ''}${fmt(total)} / ${LIMIT} lbs`;
  nums.style.color = over ? 'var(--danger)' : 'var(--text)';
  nums.style.fontWeight = over ? '700' : '400';
  const status = document.getElementById('meter-status');
  status.textContent = statusText;
  status.style.color = statusColor;
  status.style.display = over ? 'none' : '';  // banner carries the over-limit message
}

// ── Render one card ─────────────────────────────────────────────

function renderCard(slotId, member) {
  const card = document.getElementById(`card-${slotId}`);
  if (!card) return;

  const pTotal   = personTotal(member);
  const gTotal   = gearTotal(member);
  const bw       = Number(member.bodyWeight) || 0;

  // Badge text stays in the text color; heavy load flagged with an icon, not color-alone.
  const badge = document.getElementById(`ptotal-${slotId}`);
  if (badge) {
    badge.textContent = `${pTotal > 250 ? '⚠ ' : ''}${fmt(pTotal)} lbs`;
    badge.style.borderColor = pTotal > 250 ? 'var(--warn)' : 'var(--border)';
  }

  // Body vs gear split bar (two steps of this traveler's hue)
  const split = document.getElementById(`split-${slotId}`);
  if (split) {
    const c = SLOT_COLORS[slotId];
    if (pTotal > 0) {
      split.innerHTML =
        `<div class="split-seg" style="width:${(bw / pTotal) * 100}%;background:${c.main}" title="Body ${fmt(bw)} lbs"></div>` +
        `<div class="split-seg" style="width:${(gTotal / pTotal) * 100}%;background:${c.tint}" title="Gear ${fmt(gTotal)} lbs"></div>`;
    } else {
      split.innerHTML = '';
    }
  }

  const gSub = document.getElementById(`gsub-${slotId}`);
  if (gSub) gSub.textContent = `${fmt(gTotal)} lbs`;

  const summary = document.getElementById(`summary-${slotId}`);
  if (summary) {
    summary.textContent = `Body ${fmt(bw)} lbs · Gear ${fmt(gTotal)} lbs · Total ${fmt(pTotal)} lbs`;
  }

  // Update inputs without stealing focus
  setIfNotFocused(`name-${slotId}`, member.name || '');
  setIfNotFocused(`bw-${slotId}`, bw || '');

  // Rebuild gear list (preserving focus)
  renderGearList(slotId, member.gear || {});
}

function renderGearList(slotId, gear) {
  const container = document.getElementById(`gear-list-${slotId}`);
  if (!container) return;

  const focusedId    = document.activeElement ? document.activeElement.id : null;
  const focusedVal   = document.activeElement ? document.activeElement.value : null;
  const focusedStart = document.activeElement && document.activeElement.selectionStart !== undefined
                       ? document.activeElement.selectionStart : null;

  const sorted = Object.values(gear).sort((a, b) => {
    const di = DEFAULT_GEAR.findIndex(d => d.id === a.id) - DEFAULT_GEAR.findIndex(d => d.id === b.id);
    if (di !== 0) return di;
    return (a.id > b.id ? 1 : -1);
  });

  let html = '';
  for (const item of sorted) {
    const checked = item.included ? 'checked' : '';
    const rowCls  = item.included ? '' : 'excluded';
    html += `
      <div class="gear-row ${rowCls}" id="grow-${slotId}-${item.id}">
        <input type="checkbox" class="gear-check" ${checked}
               id="gcheck-${slotId}-${item.id}"
               onchange="window._toggleGear('${slotId}','${item.id}',this.checked)">
        <input type="text" class="gear-name-input" value="${esc(item.name)}"
               id="gname-${slotId}-${item.id}"
               onblur="window._saveGearName('${slotId}','${item.id}',this.value)"
               onkeydown="if(event.key==='Enter')this.blur()">
        <input type="number" class="gear-weight-input" value="${Number(item.weight).toFixed(1)}"
               id="gweight-${slotId}-${item.id}" min="0" step="0.1"
               onblur="window._saveGearWeight('${slotId}','${item.id}',this.value)"
               onkeydown="if(event.key==='Enter')this.blur()">
        <span class="gear-lbs">lbs</span>
        <button class="gear-del" onclick="window._deleteGear('${slotId}','${item.id}')"
                title="Remove">✕</button>
      </div>`;
  }
  container.innerHTML = html;

  // Restore focus
  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el) {
      el.focus();
      if (focusedStart !== null && el.setSelectionRange) {
        try { el.setSelectionRange(focusedStart, focusedStart); } catch {}
      }
    }
  }
}

// ── Build card skeleton (once) ───────────────────────────────────

function buildCard(slotId, label) {
  const card = document.getElementById(`card-${slotId}`);
  card.innerHTML = `
    <div class="card-header">
      <span class="person-dot" style="background:${SLOT_COLORS[slotId].main}"></span>
      <input type="text" class="person-name-input" id="name-${slotId}"
             placeholder="${label}"
             onblur="window._saveName('${slotId}',this.value)"
             onkeydown="if(event.key==='Enter')this.blur()">
      <div class="person-total-badge" id="ptotal-${slotId}">0.0 lbs</div>
    </div>

    <div class="split-bar" id="split-${slotId}"></div>

    <div class="bw-row">
      <span class="bw-label">Body weight</span>
      <div class="bw-input-wrap">
        <input type="number" class="bw-input" id="bw-${slotId}"
               placeholder="0" min="0" step="1"
               onblur="window._saveBodyWeight('${slotId}',this.value)"
               onkeydown="if(event.key==='Enter')this.blur()">
        <span class="bw-unit">lbs</span>
      </div>
    </div>

    <div class="gear-header">
      <span class="gear-header-label">Gear</span>
      <span class="gear-subtotal" id="gsub-${slotId}">0.0 lbs</span>
    </div>

    <div class="gear-list" id="gear-list-${slotId}"></div>

    <div class="add-gear-row">
      <input type="text" class="add-name-input" id="new-name-${slotId}" placeholder="Add item…">
      <input type="number" class="add-weight-input" id="new-weight-${slotId}"
             placeholder="lbs" min="0" step="0.1">
      <button class="add-btn" onclick="window._addGear('${slotId}')">+ Add</button>
    </div>

    <div class="card-summary" id="summary-${slotId}"></div>
  `;

  // Allow Enter to add gear from the new-item row
  document.getElementById(`new-weight-${slotId}`)
    .addEventListener('keydown', e => { if (e.key === 'Enter') window._addGear(slotId); });
}

// ── Full render ──────────────────────────────────────────────────

function render() {
  renderMeter();
  SLOTS.forEach((id, i) => {
    if (members[id]) renderCard(id, members[id]);
  });
}

// ── Firebase write helpers ───────────────────────────────────────

// Refresh a card's computed displays (badge, gear subtotal, summary, split bar) + the meter.
function refreshCardStats(slotId) {
  const pTotal = personTotal(members[slotId]);
  const gTotal = gearTotal(members[slotId]);
  const bw     = Number(members[slotId]?.bodyWeight) || 0;
  const badge   = document.getElementById(`ptotal-${slotId}`);
  const gSub    = document.getElementById(`gsub-${slotId}`);
  const summary = document.getElementById(`summary-${slotId}`);
  const split   = document.getElementById(`split-${slotId}`);
  if (badge) {
    badge.textContent = `${pTotal > 250 ? '⚠ ' : ''}${fmt(pTotal)} lbs`;
    badge.style.borderColor = pTotal > 250 ? 'var(--warn)' : 'var(--border)';
  }
  if (gSub)    gSub.textContent = `${fmt(gTotal)} lbs`;
  if (summary) summary.textContent = `Body ${fmt(bw)} lbs · Gear ${fmt(gTotal)} lbs · Total ${fmt(pTotal)} lbs`;
  if (split) {
    const c = SLOT_COLORS[slotId];
    split.innerHTML = pTotal > 0
      ? `<div class="split-seg" style="width:${(bw / pTotal) * 100}%;background:${c.main}" title="Body ${fmt(bw)} lbs"></div>` +
        `<div class="split-seg" style="width:${(gTotal / pTotal) * 100}%;background:${c.tint}" title="Gear ${fmt(gTotal)} lbs"></div>`
      : '';
  }
  renderMeter();
}

window._saveName = (slotId, val) => {
  if (members[slotId]) members[slotId].name = val.trim();
  set(ref(db, `alaska-trip/members/${slotId}/name`), val.trim());
  renderMeter();  // legend shows the name
};

window._saveBodyWeight = (slotId, val) => {
  const w = parseFloat(val) || 0;
  members[slotId].bodyWeight = w;
  set(ref(db, `alaska-trip/members/${slotId}/bodyWeight`), w);
  refreshCardStats(slotId);
};

window._toggleGear = (slotId, gearId, included) => {
  if (members[slotId] && members[slotId].gear && members[slotId].gear[gearId]) {
    members[slotId].gear[gearId].included = included;
  }
  set(ref(db, `alaska-trip/members/${slotId}/gear/${gearId}/included`), included);
  const row = document.getElementById(`grow-${slotId}-${gearId}`);
  if (row) row.classList.toggle('excluded', !included);
  refreshCardStats(slotId);
};

window._saveGearName = (slotId, gearId, val) => {
  if (!val.trim()) return;
  if (members[slotId]?.gear?.[gearId]) members[slotId].gear[gearId].name = val.trim();
  set(ref(db, `alaska-trip/members/${slotId}/gear/${gearId}/name`), val.trim());
};

window._saveGearWeight = (slotId, gearId, val) => {
  const w = Math.max(0, parseFloat(val) || 0);
  if (members[slotId]?.gear?.[gearId]) members[slotId].gear[gearId].weight = w;
  set(ref(db, `alaska-trip/members/${slotId}/gear/${gearId}/weight`), w);
  refreshCardStats(slotId);
};

window._deleteGear = (slotId, gearId) => {
  if (members[slotId]?.gear) delete members[slotId].gear[gearId];
  remove(ref(db, `alaska-trip/members/${slotId}/gear/${gearId}`));
  renderGearList(slotId, members[slotId]?.gear || {});
  refreshCardStats(slotId);
};

window._addGear = (slotId) => {
  const nameEl   = document.getElementById(`new-name-${slotId}`);
  const weightEl = document.getElementById(`new-weight-${slotId}`);
  const name     = nameEl.value.trim();
  const weight   = parseFloat(weightEl.value) || 0;
  if (!name) { nameEl.focus(); return; }

  const id   = `g_${Date.now()}`;
  const item = { id, name, weight, included: true };
  if (!members[slotId].gear) members[slotId].gear = {};
  members[slotId].gear[id] = item;
  set(ref(db, `alaska-trip/members/${slotId}/gear/${id}`), item);

  nameEl.value   = '';
  weightEl.value = '';
  nameEl.focus();

  renderGearList(slotId, members[slotId].gear);
  refreshCardStats(slotId);
};

// ── Utility ──────────────────────────────────────────────────────

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Firebase listener ────────────────────────────────────────────

const membersRef = ref(db, 'alaska-trip/members');

// ── Countdown ────────────────────────────────────────────────────

const TARGET = new Date('2026-08-14T00:00:00');

function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

function tickCountdown() {
  const diff = TARGET - Date.now();
  if (diff <= 0) {
    document.getElementById('countdown').innerHTML =
      '<span style="font-family:Fraunces,serif;font-size:2rem;color:var(--accent)">Let\'s go! 🛩️</span>';
    return;
  }
  const days  = Math.floor(diff / 86400000);
  const hrs   = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000)  / 60000);
  const secs  = Math.floor((diff % 60000)    / 1000);
  document.getElementById('cd-days').textContent  = days;
  document.getElementById('cd-hours').textContent = pad(hrs);
  document.getElementById('cd-mins').textContent  = pad(mins);
  document.getElementById('cd-secs').textContent  = pad(secs);
}

tickCountdown();
setInterval(tickCountdown, 1000);

// ── Firebase listener ────────────────────────────────────────────

onValue(membersRef, async snap => {
  const data = snap.val() || {};

  // Initialize empty slots (only on first load to avoid clobbering)
  if (!fbInited) {
    fbInited = true;
    for (let i = 0; i < SLOTS.length; i++) {
      const slotId = SLOTS[i];
      if (!data[slotId]) {
        const def = defaultMember(SLOT_LABELS[i]);
        data[slotId] = def;
        set(ref(db, `alaska-trip/members/${slotId}`), def);
      }
    }
    // Build card skeletons
    SLOTS.forEach((id, i) => buildCard(id, SLOT_LABELS[i]));
  }

  members = data;
  render();
});
</script>

</html>
